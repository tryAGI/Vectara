site_name: Vectara .NET Documentation
site_description: Documentation for the tryAGI .NET SDK for Vectara.
site_url: https://tryagi.github.io/Vectara/
repo_url: https://github.com/tryAGI/Vectara
repo_name: tryAGI/Vectara
edit_uri: edit/main/docs/
nav:
- Overview: index.md
# EXAMPLES:START
- Examples:
  - List Rerankers: examples/list-rerankers.md
  - List Corpora: examples/list-corpora.md
  - List LLMs: examples/list-llms.md
  - List Encoders: examples/list-encoders.md
  - Query: examples/query.md
  - Stream Query: examples/stream-query.md
  - List Users: examples/list-users.md
  - List Generation Presets: examples/list-generation-presets.md
  - AI Function Tools: examples/ai-function-tools.md
# EXAMPLES:END

theme:
  name: tryagi
  favicon: 'media/icon128.png'

plugins:
  - search
  - copy-to-llm

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: ""
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
