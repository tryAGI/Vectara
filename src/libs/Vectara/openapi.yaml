      x-fern-sdk-method-name: get
  /v2/queries:
    get:
      tags:
      - Query History
      summary: List the history of previous queries
      x-required-roles:
      - type: CorpusRole
        roles:
        - viewer
        - editor
        - administrator
        - owner
      - type: ApiRole
        roles:
        - corpus_viewer
        - corpus_developer
        - corpus_administrator
        - viewer
        - administrator
        - owner
      description: 'The List Query Histories API allows you to retrieve, update, and
        manage query history for a specific corpus. This API is particularly useful
        for tracking query performance, debugging individual queries, and retrieving
        detailed information such as the call stack of a query execution.


        You can specify the `corpus_key`, `chat_id`, and the `limit` which is the
        maximum number of historical queries to list.

        '
      operationId: getQueryHistories
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      - name: corpus_key
        in: query
        description: Specifies the `corpus_key` used in the query.
        required: false
        schema:
          type: string
        example: my_corpus_key
      - name: started_after
        in: query
        description: Queries that started after a particular ISO date-time.
        required: false
        schema:
          type: string
          format: date-time
      - name: started_before
        in: query
        description: Queries that started before a particular ISO date-time.
        required: false
        schema:
          type: string
          format: date-time
      - name: chat_id
        in: query
        description: Specifies the chat_id of the query, this will return all queries
          in the specified chat.
        required: false
        schema:
          type: string
        example: cht_123456789
      - name: history_id
        in: query
        description: Specifies the history_id of the query that you want to use as
          a filter.
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Specifies the maximum number of query history listed.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
      - name: page_key
        in: query
        description: Used to retrieve the next page of query histories after the limit
          has been reached.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: The response includes an array of previous query histories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListQueryHistoriesResponse'
        '400':
          description: Query history list request was malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Permissions do not allow listing query histories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-fern-sdk-group-name: query_history
      x-fern-sdk-method-name: list
      x-fern-pagination:
