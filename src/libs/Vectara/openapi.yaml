      description: 'The Get Query History API allows you to retrieve detailed history
        about a specific query that was made against a corpus. The response includes
        detailed information about the query, such as latency, the time it was executed,
        and the various stages in the query pipeline.


        You specify the `query_id` and the response includes the `id` of the query,
        the `query` object, the `chat_id`, the time information about the query, and
        the `spans` object.

        '
      operationId: getQueryHistory
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      - name: query_id
        in: path
        description: The ID of the query history
        required: true
        schema:
          type: string
        example: qry_123456789
      responses:
        '200':
          description: 'The `spans` object provides information about the ordered
            parts of the query pipeline and you get information about what happens
            during each stage of the pipeline.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryHistory'
        '403':
          description: Permissions do not allow retrieving the query history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Query history not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
