    ToolId:
      pattern: ^tol_.*
      type: string
      description: Unique identifier for a tool.
      example: tol_123e4567-e89b-12d3-a456-426614174000
    ToolDescriptionTemplate:
      type: string
      description: "Velocity template for generating dynamic tool descriptions. When set, this template is rendered at runtime to produce the tool description.\n\nAvailable Velocity variables:\n- `$agent.name` - Agent name\n- `$agent.metadata` - Agent metadata map\n- `$session.key` - Session key\n- `$session.metadata` - Session metadata map\n- `$currentDate` - Current date/time in ISO 8601 format (e.g., \"2025-10-24T15:30:45Z\")\n\nExample: \"Search tool configured for agent $agent.name on $currentDate\"\n"
    ToolPermissions:
      type: object
      properties:
        corpora_query:
          type: boolean
          description: 'When true, the tool grants query permissions on corpora specified in its configuration.'
        corpora_index:
          type: boolean
          description: 'When true, the tool grants index permissions on corpora specified in its configuration.'
        corpus_developer:
          type: boolean
          description: 'When true, the tool grants corpus developer permissions, allowing the agent to list available corpora.'
      description: The permissions that will be granted to the agent's dedicated service account when this tool is added to an agent.
    ToolBase:
      required:
        - id
        - name
        - description
        - enabled
        - input_schema
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ToolId'
        name:
          type: string
          description: Unique identifier for the tool.
        title:
          type: string
          description: Human-readable title of the tool.
        description:
          type: string
          description: A detailed description of what the tool does and how it can be used.
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        enabled:
          type: boolean
          description: Whether the tool is currently enabled and available for use.
          default: true
        created_at:
          type: string
          description: Timestamp when the tool was created.
          format: date-time
        updated_at:
          type: string
          description: Timestamp when the tool was last updated.
          format: date-time
        input_schema:
          type: object
          description: The schema that defines the expected input structure for the tool.
        category:
          type: string
          description: 'Functional category of the tool (e.g., retrieval, artifacts, indexing, utilities, orchestration).'
        lineage:
          type: string
          description: The base tool name without version suffix. Groups versioned variants of the same tool together.
          example: corpora_search
        version:
          type: string
          description: Date-based version identifier in YYYY-MM-DD format. Null for unversioned tools.
          example: '2026-02-23'
        tool_groups:
          type: array
          items:
            type: string
          description: Groups this tool belongs to. Tools in the same group form a functional set and should be added or removed together by default.
          example:
            - document_ingestion
        permissions:
          $ref: '#/components/schemas/ToolPermissions'
      description: Base properties shared by all tool types.
    DynamicVectaraTool:
      allOf:
        - $ref: '#/components/schemas/ToolBase'
