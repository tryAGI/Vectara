                      start_tag: <em>
                      end_tag: </em>
                    reranker:
                      type: customer_reranker
                      reranker_name: Rerank_Multilingual_v1
                      limit: 50
                      include_context: true
                  generation:
                    generation_preset_name: mockingbird-2.0
                    prompt_template: '[{"role": "system", "content": "You are an HR policy analyst."}, #foreach ($qResult in $vectaraQueryResults) {"role": "user", "content": "Evaluate the $vectaraIdxWord[$foreach.index] RSU vesting schedule for Canadian employees."}, {"role": "assistant", "content": "${qResult.getText()}"}, #end {"role": "user", "content": "Compare RSU vesting schedules for 2022 and 2024 policies in Canada."}]'
