                - 'Line 5: Use of forbidden module ''os'''
          description: Results of code validation (static and sandbox).
        input_schema:
          type: object
          description: The discovered input schema from type annotations. May be null if validation failed or no type hints provided.
          example:
            type: object
            properties:
              order_count:
                type: integer
              total_revenue:
                type: number
            required:
              - order_count
              - total_revenue
        output_schema:
          type: object
          description: The discovered output schema from type annotations. May be null if validation failed or no type hints provided.
          example:
            type: object
            properties:
              score:
                type: number
        execution:
          required:
            - success
          type: object
          properties:
            success:
