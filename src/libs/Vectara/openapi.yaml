  /v2/corpora/{corpus_key}/filter_attribute_stats:
    get:
      tags:
      - Corpora
      summary: Get filter attribute statistics for corpus metadata
      x-required-roles:
      - type: CorpusRole
        roles:
        - viewer
        - editor
        - administrator
        - owner
      - type: ApiRole
        roles:
        - corpus_viewer
        - corpus_developer
        - corpus_administrator
        - viewer
        - administrator
        - owner
      description: 'Retrieve statistics and value distributions for filter attributes
        in a corpus. This endpoint provides insights into the metadata structure and
        content distribution, enabling users to understand available filter values
        and build effective metadata queries.


        This endpoint analyzes document and part metadata fields defined as filter
        attributes and returns:

        - **Value distributions**: Top occurring values with their counts

        - **Statistics**: Min, max, average, and sum for numeric fields


        By default, statistics are computed across all filter attributes at both document
        and part levels. You can optionally:

        - Request statistics for specific fields only

        - Apply metadata filters to analyze a subset of the corpus

        - Limit the number of distinct values returned per field


        **Performance and Caching**: Results may be cached for improved performance,
        with cache duration varying by corpus size. Cached results can take up to
        1 hour to refresh for large corpora. Smaller corpora with faster query times
        have shorter cache durations (2-15 minutes) to ensure fresher data.


        The `corpus_key` uniquely identifies the corpus. For more information, see
        [Create a corpus](https://docs.vectara.com/docs/rest-api/create-corpus).

        '
      operationId: getFilterAttributeStats
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      - in: path
        name: corpus_key
        description: The unique key identifying the corpus to retrieve filter attribute
          statistics for.
        required: true
        schema:
          $ref: '#/components/schemas/CorpusKey'
      - name: fields
        in: query
        description: Comma-separated list of qualified field names to retrieve statistics
          for (e.g., 'doc.category,part.status'). If omitted, returns statistics for
          all filter attributes in the corpus. Field names must match the qualified
          format 'level.fieldname' where level is either 'doc' or 'part'.
        required: false
        schema:
          type: string
        example: doc.category,doc.year,part.status
      - name: metadata_filter
        in: query
        description: Optional metadata filter expression to pre-filter documents or
          parts before computing statistics. Uses the same SQL-style filter syntax
          as query operations. When provided, statistics reflect only the filtered
          subset of the corpus.
        required: false
        schema:
          type: string
        example: doc.year >= 2020 AND doc.category = 'financial'
      - name: max_values
        in: query
        description: Maximum number of distinct values to return per field in the
          'values' array, ordered by occurrence count (descending).
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000
          default: 100
        example: 50
      responses:
        '200':
          description: Successfully retrieved filter attribute statistics for the
            corpus.
          content:
            application/json:
