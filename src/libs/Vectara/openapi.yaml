      title: AgentSearchCorporaParameters
      type: object
      properties:
        corpora:
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/AgentKeyedSearchCorpus'
          description: 'The corpora to search, with support for eager references.'
        offset:
          minimum: 0
          type: integer
          description: Number of results to skip for pagination.
          format: int32
          default: 0
        limit:
          minimum: 1
          type: integer
          description: Maximum number of results to return.
          format: int32
          default: 10
        context_configuration:
          allOf:
            - $ref: '#/components/schemas/ContextConfiguration'
          default: 
          nullable: true
        reranker:
          $ref: '#/components/schemas/SearchReranker'
      description: Agent-specific search parameters that support eager references.
    AgentCorporaSearchQueryConfiguration:
      title: AgentCorporaSearchQueryConfiguration
      required:
        - search
      type: object
      properties:
        search:
          $ref: '#/components/schemas/AgentSearchCorporaParameters'
        generation:
          allOf:
            - $ref: '#/components/schemas/GenerationParameters'
          default:
            enabled: false
        save_history:
          type: boolean
          description: Whether to save the query to history.
          default: false
      description: Agent-specific query configuration that supports eager references. Use this in agent tool configurations when turn-start resolution is needed.
    InlineCorporaSearchToolConfiguration:
      title: InlineCorporaSearchToolConfiguration
      required:
        - type
        - query_configuration
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''corpora_search'' for inline corpora search tool configurations.'
          default: corpora_search
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/CorporaSearchToolParameters'
        query_configuration:
          $ref: '#/components/schemas/AgentCorporaSearchQueryConfiguration'
      description: A corpora search tool configuration defined inline in the agent.
      x-vectaraParents:
        - AgentToolConfiguration
    WebSearchToolParameters:
      type: object
      properties:
        query:
          type: string
          description: The search query to execute.
          example: latest AI developments 2024
        limit:
          maximum: 20
          minimum: 1
          type: integer
          description: Maximum number of results to return.
          example: 10
        provider:
          enum:
            - tavily
          type: string
          description: Search provider to use.
          example: tavily
        include_domains:
          maxItems: 50
          type: array
          items:
            type: string
          description: 'List of domains to specifically include in search results. When specified, results will ONLY come from these domains. Supports exact domains (e.g., "github.com"), subdomains (e.g., "docs.github.com"), and wildcard patterns (e.g., "*.github.com"). Subpaths are not supported.'
          example:
            - github.com
            - docs.github.com
            - '*.stackoverflow.com'
        exclude_domains:
          maxItems: 50
          type: array
          items:
            type: string
          description: 'List of domains to specifically exclude from search results. Supports exact domains (e.g., "spam.com"), subdomains (e.g., "bad.spam.com"), and wildcard patterns (e.g., "*.spam.com"). Subpaths are not supported.'
          example:
            - spam.com
            - unreliable-source.com
      additionalProperties: false
      description: 'Configurable parameters for the web search tool. If not provided, will be filled in by the agent.'
    InlineWebSearchToolConfiguration:
      title: InlineWebSearchToolConfiguration
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''web_search'' for inline web search tool configurations.'
          default: web_search
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/WebSearchToolParameters'
      description: A web search tool configuration defined inline in the agent.
      x-vectaraParents:
        - AgentToolConfiguration
    WebGetToolParameters:
      type: object
      properties:
        url:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/EagerReference'
          description: The URL to fetch content from.
        method:
          enum:
            - GET
            - POST
            - PUT
            - DELETE
            - HEAD
          type: string
          description: HTTP method to use.
        headers:
          oneOf:
            - type: object
              additionalProperties:
                type: string
            - $ref: '#/components/schemas/EagerReference'
          description: HTTP headers to include in the request.
        body:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/EagerReference'
          description: Request body for POST/PUT requests.
        follow_redirects:
          oneOf:
            - type: boolean
            - $ref: '#/components/schemas/EagerReference'
          description: Whether to follow HTTP redirects.
        timeout_seconds:
          oneOf:
            - type: integer
            - $ref: '#/components/schemas/EagerReference'
          description: Request timeout in seconds.
        head_lines:
          oneOf:
            - type: integer
            - $ref: '#/components/schemas/EagerReference'
          description: Number of lines from start to include in response.
        tail_lines:
          oneOf:
            - type: integer
            - $ref: '#/components/schemas/EagerReference'
          description: Number of lines from end to include in response.
        ssl_verify:
          oneOf:
            - type: boolean
            - $ref: '#/components/schemas/EagerReference'
          description: Whether to verify SSL certificates.
        max_content_bytes:
          oneOf:
            - type: integer
            - $ref: '#/components/schemas/EagerReference'
          description: Maximum response size in bytes before truncation.
      additionalProperties: false
      description: 'Configurable parameters for the web get tool. If not provided, will be filled in by the agent.'
    InlineWebGetToolConfiguration:
      title: InlineWebGetToolConfiguration
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''web_get'' for inline web get tool configurations.'
          default: web_get
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/WebGetToolParameters'
      description: A web get tool configuration defined inline in the agent for fetching content from URLs.
      x-vectaraParents:
        - AgentToolConfiguration
    InlineLambdaToolConfiguration:
      title: InlineLambdaToolConfiguration
      required:
        - tool_id
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''lambda'' for inline lambda tool configurations.'
          default: lambda
        tool_id:
          $ref: '#/components/schemas/ToolId'
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          type: object
          description: 'Optional hardcoded arguments that will be passed to the lambda function. When specified, these values will be used instead of allowing the LLM to fill in those parameters.'
          example:
            custom_param: value
      description: A lambda tool configuration defined inline in the agent for executing user-defined functions.
      x-vectaraParents:
        - AgentToolConfiguration
    StructuredIndexingToolParameters:
      type: object
      properties:
        corpus_key:
          type: string
          description: 'The key identifying the target corpus for document indexing. If not provided, will be filled in by the agent.'
          example: my-knowledge-base
        document_id:
          type: string
          description: 'The unique identifier for the document within the corpus, preferably human readable IDs.'
          example: annual_report_2024
        title:
          type: string
          description: The title of the document being indexed.
          example: 2024 Annual ESG Report
        description:
          type: string
          description: A brief description or summary of the document content.
          example: 'Comprehensive environmental, social, and governance report'
        metadata:
          type: object
          description: 'The metadata key-value pairs to associate with the document. If present, this gets merged with existing artifact metadata.'
          example:
            doc_type: annual_report
            year: 2024
            department: sustainability
        document:
          type: object
          description: The structured document to index with full hierarchical content.
          example:
            id: annual_report_2024
            type: structured
            title: 2024 Annual ESG Report
      additionalProperties: false
      description: LLM-exposed parameters for the structured indexing tool that indexes documents into the Vectara platform and can be filled in during execution.
    InlineStructuredIndexingToolConfiguration:
      title: InlineStructuredIndexingToolConfiguration
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''structured_indexing'' for inline structured indexing tool configurations.'
          default: structured_indexing
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/StructuredIndexingToolParameters'
      description: A structured indexing tool configuration defined inline in the agent for indexing into the Vectara platform.
      x-vectaraParents:
        - AgentToolConfiguration
    SubAgentToolParameters:
      type: object
      properties:
        message:
          type: string
          description: The detailed task instructions for the sub-agent to perform autonomously.
          example: Review the code changes in pull request \#123 for security issues
        session_tti_minutes:
          minimum: 1
          type: integer
          description: Time to idle in minutes before the session expires.
          format: int64
          example: 60
      additionalProperties: false
      description: 'Configurable parameters for the sub-agent tool. If not overridden, they will be required by the LLM to fill in.'
    SubAgentSessionMode:
      enum:
        - llm_controlled
        - persistent
        - ephemeral
      type: string
      description: "Controls session behavior for sub-agent invocations:\n- llm_controlled: LLM decides whether to create new or resume existing session\n- persistent: Always reuse the same session (created on first invocation)\n- ephemeral: Always create a new session on each invocation\n"
      default: ephemeral
      example: ephemeral
    SubAgentConfiguration:
      required:
        - agent_key
      type: object
      properties:
        agent_key:
          $ref: '#/components/schemas/AgentKey'
        session_mode:
          $ref: '#/components/schemas/SubAgentSessionMode'
        session_metadata:
          type: object
          description: Optional metadata to associate with the sub-agent session. Can contain any key-value pairs.
          example:
            source: parent_agent
            task_type: code_review
      description: User-configurable settings for the sub-agent tool. These parameters are never exposed to the agent.
    InlineSubAgentToolConfiguration:
      title: InlineSubAgentToolConfiguration
      required:
        - type
        - sub_agent_configuration
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''sub_agent'' for inline sub-agent tool configurations.'
          default: sub_agent
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/SubAgentToolParameters'
        sub_agent_configuration:
          $ref: '#/components/schemas/SubAgentConfiguration'
      description: A sub-agent tool configuration defined inline in the agent for invoking specialized sub-agents.
      x-vectaraParents:
        - AgentToolConfiguration
    ArtifactReadToolParameters:
      type: object
      properties:
        artifact_id:
          type: string
          description: The ID of the artifact to read.
          example: art_abc123
        encoding:
          enum:
            - raw
            - base64
          type: string
          description: The encoding format for the content.
          example: raw
        start_line:
          type: integer
          description: Optional starting line number (1-indexed).
          format: int32
          example: 100
        end_line:
          type: integer
          description: 'Optional ending line number (1-indexed, inclusive).'
          format: int32
          example: 200
      additionalProperties: false
      description: 'Configurable parameters for the artifact read tool. If not overridden, they will be required by the LLM to fill in.'
    ArtifactReadConfiguration:
      type: object
      properties:
        max_size_bytes:
          maximum: 10485760
          minimum: 1
          type: integer
          description: Maximum file size in bytes for full reads without line ranges. Defaults to 256KB.
          format: int64
          default: 262144
        max_lines:
          maximum: 10000
          minimum: 1
          type: integer
          description: Maximum number of lines for range-based reads. Defaults to 200.
          format: int32
          default: 200
      description: User-configurable settings for the artifact read tool.
    InlineArtifactReadToolConfiguration:
      title: InlineArtifactReadToolConfiguration
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''artifact_read'' for inline artifact read tool configurations.'
          default: artifact_read
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/ArtifactReadToolParameters'
        tool_configuration:
          $ref: '#/components/schemas/ArtifactReadConfiguration'
      description: An artifact read tool configuration defined inline in the agent for reading artifacts from the session workspace.
      x-vectaraParents:
        - AgentToolConfiguration
    ArtifactGrepToolParameters:
      type: object
      properties:
        artifact_id:
          type: string
          description: The ID of the artifact to search.
          example: art_abc123
        pattern:
          type: string
          description: The pattern to search for (supports grep regex).
          example: error|exception
        grep_options:
          type: array
          items:
            type: string
          description: Optional grep command options.
          example:
            - '-i'
            - '-n'
      additionalProperties: false
      description: 'Configurable parameters for the artifact grep tool. If not overridden, they will be required by the LLM to fill in.'
    InlineArtifactGrepToolConfiguration:
      title: InlineArtifactGrepToolConfiguration
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''artifact_grep'' for inline artifact grep tool configurations.'
          default: artifact_grep
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/ArtifactGrepToolParameters'
      description: An artifact grep tool configuration defined inline in the agent for searching through artifact content.
      x-vectaraParents:
        - AgentToolConfiguration
    ImageReadToolParameters:
      type: object
      properties:
        artifact_id:
          pattern: '^art_[a-z0-9_-]+$'
          type: string
          description: The ID of the image artifact to view.
          example: art_photo_a3f2
        detail:
          enum:
            - auto
            - low
            - high
          type: string
          description: Detail level for image processing.
          default: auto
          example: auto
      additionalProperties: false
      description: 'Configurable parameters for the image read tool. If not overridden, they will be required by the LLM to fill in.'
    InlineImageReadToolConfiguration:
      title: InlineImageReadToolConfiguration
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''image_read'' for inline image read tool configurations.'
          default: image_read
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/ImageReadToolParameters'
      description: An image read tool configuration defined inline in the agent for loading images into the conversation context.
      x-vectaraParents:
        - AgentToolConfiguration
    DocumentConversionToolParameters:
      type: object
      properties:
        artifact_id:
          type: string
          description: The ID of the artifact to convert.
          example: art_abc123
        output_format:
          enum:
            - markdown
            - structured_document
          type: string
          description: Output format for the converted document.
          example: markdown
        description:
          type: string
          description: Optional description for the converted artifact.
          example: PDF converted to markdown
      additionalProperties: false
      description: 'Configurable parameters for the document conversion tool. If not overridden, they will be required by the LLM to fill in.'
    InlineDocumentConversionToolConfiguration:
      title: InlineDocumentConversionToolConfiguration
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''document_conversion'' for inline document conversion tool configurations.'
          default: document_conversion
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/DocumentConversionToolParameters'
      description: A document conversion tool configuration defined inline in the agent for converting document artifacts to various formats.
      x-vectaraParents:
        - AgentToolConfiguration
    GetDocumentTextParameters:
      type: object
      properties:
        document_id:
          minLength: 1
          type: string
          description: The document ID of the document to fetch text from.
          example: doc_12345
        corpus_key:
          minLength: 1
          type: string
          description: The corpus key containing the document.
          example: my-corpus
      additionalProperties: false
      description: 'Configurable parameters for the get document text tool. If not overridden, they will be required by the LLM to fill in.'
    GetDocumentTextConfiguration:
      type: object
      properties:
        metadata:
          type: object
          properties:
            include:
              type: boolean
              description: 'Whether to include document metadata in the response. If false, metadata artifact will not be created.'
              default: true
            exclude_paths:
              type: array
              items:
                type: string
              description: List of JSONPath expressions for metadata fields to exclude from the returned metadata.
              example:
                - $.internal.processedAt
                - $.debug
          description: Configuration for document metadata retrieval.
      description: User-configurable settings for the get document text tool. These parameters are never exposed to the agent.
    InlineGetDocumentTextToolConfiguration:
      title: InlineGetDocumentTextToolConfiguration
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of tool configuration, which is always ''get_document_text'' for inline get document text tool configurations.'
          default: get_document_text
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        argument_override:
          $ref: '#/components/schemas/GetDocumentTextParameters'
        tool_configuration:
          $ref: '#/components/schemas/GetDocumentTextConfiguration'
      description: A get document text tool configuration defined inline in the agent for fetching document text content from a corpus.
      x-vectaraParents:
        - AgentToolConfiguration
    AgentToolConfiguration:
      title: AgentToolConfiguration
      required:
        - type
      oneOf:
        - $ref: '#/components/schemas/InlineDynamicVectaraToolConfiguration'
        - $ref: '#/components/schemas/InlineMcpToolConfiguration'
        - $ref: '#/components/schemas/InlineCorporaSearchToolConfiguration'
        - $ref: '#/components/schemas/InlineWebSearchToolConfiguration'
        - $ref: '#/components/schemas/InlineWebGetToolConfiguration'
        - $ref: '#/components/schemas/InlineLambdaToolConfiguration'
        - $ref: '#/components/schemas/InlineStructuredIndexingToolConfiguration'
        - $ref: '#/components/schemas/InlineSubAgentToolConfiguration'
        - $ref: '#/components/schemas/InlineArtifactReadToolConfiguration'
        - $ref: '#/components/schemas/InlineArtifactGrepToolConfiguration'
        - $ref: '#/components/schemas/InlineImageReadToolConfiguration'
        - $ref: '#/components/schemas/InlineDocumentConversionToolConfiguration'
        - $ref: '#/components/schemas/InlineGetDocumentTextToolConfiguration'
      description: 'A tool configuration that can be used by an agent, defined inline with a specific configuration type.'
      discriminator:
        propertyName: type
        mapping:
          dynamic_vectara: '#/components/schemas/InlineDynamicVectaraToolConfiguration'
          mcp: '#/components/schemas/InlineMcpToolConfiguration'
          corpora_search: '#/components/schemas/InlineCorporaSearchToolConfiguration'
          web_search: '#/components/schemas/InlineWebSearchToolConfiguration'
          web_get: '#/components/schemas/InlineWebGetToolConfiguration'
          lambda: '#/components/schemas/InlineLambdaToolConfiguration'
          structured_indexing: '#/components/schemas/InlineStructuredIndexingToolConfiguration'
          sub_agent: '#/components/schemas/InlineSubAgentToolConfiguration'
          artifact_read: '#/components/schemas/InlineArtifactReadToolConfiguration'
          artifact_grep: '#/components/schemas/InlineArtifactGrepToolConfiguration'
          image_read: '#/components/schemas/InlineImageReadToolConfiguration'
          document_conversion: '#/components/schemas/InlineDocumentConversionToolConfiguration'
          get_document_text: '#/components/schemas/InlineGetDocumentTextToolConfiguration'
      example:
        - type: web_search
          argument_override:
            limit: 5
            include_domains:
              - github.com
              - stackoverflow.com
            exclude_domains:
              - spam.com
    AgentSkill:
      title: AgentSkill
      required:
        - description
        - content
      type: object
      properties:
        description:
          maxLength: 500
          type: string
          description: 'A brief description of what the skill does, shown to the agent in its instructions.'
          example: 'Reviews code for best practices, bugs, and security issues.'
        content:
          maxLength: 50000
          type: string
          description: "The full instruction content for this skill.\nThis is NOT shown in the instructions by default; it is loaded when the skill is invoked.\n"
          example: 'When reviewing code, check for security vulnerabilities, performance issues, and adherence to best practices...'
      description: "A skill that provides progressively disclosed instructions to an agent; it allows the agent to access more instructions without\nalways being within the system scope. Additionally, skills are explicitly loaded as an input event rather than normal text input event.\nSkills are defined at the agent level and can be filtered per step via allowed_skills.\nThe skill key and description are shown to the LLM in the system message;\nthe full content is sent as a user message when the skill is invoked via the invoke_skill tool.\n"
    RetryConfiguration:
      title: RetryConfiguration
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether retry is enabled. Enabled by default to provide resilience against transient failures.
          default: true
          example: true
        max_retries:
          maximum: 10
          minimum: 0
          type: integer
          description: Maximum number of retry attempts after initial failure.
          default: 3
          example: 3
        initial_backoff_ms:
          maximum: 60000
          minimum: 100
          type: integer
          description: Initial backoff time in milliseconds before first retry.
          default: 1000
          example: 1000
        max_backoff_ms:
          maximum: 300000
          minimum: 1000
          type: integer
          description: Maximum backoff time in milliseconds between retries.
          default: 30000
          example: 30000
        backoff_factor:
          maximum: 10
          minimum: 1
          type: number
          description: Multiplication factor for exponential backoff between retries.
          format: double
          default: 2
          example: 2
      description: Configuration for automatic retry of failed LLM requests with exponential backoff.
    AgentModel:
      title: AgentModel
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: The name of the model to use for this step.
          example: gpt-4
        parameters:
          type: object
          description: Arbitrary model-specific parameters that can be passed to the model.
          example:
            temperature: 0.7
            max_tokens: 1000
            top_p: 0.9
        retry_configuration:
          $ref: '#/components/schemas/RetryConfiguration'
      description: 'Configuration for the model used in this step, including the model name and arbitrary parameters.'
    InstructionReference:
      required:
        - id
      type: object
      properties:
        id:
          $ref: '#/components/schemas/InstructionId'
        version:
          minimum: 1
          type: integer
          description: 'The specific version of the instruction to use. If not specified, the latest version will be used.'
          example: 1
      description: 'A reference to an instruction that can be used by an agent. If version is not specified, the latest version will be used. Note that when the instruction is updated, agents using it will need to be updated to reference the new version explicitly.'
    ReferenceInstruction:
      title: ReferenceInstruction
      allOf:
        - $ref: '#/components/schemas/InstructionReference'
        - required:
            - type
          type: object
          properties:
            type:
              type: string
              description: 'The type of instruction, used for discrimination.'
              default: reference
      description: An instruction specified by reference.
      x-vectaraParents:
        - AgentStepInstruction
    InlineInstruction:
      title: InlineInstruction
      allOf:
        - $ref: '#/components/schemas/InstructionRequestBase'
        - required:
            - type
          type: object
          properties:
            type:
              type: string
              description: 'The type of instruction, used for discrimination.'
              default: inline
      description: An instruction defined inline in the request.
      x-vectaraParents:
        - AgentStepInstruction
    AgentStepInstruction:
      title: AgentStepInstruction
      required:
        - type
      oneOf:
        - $ref: '#/components/schemas/ReferenceInstruction'
        - $ref: '#/components/schemas/InlineInstruction'
      description: 'An instruction that can be used in an agent step, either by reference, defined inline, or using a Vectara built-in instruction.'
      discriminator:
        propertyName: type
        mapping:
          reference: '#/components/schemas/ReferenceInstruction'
          inline: '#/components/schemas/InlineInstruction'
      example:
        - type: reference
          name: Customer Support Initial Instruction
          version: 1
        - type: inline
          name: Temporary On-the-fly Guideline
          description: A special instruction for this specific step only.
          template_type: velocity
          template: Please prioritize issues tagged with 'urgent' for the next hour.
    DefaultOutputParser:
      title: DefaultOutputParser
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: 'The type of output parser, which is always ''default'' for this parser type.'
          default: default
          example: default
      description: Uses native tool calling capabilities and returns output directly to the user. This parser leverages the underlying model's built-in tool calling functionality and passes responses through without additional processing.
      x-vectaraParents:
        - AgentOutputParser
    StructuredOutputParser:
      title: StructuredOutputParser
      required:
        - type
        - json_schema
      type: object
      properties:
        type:
          type: string
          description: 'The type of output parser, which is always ''structured'' for this parser type.'
          default: structured
          example: structured
        json_schema:
          $ref: '#/components/schemas/JsonSchemaSpec'
      description: "Parses agent output as structured JSON conforming to a specified schema.\nUses the model's native structured outputs capability to guarantee valid JSON\nthat adheres to the provided schema. This is useful when you need the agent's\nfinal response in a specific format for downstream processing.\n\nWhen this parser is configured, the agent emits a StructuredOutputEvent instead\nof AgentOutputEvent. The StructuredOutputEvent contains the validated JSON content\nalong with the schema name for identification.\n\nNote: When using structured outputs, the agent can still use tools normally.\nThe schema constraint only applies to the agent's final text response.\nWhen streaming, the structured output is delivered as a single complete event\nrather than being streamed in chunks.\n"
      x-vectaraParents:
        - AgentOutputParser
    AgentOutputParser:
      title: AgentOutputParser
      required:
        - type
      oneOf:
        - $ref: '#/components/schemas/DefaultOutputParser'
        - $ref: '#/components/schemas/StructuredOutputParser'
      description: "Configuration for how the agent's output should be parsed and formatted.\n\nThe output parser determines how the agent's responses are processed before being returned to the user.\n"
      discriminator:
        propertyName: type
        mapping:
          default: '#/components/schemas/DefaultOutputParser'
          structured: '#/components/schemas/StructuredOutputParser'
    TemplatedReminder:
      title: TemplatedReminder
      required:
        - type
        - template
        - hooks
      type: object
      properties:
        type:
          type: string
          description: The type of reminder.
          default: templated
          example: templated
        template_type:
          $ref: '#/components/schemas/TemplateType'
        template:
          $ref: '#/components/schemas/InstructionTemplate'
        hooks:
          minItems: 1
          type: array
          items:
            enum:
              - input_message
              - tool_output
            type: string
          description: Event types that trigger this reminder to be appended to the corresponding message.
          example:
            - tool_output
      description: A templated reminder with a Velocity template that is compiled at session start and injected into messages matching the specified hooks.
      x-vectaraParents:
        - AgentStepReminder
    AgentStepReminder:
      title: AgentStepReminder
      required:
        - type
      oneOf:
        - $ref: '#/components/schemas/TemplatedReminder'
      description: A reminder that is injected into the agent conversation when specific event types occur.
      discriminator:
        propertyName: type
        mapping:
          templated: '#/components/schemas/TemplatedReminder'
    NextStep:
      title: NextStep
      required:
        - step_name
      type: object
      properties:
        condition:
          type: string
          description: "UserFn expression evaluating to boolean.\nUses the `get()` function with JSONPath to access the step transition context.\nSee https://docs.vectara.com/docs/search-and-retrieval/rerankers/user-defined-function-reranker for the UserFn language reference.\nOmit for catch-all/default routing.\n\nThe context available to `get()` has the following shape:\n```\n{\n  \"agent\": {\n    \"name\": \"...\",\n    \"key\": \"...\",\n    \"description\": \"...\",\n    \"metadata\": { ... }\n  },\n  \"session\": {\n    \"key\": \"...\",\n    \"name\": \"...\",\n    \"description\": \"...\",\n    \"metadata\": { ... }\n  },\n  \"currentDate\": \"2024-01-15T10:35:00Z\",\n  \"tools\": {\n    \"<tool_config_name>\": {\n      \"outputs\": {\n        \"latest\": { ... }\n      }\n    }\n  },\n  \"output\": { \"text\": \"...\" }\n}\n```\n\n- `$.agent.metadata.<key>` — agent metadata fields\n- `$.session.metadata.<key>` — session metadata fields\n- `$.tools.<tool_config_name>.outputs.latest.<field>` — latest tool output fields\n- `$.output.text` — LLM text output (when output_parser is `default`)\n- `$.output.<field>` — LLM structured output fields (when output_parser is `structured`)\n"
          example: get('$.output.intent') == 'sales'
        step_name:
          type: string
          description: "Name of the step to transition to.\nMust reference a step defined in the agent's steps list.\n"
          example: sales_handler
      description: A conditional transition to another step.
    FirstAgentStep:
      title: FirstAgentStep
      required:
        - name
        - instructions
        - output_parser
      type: object
      properties:
        name:
          maxLength: 255
          minLength: 1
          type: string
          description: Unique identifier for this step within the agent. Must not conflict with any key in the steps map.
          default: first_step
          example: classifier
        type:
          type: string
          description: Deprecated. This field is ignored and exists only for backward compatibility.
          default: conversational
          deprecated: true
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/AgentStepInstruction'
          description: "List of instructions that guide the agent's behavior in this step.\n"
        output_parser:
          allOf:
            - $ref: '#/components/schemas/AgentOutputParser'
          default:
            type: default
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/AgentStepReminder'
          description: Reminders injected into conversation messages when specific events occur.
        next_steps:
          type: array
          items:
            $ref: '#/components/schemas/NextStep'
          description: "Conditional transitions to other steps.\nEvaluated in order; first matching condition is selected.\nA next_step without a condition acts as a catch-all/default.\nIf no condition matches, the agent remains on the current step and the agent ends output.\n"
        allowed_tools:
          type: array
          items:
            type: string
          description: "List of tool configuration names that this step is allowed to use.\nIf not specified (null), all tools defined in the agent's tool_configurations are allowed.\nIf set to an empty array, no tools are allowed and the agent can only respond with text.\n"
          example:
            - customer_search
            - web_search
        allowed_skills:
          type: array
          items:
            type: string
          description: "List of skill names that this step is allowed to use.\nIf not specified (null), all skills defined in the agent's skills map are allowed.\nIf set to an empty array, no skills are available and the invoke_skill tool is not shown.\n"
          example:
            - code_review
            - debugging
        reentry_step:
          type: string
          description: "Step name to resume at when the session receives the next user message.\nIf not specified, the session re-enters at this step (i.e., stays here).\nSet to the agent's first_step_name to always restart from the beginning.\n"
          example: classifier
      description: "The entry point step for an agent, with a unique name.\nSee AgentStep for full step documentation.\n"
    AgentStep:
      title: AgentStep
      required:
        - instructions
        - output_parser
      type: object
      properties:
        type:
          type: string
          description: Deprecated. This field is ignored and exists only for backward compatibility.
          default: conversational
          deprecated: true
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/AgentStepInstruction'
          description: "List of instructions that guide the agent's behavior in this step.\nIf omitted, the agent may behave oddly as it has no system instructions and\nwill just attempt to respond to user input and previous session history.\n"
        output_parser:
          allOf:
            - $ref: '#/components/schemas/AgentOutputParser'
          description: "How to parse and format the agent's output.\nDetermines which event type is emitted.\nDefaults to 'default' parser if not specified.\n"
          default:
            type: default
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/AgentStepReminder'
          description: Reminders injected into conversation messages when specific events occur. Useful for keeping the agent on-task during long conversations.
        next_steps:
          type: array
          items:
            $ref: '#/components/schemas/NextStep'
          description: "Conditional transitions to other steps.\nEvaluated in order; first matching condition is selected.\nA next_step without a condition acts as a catch-all/default.\nIf no condition matches, the agent remains on the current step and the agent ends output.\n"
        allowed_tools:
          type: array
          items:
            type: string
          description: "List of tool configuration names that this step is allowed to use.\nIf not specified (null), all tools defined in the agent's tool_configurations are allowed.\nIf set to an empty array, no tools are allowed and the agent can only respond with text.\nTool names must reference keys in the agent's tool_configurations map.\n"
          example:
            - customer_search
            - web_search
        allowed_skills:
          type: array
          items:
            type: string
          description: "List of skill names that this step is allowed to use.\nIf not specified (null), all skills defined in the agent's skills map are allowed.\nIf set to an empty array, no skills are available and the invoke_skill tool is not shown.\n"
          example:
            - code_review
            - debugging
        reentry_step:
          type: string
          description: "Step name to resume at when the session receives the next user message.\nIf not specified, the session re-enters at this step (i.e., stays here).\nSet to the agent's first_step_name to always restart from the beginning.\n"
          example: classifier
      description: "A step in an agent's execution flow that defines how the agent processes and responds to input.\nThe step name comes from the map key in the agent's steps map.\n\nA step gets all previous session history in the agent session, including any prior agent steps,\nthen the agent decides what to do in this step based on the given instructions. Finally, the\nagent either stops working if there is no next step defined or continues to the first next step\nthat matches the condition.\n\nAn agent always executes steps serially. If parallel behavior is desired, giving the agent\nother agents as tools is usually the most correct approach.\n\nEach step can only use tools defined by its `allowed_tools` list; if this list is not specified\nthen all tools known to the agent are allowed.\n"
    CompactionConfig:
      title: CompactionConfig
      type: object
      properties:
        enabled:
          type: boolean
          description: Enable automatic context compaction.
          default: true
          example: true
        threshold_percent:
          maximum: 95
          minimum: 50
          type: integer
          description: Context usage % (50-95) at which compaction is applied.
          default: 80
          example: 80
        keep_recent_inputs:
          minimum: 1
          type: integer
          description: Number of recent inputs to keep verbatim (not compacted).
          default: 3
          example: 3
        compaction_message:
          maxLength: 10000
          type: string
          description: Custom additional instructions for the compaction summarization prompt.
        tool_event_policy:
          enum:
            - exclude
            - include_outputs
            - include_all
          type: string
          description: How tool events are included in the compaction input.
          default: include_outputs
      description: Configuration for automatic context compaction.
    ToolOutputOffloadingConfiguration:
      title: ToolOutputOffloadingConfiguration
      type: object
      properties:
        enabled:
          type: boolean
          description: "Whether tool output offloading is enabled. If not specified, defaults to true\nwhen the agent has artifact_read configured, false otherwise.\n"
          example: true
        context_percentage:
          maximum: 1
          minimum: 0.01
          type: number
          description: "Percentage of the model's context window to use as the offloading threshold,\nestimated at 4 characters per token. This is a rough heuristic that varies\nacross LLMs. The resulting byte threshold is clamped between min_threshold_bytes\nand max_threshold_bytes, so this percentage only has an effect when it produces\na value lower than max_threshold_bytes.\n"
          format: double
          default: 0.05
          example: 0.05
        max_threshold_bytes:
          minimum: 1024
          type: integer
          description: "Tool outputs above this size (in bytes) will always be offloaded. Acts as a\nceiling on the context_percentage-derived threshold. For large-context models,\nmax_threshold_bytes is typically the effective threshold since the\ncontext_percentage calculation exceeds it.\n"
          format: int64
          example: 32768
        min_threshold_bytes:
          minimum: 1024
          type: integer
          description: "Tool outputs below this size (in bytes) will never be offloaded. Acts as a\nfloor on the context_percentage-derived threshold, ensuring small outputs are\nnever offloaded even for models with small context windows.\n"
          format: int64
          example: 4096
      description: "Configuration for offloading large tool outputs to artifacts.\nWhen tools produce outputs exceeding the size threshold, the output is stored\nas an artifact and replaced with a compact reference. The agent can then use\nartifact_read or artifact_grep to access the full content on demand.\nAll fields are optional; omitted fields use model-inferred defaults.\n"
    Agent:
      required:
        - key
        - name
        - tool_configurations
        - model
        - first_step
        - enabled
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentKey'
        name:
          $ref: '#/components/schemas/AgentName'
        description:
          type: string
          description: A detailed description of the agent's purpose and capabilities.
          example: An AI agent specialized in handling customer support inquiries using company documentation and support tools.
        tool_configurations:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentToolConfiguration'
          description: A map of tool configurations available to the agent. The key is the name of the tool configuration and the value is an agent tool configuration.
          example:
            customer_search:
              type: corpora_search
              argument_override:
                query: customer support documentation
        skills:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentSkill'
          description: "A map of skills available to the agent, keyed by skill name.\nSkills provide specialized instructions that can be invoked during agent execution.\nThe skill list (name + description) is shown in the system message; content is loaded on invocation.\n"
          example:
            code_review:
              description: Reviews code for best practices and security issues.
              content: 'When reviewing code, focus on...'
        model:
          $ref: '#/components/schemas/AgentModel'
        first_step:
          $ref: '#/components/schemas/FirstAgentStep'
        first_step_name:
          type: string
          description: The name of the first step. Matches first_step.name.
          example: classifier
        steps:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentStep'
          description: "A map of additional named steps keyed by step name.\nThe first_step can transition to steps defined here via next_steps.\n"
          example:
            sales_handler:
              instructions:
                - type: inline
                  template: Handle sales inquiries
              output_parser:
                type: default
            support_handler:
              instructions:
                - type: inline
                  template: Handle support requests
              output_parser:
                type: default
        metadata:
          type: object
          description: Arbitrary metadata associated with the agent for customization and configuration.
          example:
            department: customer_service
            version: '2000-01-02T00:00:00.0000000+00:00'
            owner: support-team
        enabled:
          type: boolean
          description: Whether the agent is currently enabled and available for use.
          default: true
          example: true
        compaction:
          $ref: '#/components/schemas/CompactionConfig'
        tool_output_offloading:
          $ref: '#/components/schemas/ToolOutputOffloadingConfiguration'
        created_at:
          type: string
          description: Timestamp when the agent was created.
          format: date-time
          example: '2024-01-15T10:30:00.0000000+00:00'
        updated_at:
          type: string
          description: Timestamp when the agent was last updated.
          format: date-time
          example: '2024-01-16T14:45:00.0000000+00:00'
      description: An AI agent that can use tools to provide intelligent responses and actions.
    ListAgentsResponse:
      required:
        - agents
        - metadata
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
          description: List of agents.
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      description: Response containing a list of agents.
    CreateAgentRequest:
      required:
        - name
        - tool_configurations
        - model
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentKey'
        name:
          $ref: '#/components/schemas/AgentName'
        description:
          type: string
          description: A detailed description of the agent's purpose and capabilities.
          example: An AI agent specialized in handling customer support inquiries using company documentation and support tools.
        tool_configurations:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentToolConfiguration'
          description: A map of tool configurations available to the agent. The key is the name of the tool configuration and the value is the AgentToolConfiguration.
          example:
            customer_search:
              type: corpora_search
              argument_override:
                query: customer support documentation
        skills:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentSkill'
          description: "A map of skills available to the agent, keyed by skill name.\nSkills provide specialized instructions that can be invoked during agent execution.\n"
          example:
            code_review:
              description: Reviews code for best practices.
              content: When reviewing code...
        model:
          $ref: '#/components/schemas/AgentModel'
        first_step:
          $ref: '#/components/schemas/FirstAgentStep'
        first_step_name:
          minLength: 1
          type: string
          description: "Name of a step in the steps map to use as the entry point. This is the preferred\nway to define the entry point - define all steps in the steps map and reference\nthe entry point by name here.\n"
          example: classifier
        steps:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentStep'
          description: "A map of named steps keyed by step name.\nSteps can transition to other steps defined here via next_steps.\n"
          example:
            sales_handler:
              instructions:
                - type: inline
                  template: Handle sales inquiries
              output_parser:
                type: default
            support_handler:
              instructions:
                - type: inline
                  template: Handle support requests
              output_parser:
                type: default
        metadata:
          type: object
          description: Arbitrary metadata associated with the agent for customization and configuration.
          example:
            department: customer_service
            version: 1.0.0
            owner: support-team
        enabled:
          type: boolean
          description: Whether the agent should be enabled upon creation.
          default: true
          example: true
        compaction:
          $ref: '#/components/schemas/CompactionConfig'
        tool_output_offloading:
          $ref: '#/components/schemas/ToolOutputOffloadingConfiguration'
      description: "Request object for creating a new agent.\nThe entry point must be defined via first_step_name (preferred) or first_step (deprecated).\n"
    UpdateFirstAgentStep:
      title: UpdateFirstAgentStep
      type: object
      properties:
        name:
          type: string
          description: 'Rename the first step. If omitted, the name is preserved.'
        type:
          type: string
          description: Deprecated. Previously used as a discriminator.
          default: conversational
          deprecated: true
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/AgentStepInstruction'
          description: List of instructions that guide the agent's behavior. Set to null to clear all instructions.
          nullable: true
        output_parser:
          $ref: '#/components/schemas/AgentOutputParser'
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/AgentStepReminder'
          description: Reminders injected into conversation messages. Set to null to clear all reminders.
          nullable: true
        next_steps:
          type: array
          items:
            $ref: '#/components/schemas/NextStep'
          description: Conditional transitions to other steps. Set to null to clear.
          nullable: true
        allowed_tools:
          type: array
          items:
            type: string
          description: Tool configuration names this step may invoke. Set to null to clear.
          nullable: true
        allowed_skills:
          type: array
          items:
            type: string
          description: Skill names this step may use. Set to null to clear (allows all skills).
          nullable: true
        reentry_step:
          type: string
          description: "Step name to resume at when the session receives the next user message.\nSet to null to clear (re-enters at this step).\n"
          nullable: true
      description: "Partial update for the first (entry point) step. Omitted fields are preserved.\nIncludes an optional name field to rename the first step.\n"
    UpdateAgentStep:
      title: UpdateAgentStep
      type: object
      properties:
        type:
          type: string
          description: Deprecated. Previously used as a discriminator.
          default: conversational
          deprecated: true
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/AgentStepInstruction'
          description: List of instructions that guide the agent's behavior. Set to null to clear all instructions.
          nullable: true
        output_parser:
          $ref: '#/components/schemas/AgentOutputParser'
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/AgentStepReminder'
          description: Reminders injected into conversation messages. Set to null to clear all reminders.
          nullable: true
        next_steps:
          type: array
          items:
            $ref: '#/components/schemas/NextStep'
          description: Conditional transitions to other steps. Set to null to clear.
          nullable: true
        allowed_tools:
          type: array
          items:
            type: string
          description: Tool configuration names this step may invoke. Set to null to clear.
          nullable: true
        allowed_skills:
          type: array
          items:
            type: string
          description: Skill names this step may use. Set to null to clear (allows all skills).
          nullable: true
        reentry_step:
          type: string
          description: "Step name to resume at when the session receives the next user message.\nSet to null to clear (re-enters at this step).\n"
          nullable: true
      description: "Agent step for partial updates. Omitted fields are preserved.\nNullable fields (instructions, reminders) can be set to null to clear them.\n"
    UpdateAgentRequest:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/AgentName'
        description:
          type: string
          description: A detailed description of the agent's purpose and capabilities. Set to null to clear.
          nullable: true
          example: An enhanced AI agent specialized in handling customer support inquiries.
        tool_configurations:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentToolConfiguration'
          description: "A map of tool configurations available to the agent. Set to null to clear all tools.\nIndividual map values set to null will delete that tool configuration.\n"
          nullable: true
          example:
            customer_search:
              type: corpora_search
              argument_override:
                query: customer support documentation
        skills:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentSkill'
          description: "A map of skills available to the agent. Set to null to clear all skills.\nIndividual map values set to null will delete that skill.\n"
          nullable: true
        model:
          $ref: '#/components/schemas/AgentModel'
        first_step:
          $ref: '#/components/schemas/UpdateFirstAgentStep'
        first_step_name:
          minLength: 1
          type: string
          description: "Reassign the entry point to an existing step by name. This is the preferred way\nto change the entry point. The named step must exist in the steps map.\n"
        metadata:
          type: object
          description: Arbitrary metadata associated with the agent. Set to null to clear.
          nullable: true
          example:
            department: customer_service
            version: '2000-01-01T00:00:00.0000000+00:00'
            owner: support-team
            last_reviewed: '2024-01-15'
        enabled:
          type: boolean
          description: Whether the agent is enabled. Set to null to reset to default (true).
          nullable: true
          example: true
        compaction:
          $ref: '#/components/schemas/CompactionConfig'
        tool_output_offloading:
          $ref: '#/components/schemas/ToolOutputOffloadingConfiguration'
        steps:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/UpdateAgentStep'
          description: "A map of additional named steps keyed by step name for partial update.\nOnly provided keys are modified; missing keys are preserved.\nSet a key's value to null to delete that step.\n"
          nullable: true
          example:
            sales_handler:
              instructions:
                - type: inline
                  template: Handle sales inquiries
      description: "Request object for updating an existing agent. Omitted fields are preserved.\nNullable fields (description, tool_configurations, metadata, enabled, guardrails)\ncan be set to null to clear them.\n"
    AgentSessionKey:
      maxLength: 50
      minLength: 1
      pattern: '[0-9a-zA-Z_-]+$'
      type: string
      description: A unique key that identifies an agent session.
      example: customer_support_chat
    InputTokens:
      title: InputTokens
      type: object
      properties:
        count:
          type: integer
          description: Number of input tokens consumed.
          format: int64
          example: 120
      description: Input token usage details.
    OutputTokens:
      title: OutputTokens
      type: object
      properties:
        count:
          type: integer
          description: Number of output tokens generated.
          format: int64
          example: 30
        reasoning_tokens:
          type: integer
          description: Number of tokens used for reasoning/thinking.
          format: int64
          example: 0
      description: Output token usage details.
    SessionContextUsage:
      title: SessionContextUsage
      type: object
      properties:
        input_tokens:
          $ref: '#/components/schemas/InputTokens'
        output_tokens:
          $ref: '#/components/schemas/OutputTokens'
        total_tokens:
          type: integer
          description: Total number of tokens used.
          format: int64
          example: 150
        model_context_window:
          type: integer
          description: Maximum context window size in tokens for the model used by this session. Can be used with input_tokens to calculate context utilization percentage.
          format: int64
          example: 200000
      description: Token usage statistics for a session.
    AgentSession:
      required:
        - key
        - name
        - agent_key
        - enabled
        - created_at
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentSessionKey'
        agent_key:
          $ref: '#/components/schemas/AgentKey'
        name:
          type: string
          description: Human-readable name for the session.
          example: Customer Support Session
        description:
          type: string
          description: Optional description of the session purpose or context.
          example: Helping customer troubleshoot widget installation issues
        metadata:
          type: object
          description: Arbitrary metadata associated with the session.
          example:
            customer_id: '12345'
            priority: high
            channel: web_chat
        current_step_name:
          type: string
          description: "The step name the session will resume at on the next user message.\nIf null, the session starts at the agent's first_step.\n"
          nullable: true
          example: billing
        enabled:
          type: boolean
          description: Whether the session is currently active and can accept new messages.
          default: true
          example: true
        tti_minutes:
          minimum: 0
          type: integer
          description: 'Time-to-idle in minutes for the session. If no events occur in the session for this duration, the session will be automatically deleted. If not specified, the session will not expire.'
          format: int64
          default: 0
          example: 60
        created_at:
          type: string
          description: Timestamp when the session was created.
          format: date-time
          example: '2024-01-15T10:30:00.0000000+00:00'
        session_context_usage:
          $ref: '#/components/schemas/SessionContextUsage'
        effective_compaction:
          $ref: '#/components/schemas/CompactionConfig'
      description: 'A session for interacting with an agent, allowing conversation context.'
    ListAgentSessionsResponse:
      required:
        - sessions
        - metadata
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/AgentSession'
          description: List of agent sessions.
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      description: Response containing a list of agent sessions.
    CreateAgentSessionRequest:
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentSessionKey'
        name:
          type: string
          description: Human-readable name for the session.
          example: Customer Support Session
        description:
          type: string
          description: Optional description of the session purpose or context.
          example: Helping customer troubleshoot issues
        metadata:
          type: object
          description: Arbitrary metadata associated with the session.
          example:
            customer_id: '12345'
            priority: medium
            channel: web_chat
        enabled:
          type: boolean
          description: Whether the session should be enabled upon creation.
          default: true
          example: true
        tti_minutes:
          minimum: 0
          type: integer
          description: 'Time-to-idle in minutes for the session. If no events occur in the session for this duration, the session will be automatically deleted. If set to 0, the session will not expire.'
          format: int64
          default: 0
          example: 60
        from_session:
          required:
            - session_key
          type: object
          properties:
            agent_key:
              type: string
              description: Agent key of the source session (defaults to current agent).
            session_key:
              type: string
              description: Session key of the source session.
            compact_up_to_event_id:
              type: string
              description: 'Only compact events up to this event ID from the source. If omitted, compacts all events.'
          description: Create a new session by forking an existing one. Compacts the source history into a summary and copies artifacts.
      description: Request object for creating a new agent session.
    UpdateAgentSessionRequest:
      type: object
      properties:
        name:
          type: string
          description: Human-readable name for the session.
          example: Updated Session Name
        description:
          type: string
          description: Optional description of the session purpose or context.
          example: Updated session description
        metadata:
          type: object
          description: Arbitrary metadata associated with the session.
          example:
            customer_id: '12345'
            priority: high
            status: escalated
        enabled:
          type: boolean
          description: Whether the session is enabled.
          example: false
        tti_minutes:
          minimum: 0
          type: integer
          description: 'Time-to-idle in minutes for the session. If no events occur in the session for this duration, the session will be automatically deleted. If set to 0, the session will not expire.'
          format: int64
          example: 60
      description: Request object for updating an existing agent session.
    AgentEventBase:
      required:
        - id
        - session_key
        - created_at
      type: object
      properties:
        id:
          pattern: 'aev_[0-9a-zA-Z_-]+$'
          type: string
          description: The unique identifier for the event.
          example: aev_user_001
        session_key:
          $ref: '#/components/schemas/AgentSessionKey'
        created_at:
          type: string
          description: Timestamp when the event was created.
          format: date-time
          example: '2024-01-15T10:35:00.0000000+00:00'
      description: Base properties shared by all agent event types.
    AgentTextInput:
      required:
        - type
        - content
      type: object
      properties:
        type:
          type: string
          description: The type of input.
          default: text
          example: text
        content:
          type: string
          description: The text content of the input.
          example: I need help with my widget installation
      description: A text input for an agent message.
      x-vectaraParents:
        - AgentInput
    AgentSkillInput:
      required:
        - type
        - skill_name
      type: object
      properties:
        type:
          type: string
          description: The type of input.
          default: skill
          example: skill
        skill_name:
          type: string
          description: The name (key) of the skill to invoke.
          example: code_review
      description: An input that invokes a skill by name.
      x-vectaraParents:
        - AgentInput
    AgentInput:
      required:
        - type
      oneOf:
        - $ref: '#/components/schemas/AgentTextInput'
        - $ref: '#/components/schemas/AgentSkillInput'
      description: An input that can be provided to an agent message.
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/AgentTextInput'
          skill: '#/components/schemas/AgentSkillInput'
    InputMessageEvent:
      title: InputMessageEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - messages
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: input_message
            messages:
              type: array
              items:
                $ref: '#/components/schemas/AgentInput'
              description: List of inputs that make up this message.
              example:
                - type: text
                  content: I need help with my widget installation
      description: An input message event from a user.
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    SkillLoadEvent:
      title: SkillLoadEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - skill_name
            - content
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: skill_load
            skill_name:
              type: string
              description: The name of the skill that was loaded.
              example: code_review
            content:
              type: string
              description: The skill content that was loaded.
              example: You are a code reviewer. Review the code for bugs and security issues.
      description: An event representing the loading of a skill's content into the conversation.
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    ArtifactReference:
      title: ArtifactReference
      required:
        - artifact_id
        - filename
        - mime_type
        - size_bytes
      type: object
      properties:
        artifact_id:
          pattern: '^art_[a-z0-9_-]+$'
          type: string
          description: Unique identifier for the artifact
          example: art_report_pdf_a3f2
        filename:
          type: string
          description: Original filename of the artifact
          example: report.pdf
        mime_type:
          type: string
          description: MIME type of the file
          example: application/pdf
        size_bytes:
          type: integer
          description: File size in bytes
          format: int64
          example: 2048576
      description: "Reference to an artifact stored in the agent session workspace.\n\nArtifacts are files or documents that belong to a specific agent session, providing a persistent workspace where agents and users can share files throughout a conversation. When users upload files (such as PDFs, Word documents, PowerPoint presentations, or images) to an agent session, these files are stored as artifacts that remain available for the duration of the session.\n\n**Session Binding**: Each artifact is scoped to a specific agent session and cannot be accessed from other sessions, ensuring data privacy and security.\n\n**Lifecycle**: Artifacts are created when users upload files via multipart requests or when agent tools generate new files (such as converting a PDF to markdown). Artifacts have a configurable time-to-live and are automatically removed when they expire or when the session is deleted. Size limits apply to individual artifacts and total session storage.\n\n**How Agents Use Artifacts**: Agent tools can read artifacts, process them, and create new derived artifacts. For example, the document conversion tool can take a PDF artifact, convert it to markdown, and store the result as a new artifact. This enables multi-step document processing workflows within a single session.\n\n**Common Use Cases**: Upload a document for the agent to analyze, provide multiple reference files for context, enable the agent to convert between formats, or allow the agent to generate and store processed files for later retrieval.\n"
    ArtifactUploadEvent:
      title: ArtifactUploadEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - artifacts
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: artifact_upload
            artifacts:
              type: array
              items:
                $ref: '#/components/schemas/ArtifactReference'
              description: References to uploaded artifacts
              example:
                - artifact_id: art_report_pdf_a3f2
                  filename: report.pdf
                  mime_type: application/pdf
                  size_bytes: 2048576
      description: "Event representing files uploaded to the agent workspace as artifacts.\n\nThis event is created when users upload one or more files to an agent session using multipart requests. The event becomes part of the session's conversation history and contains references to all artifacts that were uploaded in the request. Each uploaded file is assigned a unique artifact identifier and stored in the session's workspace.\n\nWhen an agent processes this event, it becomes aware that new files are available in the session and can use various tools to read, analyze, or transform these artifacts. For example, after receiving an artifact upload event with a PDF, the agent might use the document conversion tool to extract and analyze the document's contents.\n\nSee the `ArtifactReference` schema for comprehensive details about what artifacts are, how they are stored, their lifecycle, and how agents interact with them.\n"
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    ToolInputEvent:
      title: ToolInputEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - tool_call_id
            - tool_configuration_name
            - tool_name
            - tool_input
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: tool_input
            tool_call_id:
              type: string
              description: The identifier for the tool call.
              example: call_tool_search_001
            tool_configuration_name:
              type: string
              description: 'The name of the tool configuration being invoked, as defined in the agent''s tool_configurations map.'
              example: customer_search
            tool_name:
              type: string
              description: Name of the tool being called.
              example: web_search
            tool_input:
              type: object
              description: Input data for the tool.
              example:
                query: weather in San Francisco
      description: An event representing input to a tool call.
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    ToolOutputEvent:
      title: ToolOutputEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - tool_call_id
            - tool_configuration_name
            - tool_name
            - tool_output
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: tool_output
            tool_call_id:
              type: string
              description: 'The unique identifier for the tool call, matching the input event.'
              example: call_tool_search_001
            tool_configuration_name:
              type: string
              description: 'The name of the tool configuration that was invoked, as defined in the agent''s tool_configurations map.'
              example: customer_search
            tool_name:
              type: string
              description: Name of the tool that was called.
              example: web_search
            tool_output:
              type: object
              description: Output data from the tool.
              example:
                result: Current weather is 70°F and sunny
      description: An event representing output from a tool call.
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    ThinkingEvent:
      title: ThinkingEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: thinking
            content:
              type: string
              description: Human-readable content of the reasoning process.
              example: Analyzing user request and considering available options
      description: An event representing chain-of-thought thinking by the agent.
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    AgentOutputEvent:
      title: AgentOutputEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - content
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: agent_output
            content:
              type: string
              description: The complete agent response content.
              example: Hello! I can help you with your widget installation. Let me guide you through the process.
      description: An event representing a complete agent response.
      x-vectaraParents:
        - AgentEvent
    StructuredOutputEvent:
      title: StructuredOutputEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - schema_name
            - content
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: structured_output
            schema_name:
              type: string
              description: The name of the JSON schema that the content conforms to.
              example: order_response
            content:
              description: The structured JSON content conforming to the output schema.
              example:
                result: success
                data:
                  id: 123
      description: "An event representing a complete agent response with structured JSON content conforming to a schema.\n\nThis event is published instead of AgentOutputEvent when the agent's output_parser is configured\nwith type \"structured\". It contains the LLM's final response parsed as validated JSON that\nconforms to the schema specified in the StructuredOutputParser configuration.\n\nWhen streaming is enabled, this event appears as a single complete event (not streamed in chunks)\nafter any tool interactions are complete. The content field contains the parsed JSON,\nand schema_name identifies which schema the content was validated against.\n"
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    ContextLimitExceededEvent:
      title: ContextLimitExceededEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - message
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: context_limit_exceeded
            context_limit:
              type: integer
              description: The maximum number of tokens allowed by the model
              format: int64
              example: 128000
            actual_tokens:
              type: integer
              description: The actual number of tokens in the request
              format: int64
              example: 140658
            message:
              type: string
              description: Human-readable error message
              example: 'Context limit exceeded: 140658 tokens used, 128000 limit'
      description: "A transient event indicating the current request exceeded the LLM's context limit.\nThis event is not persisted to the session history.\n"
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    StepTransitionLimitExceededEvent:
      title: StepTransitionLimitExceededEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - message
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: step_transition_limit_exceeded
            transition_limit:
              type: integer
              description: The maximum number of step transitions allowed
              example: 10
            message:
              type: string
              description: Human-readable error message
              example: Agent exceeded maximum step transitions (10). Possible infinite loop between steps.
      description: "A transient event indicating the agent exceeded the maximum number of step transitions,\nwhich may indicate an infinite loop between steps.\nThis event is not persisted to the session history.\n"
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    SessionInterruptedEvent:
      title: SessionInterruptedEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: session_interrupted
      description: "A transient event indicating the agent session was interrupted by a user request.\nThis event is not persisted to the session history.\n"
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    ImageReadEvent:
      title: ImageReadEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - artifact_id
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: image_read
            artifact_id:
              pattern: '^art_[a-z0-9_-]+$'
              type: string
              description: The ID of the image artifact being loaded into the agent's conversation context.
              example: art_photo_a3f2
            detail:
              enum:
                - auto
                - low
                - high
              type: string
              description: Detail level for image processing.
              default: auto
              example: auto
      description: An event representing an image being loaded into the conversation context for viewing and analysis.
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    StepTransitionEvent:
      title: StepTransitionEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - from_step
            - to_step
            - content
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: step_transition
            from_step:
              type: string
              description: The name of the step being transitioned from.
            to_step:
              type: string
              description: The name of the step being transitioned to.
            content:
              type: string
              description: The handoff message content for the LLM.
      description: An event representing a transition between agent steps.
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    CompactionEvent:
      title: CompactionEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
            - turns_compacted
            - events_compacted
            - summary_key
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: compaction
              example: compaction
            turns_compacted:
              type: integer
              description: Number of conversation turns that were compacted.
              example: 5
            events_compacted:
              type: integer
              description: Number of events that were hidden by compaction.
              example: 47
            summary_text:
              type: string
              description: The plain text summary produced by compaction.
            summary_key:
              type: string
              description: The key of the summary created by compaction.
              example: sum_abc123
      description: An event indicating that context compaction has completed.
      x-vectaraParents:
        - AgentEvent
        - AgentStreamedResponse
    AgentEvent:
      required:
        - type
      type: object
      oneOf:
        - $ref: '#/components/schemas/InputMessageEvent'
        - $ref: '#/components/schemas/SkillLoadEvent'
        - $ref: '#/components/schemas/ArtifactUploadEvent'
        - $ref: '#/components/schemas/ToolInputEvent'
        - $ref: '#/components/schemas/ToolOutputEvent'
        - $ref: '#/components/schemas/ThinkingEvent'
        - $ref: '#/components/schemas/AgentOutputEvent'
        - $ref: '#/components/schemas/StructuredOutputEvent'
        - $ref: '#/components/schemas/ContextLimitExceededEvent'
        - $ref: '#/components/schemas/StepTransitionLimitExceededEvent'
        - $ref: '#/components/schemas/SessionInterruptedEvent'
        - $ref: '#/components/schemas/ImageReadEvent'
        - $ref: '#/components/schemas/StepTransitionEvent'
        - $ref: '#/components/schemas/CompactionEvent'
      description: An event in an agent session conversation.
      discriminator:
        propertyName: type
        mapping:
          input_message: '#/components/schemas/InputMessageEvent'
          skill_load: '#/components/schemas/SkillLoadEvent'
          artifact_upload: '#/components/schemas/ArtifactUploadEvent'
          tool_input: '#/components/schemas/ToolInputEvent'
          tool_output: '#/components/schemas/ToolOutputEvent'
          thinking: '#/components/schemas/ThinkingEvent'
          agent_output: '#/components/schemas/AgentOutputEvent'
          structured_output: '#/components/schemas/StructuredOutputEvent'
          context_limit_exceeded: '#/components/schemas/ContextLimitExceededEvent'
          step_transition_limit_exceeded: '#/components/schemas/StepTransitionLimitExceededEvent'
          session_interrupted: '#/components/schemas/SessionInterruptedEvent'
          image_read: '#/components/schemas/ImageReadEvent'
          step_transition: '#/components/schemas/StepTransitionEvent'
          compaction: '#/components/schemas/CompactionEvent'
      x-vectara-base-schema: '#/AgentEventBase'
    ListAgentEventsResponse:
      required:
        - events
        - metadata
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/AgentEvent'
          description: List of agent events.
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      description: Response containing a list of agent events.
    CreateInputRequestBase:
      type: object
      properties:
        stream_response:
          type: boolean
          description: Indicates whether the response should be streamed or not.
          default: false
      description: Base properties shared by all input request types.
    InputBehavior:
      enum:
        - steer
        - follow_up
      type: string
      description: "Controls how the input is processed when the session is already running.\n- `steer`: Insert the message as soon as possible on the next iteration of the agent loop.\n- `follow_up`: Insert the message after the current agent loop finishes, as a follow-up turn.\n  Follow-up inputs are consumed one at a time: after each follow-up turn completes, the next\n  queued follow-up is processed. This ensures each follow-up gets a full agent loop iteration.\n"
    CreateInputMessageRequest:
      allOf:
        - $ref: '#/components/schemas/CreateInputRequestBase'
        - required:
            - messages
          type: object
          properties:
            type:
              type: string
              default: input_message
            messages:
              type: array
              items:
                $ref: '#/components/schemas/AgentInput'
              description: List of inputs that make up this event.
              example:
                - type: text
                  content: I need help with my widget installation
            since:
              pattern: '^(start|aev_[0-9a-zA-Z_-]+)$'
              type: string
              description: "Event ID to return all events created after queueing the new input. When provided and the session is currently running, the response will include all events created after this event ID, and the new input will be processed according to the behavior field. Use the special value \"start\" to receive all events from the beginning of the session, including the input message itself.\n"
              example: start
            behavior:
              $ref: '#/components/schemas/InputBehavior'
      description: A user input message with text or other content.
      x-vectaraParents:
        - CreateInputRequest
    CreateInterruptRequest:
      allOf:
        - $ref: '#/components/schemas/CreateInputRequestBase'
        - required:
            - type
          type: object
          properties:
            type:
              type: string
              default: interrupt
      description: Cancels the current agent operation.
      x-vectaraParents:
        - CreateInputRequest
    CreateCompactRequest:
      allOf:
        - $ref: '#/components/schemas/CreateInputRequestBase'
        - required:
            - type
          type: object
          properties:
            type:
              type: string
              default: compact
            compact_up_to_event_id:
              type: string
              description: "Compact all inputs up to this event ID (inclusive), e.g. \"aev_abc123\".\nWhen specified, `keep_recent_inputs` is bypassed — all inputs up to the anchor are compacted.\nIf omitted, compacts all inputs except the most recent `keep_recent_inputs` inputs.\n"
              example: aev_abc123
            compaction_message:
              type: string
              description: Override the compaction prompt for this compaction.
      description: "Requests compaction of the session history. Can be sent while the session is processing\n(queued as a follow-up) or when idle.\n"
      x-vectaraParents:
        - CreateInputRequest
    CreateInputRequest:
      required:
        - type
      oneOf:
        - $ref: '#/components/schemas/CreateInputMessageRequest'
        - $ref: '#/components/schemas/CreateInterruptRequest'
        - $ref: '#/components/schemas/CreateCompactRequest'
      description: A request to create input for an agent session.
      discriminator:
        propertyName: type
        mapping:
          input_message: '#/components/schemas/CreateInputMessageRequest'
          interrupt: '#/components/schemas/CreateInterruptRequest'
          compact: '#/components/schemas/CreateCompactRequest'
      x-vectara-base-schema: '#/CreateInputRequestBase'
    AgentResponse:
      required:
        - events
        - session_key
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/AgentEvent'
          description: List of all events generated during agent processing.
        session_key:
          $ref: '#/components/schemas/AgentSessionKey'
      description: Response containing the complete list of events generated by an agent.
    StreamingAgentOutput:
      title: StreamingAgentOutput
