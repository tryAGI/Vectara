                traceback:
                  type: string
                  description: Stack trace for debugging.
              description: Error information if execution failed.
            latency_millis:
              type: integer
              description: Time taken to execute the function in milliseconds.
              example: 125
            memory_used_mb:
              type: integer
              description: Memory used during execution in megabytes.
              example: 32
            validation_results:
              type: object
              properties:
                input_valid:
                  type: boolean
                  description: Whether the test input matched the discovered schema.
                  example: true
                output_valid:
                  type: boolean
                  description: Whether the output matched the discovered schema.
                  example: true
                validation_errors:
                  type: array
                  items:
                    type: string
                  description: Details of any schema validation errors.
              description: Results of input/output schema validation.
          description: Results of executing the function with test input. Only present if validation passed.
      description: "Response from testing a Lambda tool before creation. Contains comprehensive validation, schema discovery, and execution results to help users create tools successfully.\n"
