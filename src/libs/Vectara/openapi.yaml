          type: string
      - name: page_key
        in: query
        description: Used to retrieve the next page of documents after the limit has
          been reached.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: The response contains an array of document objects with the
            matching document IDs, metadata, tables, parts, storage usage, and metadata
            about the pagination.
          content:
            application/json:
              schema:
