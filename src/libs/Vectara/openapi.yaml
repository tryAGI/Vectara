          callback_access_token:
            description: 'Optional access token issued by Zoom for the callback URL.
              When

              set, reply POSTs carry it as a bearer Authorization header.

              Encrypted at rest.

              '
            type: string
            example: kP9mW2nR7sT1vX6cB3dF8gH5jL0qYzA4eU7iO2xK
          typing_duration_seconds:
            description: 'How long the typing indicator returned by the webhook runs
