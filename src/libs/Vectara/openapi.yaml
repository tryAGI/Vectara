  /v2/tools:
    post:
      tags:
      - Tools
      summary: Create tool
      x-required-roles:
      - type: AgentRole
        roles:
        - agent_developer
        - agent_administrator
      - type: ApiRole
        roles:
        - agent_developer
        - agent_administrator
        - administrator
        - owner
      description: "Create a new tool that agents can call. Tools give agents capabilities\
        \ to interact with external systems, process data, query corpora, or run custom\
        \ logic. Agents select and invoke tools dynamically based on their instructions\
        \ and the current session.\n\nVectara provides several built-in tools, but\
        \ you can also create your own. This endpoint currently supports creating\
        \ **Lambda tools**, which run user-defined Python functions in a secure sandbox.\n\
        \nA lambda tool can declare its own `tool_configurations`: named configurations\
        \ of other tools that the lambda tool's Python code calls as functions through\
        \ the built-in `tool` module. They stay private to the tool, and `$ref` values\
        \ in their `argument_override` resolve against the hosting agent and session.\
        \ See `CreateLambdaToolRequest.tool_configurations` for the contract and examples.\n\
        \nEach tool is defined by:\n- A unique tool ID\n- A description of its purpose\n\
        - An input schema describing accepted parameters\n- Optional metadata\n- Enabled/disabled\
        \ runtime availability\n\n ## Artifact-based tools\nSome built-in tools work\
        \ with artifacts stored in a session:\n- **Document conversion tool**: Converts\
        \ file artifacts (PDF, Word, PowerPoint, images with OCR support) to markdown\
        \ and produces new artifacts containing the extracted content.\n\nThese built-in\
        \ tools operate on artifact references rather than file content, supporting\
        \ multi-step workflows where agents process or index user-uploaded documents.\n"
      operationId: createTool
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateToolRequest'
      responses:
        '201':
          description: The tool has been created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          description: Tool creation request was malformed or contains invalid configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Permissions do not allow creating tools.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A tool with this name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-fern-sdk-group-name: tools
      x-fern-sdk-method-name: create
    get:
      tags:
      - Tools
      summary: List tools
      x-required-roles:
      - type: AgentRole
