        corresponding `client_tool_pending` event is delivered only on the live event
        stream and is not returned by `listAgentEvents`; this endpoint is the durable
        way to recover the pending calls after a reconnect. Submit one `tool_output`
        per returned `event_id` (via the create-input endpoint) to resume the session.'
