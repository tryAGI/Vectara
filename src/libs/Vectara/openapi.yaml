    SubAgentSessionMode:
      description: 'Controls session behavior for sub-agent invocations:

        - `ephemeral`: Creates a new session on every invocation. Never resumes.

        - `persistent`: Reuses one session per (parent session, tool configuration)
        pair, created on first invocation. Two `persistent` configurations on the
        same agent keep separate sessions.

        - `session_scoped`: Resumes the session named by `session_key`, if provided;
        otherwise creates a new one. Only the parent session that originally created
        the named session may resume it. Scope is enforced by parent session and target
        sub-agent, not by tool configuration.

        - `agent_scoped`: Like `session_scoped`, but any session of the creating agent
        may resume the named session. Scope is enforced by creating agent and target
        sub-agent.

        - `llm_controlled`: Deprecated alias for `session_scoped`. Use `session_scoped`
        for new agents.

        '
      type: string
      enum:
      - ephemeral
      - persistent
      - session_scoped
      - agent_scoped
      - llm_controlled
      default: ephemeral
      example: ephemeral
