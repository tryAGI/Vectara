                  search:
                    corpora:
                      - corpus_key: fin_docs
                        metadata_filter: doc.type = 'equity_policy' AND doc.country = 'CA' AND (doc.year = 2022 OR doc.year = 2024)
                        lexical_interpolation: 0.005
                        limit: 50
                    context_configuration:
                      sentences_before: 2
