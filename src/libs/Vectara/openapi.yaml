          title: Invoice Line Items
          data:
            headers:
            - - text_value: Item
              - text_value: Quantity
              - text_value: Unit Price
              - text_value: Total
            rows:
            - - text_value: Widget A
              - int_value: 5
              - float_value: 100.15
              - float_value: 500.75
            - - text_value: Widget B
              - int_value: 3
              - float_value: 250
              - float_value: 750
