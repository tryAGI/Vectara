        token:
          type: string
          description: The bearer token to use for authentication
          example: abcdef......
      description: Bearer token authentication
      x-vectaraParents:
        - RemoteAuth
        - AnthropicAuth
    HeaderAuth:
      required:
        - type
        - header
        - value
      type: object
      properties:
        type:
          type: string
          description: Must be "header" for header-based auth
          default: header
          example: header
        header:
          type: string
          description: The header name to use (e.g. x-api-key)
          example: x-api-key
        value:
          type: string
          description: The header value to use
          example: sk-ant.....
      description: Custom header-based authentication
      x-vectaraParents:
        - RemoteAuth
        - AnthropicAuth
    RemoteAuth:
      required:
        - type
      type: object
      oneOf:
        - $ref: '#/components/schemas/BearerAuth'
        - $ref: '#/components/schemas/HeaderAuth'
