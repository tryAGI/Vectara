      discriminator:
        propertyName: type
        mapping:
          lambda: '#/components/schemas/CreateLambdaToolRequest'
    TestLambdaToolRequest:
      required:
        - code
        - test_input
      type: object
      properties:
        language:
          enum:
            - python
