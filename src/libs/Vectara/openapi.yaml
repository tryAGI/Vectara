openapi: 3.0.4
info:
  title: Vectara REST API v2
  description: "REST APIs provide a traditional integration path for web-based applications.\nYou can find all of our APIs at `https://api.vectara.io/v2/<api-endpoint>` The API endpoints are outlined in the various subsections of this API Reference section and are designed to be intuitive and follow a standard RESTful structure.\n\n- The current version is **v2**.\n- `api-endpoint` follows a hierarchical structure, using lowercase and hyphens.\n  For example, `/corpora/:corpus_key/documents`.\n"
  termsOfService: https://vectara.com/legal/terms-of-service/
  contact:
    email: feedback@vectara.com
  version: 2.0.0
  x-logo:
    url: https://docs.vectara.com/img/vectara_wordmark.png
    altText: Vectara
  x-dark-logo:
    url: https://docs.vectara.com/img/vectara_wordmark_light.png
    altText: Vectara
servers:
  - url: https://api.vectara.io
paths:
  /v2/corpora:
    post:
      tags:
        - Corpora
      summary: Create a corpus
      description: "The Create Corpus API lets you create a corpus to store and manage your documents. A corpus is a container for documents and their associated metadata. When creating a corpus, you can specify various settings such as the corpus key, name, description, encoder, and filter attributes.\n\n## Corpus object\n\nWhen you create a `corpus` object, the `corpus_key` property is required to uniquely identify the corpus. The `name` parameter is optional and defaults to the value of `key`. The optional `description` properties lets you provide additional information about the corpus. When creating a new corpus, you also have the flexibility to specify a custom `corpus_key` that follows a naming convention of your choice. This allows you to assign easily identifiable keys to your corpora, making it easier to manage and reference them in your application.\n\nYou can specify whether to treat queries or documents in the corpus as questions or answers using the `queries_are_answers` and `documents_are_questions` boolean properties. These settings affect the semantics of the encoder used at query time and indexing time.\n\n## Add metadata as filter attributes\n\nWhen creating a corpus with this endpoint or the Vectara Console, you define metadata fields using the `filter_attributes` object. This ensures the corpus supports filtering on specific metadata attributes, either at the document level or the part level.\n\nFilter attributes enable you to attach metadata to your data at the document (`doc`) or `part` level, which you can use later in filter expressions to narrow the scope of your queries. A filter attribute must specify a unique `name` (up to 64 characters long), and a `level` which indicates whether it exists in the `doc` or `part` level metadata. At indexing time, metadata with this name is extracted and made available for filter expressions to operate on. [Learn more](https://docs.vectara.com/docs/build/prepare-data/metadata-filters)\n\n### Doc and part filter levels\n\nThe `doc` attribute applies to the entire document. Use this for metadata that is consistent across the whole document, such as author, publication date, and document ID.\n\nThe `part` attribute applies to specific sections or chunks within a document. Use for metadata that may vary within different parts of the document, such as sections, page numbers, and sentiment scores.\n\nIf `indexed` is true, the system will build an index on the extracted values to further improve the performance of filter expressions involving the attribute.\n\nFilter attributes must specify a `type`, which is validated when documents are indexed. The four supported types are `integer`, which stores signed whole-number values up to eight bytes in length; `real`, for storing floating point values in [IEEE 754 8-byte format]; `text` for storing textual strings in [UTF-8 encoding], and `boolean` for storing true/false values.\n\nAfter you define filter attributes, you can use them within your queries. For example:\n* Document-level attribute: `doc.publication_year > 2020`\n* Part-level attribute: `part.sentiment_score > 0.7`\n\n## Custom dimensions \nCustom dimensions let you add additional context to your data that contain user-defined values in addition to what Vectara automatically extracts and stores from the text. For example, *upvotes* can be a custom dimension. For example, see [Add custom dimensions to boost content](/docs/tutorials/add-custom-dimensions).\"\n"
      operationId: createCorpus
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCorpusRequest'
            examples:
              Financial:
                summary: Create a corpus for storing financial documents related to ESG compliance in EU banks.
                value:
                  key: fin_esg_docs
                  name: EU Bank ESG Compliance
                  description: 'A corpus for storing and querying financial documents, such as annual reports and ESG compliance filings, for European banks in 2023.'
                  save_history: true
                  encoder_name: boomerang-2023-q3
                  filter_attributes:
                    - level: part
                      name: industry
                      type: text
                      description: The industry sector of the document (banking).
                      indexed: true
                    - level: part
                      name: region
                      type: text
                      description: The geographical region of the document (EU).
                      indexed: true
                    - level: part
                      name: year
                      type: integer
                      description: The publication year of the document (2023).
                      indexed: true
                    - level: part
                      name: doc_type
                      type: text
                      description: The type of document (annual_report).
                      indexed: true
              Legal:
                summary: Create a corpus for legal documents focusing on intellectual property cases in California.
                value:
                  key: legal_ip_cases
                  name: California IP Case Law
                  description: 'A corpus for indexing and searching legal documents related to intellectual property rights cases in California, including court rulings and contracts.'
                  save_history: true
                  encoder_name: boomerang-2023-q3
                  filter_attributes:
                    - level: part
                      name: jurisdiction
                      type: text
                      description: The legal jurisdiction of the document (California).
                      indexed: true
                    - level: part
                      name: legal_domain
                      type: text
                      description: The legal domain of the document (IP).
                      indexed: true
                    - level: part
                      name: year
                      type: integer
                      description: The year of the case or document (2023).
                      indexed: true
                    - level: part
                      name: case_name
                      type: text
                      description: The name of the legal case (TechCo v. Ex-Employee).
                      indexed: true
              Support:
                summary: Create a corpus for technical support knowledge base articles addressing web portal issues.
                value:
                  key: support_web_portal
                  name: Web Portal Support KB
                  description: 'A corpus for storing knowledge base articles to troubleshoot issues in a web portal application, focusing on part-level metadata for precise query filtering.'
                  save_history: true
                  encoder_name: boomerang-2023-q3
                  filter_attributes:
                    - name: product
                      level: part
                      type: text
                      description: The product or application (portal_app).
                      indexed: true
                    - name: browser
                      level: part
                      type: text
                      description: The browser used (chrome).
                      indexed: true
                    - name: category
                      level: part
                      type: text
                      description: 'The issue category (sso, caching).'
                      indexed: true
      responses:
        '201':
          description: The response message returns a unique `id` that you use to reference the corpus. The `name` does not need to be unique within an account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Corpus'
              examples:
                Financial:
                  summary: Newly created corpus for EU bank ESG compliance documents.
                  value:
                    id: crp_1001
                    key: fin_esg_docs
                    name: EU Bank ESG Compliance
                    description: 'A corpus for storing and querying financial documents, such as annual reports and ESG compliance filings, for European banks in 2023.'
                    enabled: true
                    save_history: true
                    queries_are_answers: false
                    documents_are_questions: false
                    encoder_name: boomerang-2023-q3
                    filter_attributes:
                      - level: document
                        name: industry
                        type: text
                        description: The industry sector of the document (banking).
                        indexed: true
                      - level: document
                        name: region
                        type: text
                        description: The geographical region of the document (EU).
                        indexed: true
                      - level: document
                        name: year
                        type: integer
                        description: The publication year of the document (2023).
                        indexed: true
                      - level: document
                        name: doc_type
                        type: text
                        description: The type of document (annual_report).
                        indexed: true
                    limits:
                      used_docs: 0
                      used_parts: 0
                      used_bytes: 0
                      used_characters: 0
                      max_bytes: 0
                      max_metadata_bytes: 1048576
                      index_rate: 0
                    created_at: '2025-06-17T15:10:00.0000000+00:00'
                Legal:
                  summary: Newly created corpus for California intellectual property case law.
                  value:
                    id: crp_1002
                    key: legal_ip_cases
                    name: California IP Case Law
                    description: 'A corpus for indexing and searching legal documents related to intellectual property rights cases in California, including court rulings and contracts.'
                    enabled: true
                    save_history: true
                    queries_are_answers: false
                    documents_are_questions: false
                    encoder_name: boomerang-2023-q3
                    filter_attributes:
                      - level: document
                        name: jurisdiction
                        type: text
                        description: The legal jurisdiction of the document (California).
                        indexed: true
                      - level: document
                        name: legal_domain
                        type: text
                        description: The legal domain of the document (IP).
                        indexed: true
                      - level: document
                        name: year
                        type: integer
                        description: The year of the case or document (2023).
                        indexed: true
                      - level: document
                        name: case_name
                        type: text
                        description: The name of the legal case (TechCo v. Ex-Employee).
                        indexed: true
                    limits:
                      used_docs: 0
                      used_parts: 0
                      used_bytes: 0
                      used_characters: 0
                      max_bytes: 0
                      max_metadata_bytes: 1048576
                      index_rate: 0
                    created_at: '2025-06-17T15:10:00.0000000+00:00'
                Support:
                  summary: Newly created corpus for web portal technical support knowledge base.
                  value:
                    id: crp_1003
                    key: support_web_portal
                    name: Web Portal Support KB
                    description: 'A corpus for storing knowledge base articles to troubleshoot issues in a web portal application, focusing on part-level metadata for precise query filtering.'
                    enabled: true
                    save_history: true
                    queries_are_answers: false
                    documents_are_questions: false
                    encoder_name: boomerang-2023-q3
                    filter_attributes:
                      - name: product
                        level: part
                        type: text
                        description: The product or application (portal_app).
                        indexed: true
                      - name: browser
                        level: part
                        type: text
                        description: The browser used (chrome).
                        indexed: true
                      - name: category
                        level: part
                        type: text
                        description: 'The issue category (sso, caching).'
                        indexed: true
                    limits:
                      used_docs: 0
                      used_parts: 0
                      used_bytes: 0
                      used_characters: 0
                      max_bytes: 0
                      max_metadata_bytes: 1048576
                      index_rate: 0
                    created_at: '2025-06-17T15:10:00.0000000+00:00'
        '400':
          description: Invalid request body in the create corpus request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Permissions do not allow creating a corpus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: The corpus already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-supported-api-key-type:
        - Personal
      x-fern-sdk-group-name: corpora
      x-fern-sdk-method-name: create
    get:
      tags:
        - Corpora
      summary: List corpora
      description: "The List Corpora API lets you retrieve a list of corpora in your account. This endpoint returns a paginated list of corpora objects, which contain basic information about each corpus. The returned corpus objects contain less detail compared to those retrieved the direct corpus retrieval operation.\n\nYou can specify optional parameters to control the pagination and filtering of the results. The limit parameter determines the maximum number of corpora to return, with a default value of 10 and a maximum value of 100.\n"
      operationId: listCorpora
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: limit
          in: query
          description: The maximum number of corpora to return at one time.
          schema:
            maximum: 100
            minimum: 1
            type: integer
            format: int32
            default: 10
        - name: filter
          in: query
          description: A regular expression to filter the corpora by their name or summary.
          schema:
            type: string
          example: Vectara Content
        - name: corpus_id
          in: query
          description: Filter corpora to only include corpora with these IDs.
          schema:
            type: array
            items:
              pattern: 'crp_[0-9]+$'
              type: string
          example:
            - crp_12345
        - name: page_key
          in: query
          description: Used to retrieve the next page of corpora after the limit has been reached.
          schema:
            type: string
      responses:
        '200':
          description: The response includes an array of `corpora` objects with matching `corpora` and `metadata`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCorporaResponse'
              examples:
                Legal:
                  summary: 'List of corpora containing legal documents, such as employment contracts and non-disclosure agreements, with metadata filters for jurisdiction and document type to support precise querying for legal analysis'
                  value:
                    corpora:
                      - id: crp_12345
                        key: legal-contracts-2025
                        name: Legal Contracts
                        description: 'Corpus for storing and querying employment contracts and legal agreements, primarily for Delaware and California jurisdictions.'
                        enabled: true
                        chat_history_corpus: false
                        queries_are_answers: false
                        documents_are_questions: false
                        encoder_name: boomerang-2023-q3
                        save_history: true
                        filter_attributes:
                          - name: jurisdiction
                            level: document
                            description: The legal jurisdiction of the contract.
                            indexed: true
                            type: text
                          - name: type
                            level: document
                            description: 'The type of legal document (employment_contract, nda).'
                            indexed: true
                            type: text
                        limits:
                          used_docs: 150
                          used_parts: 4500
                          used_characters: 2500000
                          max_metadata_bytes: 10485760
                          index_rate: 0
                        created_at: '2025-06-27T13:47:00.0000000+00:00'
                    metadata:
                      page_key: page_legal_001
                Finance:
                  summary: 'List of corpora storing financial reports and equity policies for banking and tech sectors, with metadata filters for sector and reporting period to enable targeted financial analysis'
                  value:
                    corpora:
                      - id: crp_67890
                        key: fin-reports-2025
                        name: Financial Reports
                        description: 'Corpus for quarterly financial reports and equity compensation policies, focused on banking and technology sectors in North America.'
                        enabled: true
                        chat_history_corpus: false
                        queries_are_answers: false
                        documents_are_questions: false
                        encoder_name: boomerang-2023-q3
                        save_history: true
                        filter_attributes:
                          - name: sector
                            level: document
                            description: 'The industry sector of the financial report (Banking, Technology).'
                            indexed: true
                            type: text
                          - name: quarter
                            level: document
                            description: The reporting quarter (Q1-2025).
                            indexed: true
                            type: text
                        limits:
                          used_docs: 200
                          used_parts: 6000
                          used_characters: 3500000
                          max_metadata_bytes: 10485760
                          index_rate: 0
                        created_at: '2025-06-27T13:48:00.0000000+00:00'
                    metadata:
                      page_key: page_fin_002
                Support:
                  summary: 'List of corpora designed for storing chat-based support ticket interactions, with metadata filters for issue type and platform to facilitate troubleshooting and analysis of customer support queries'
                  value:
                    corpora:
                      - id: crp_98765
                        key: support-tickets-2025
                        name: Support Tickets
                        description: 'Corpus for storing chat-based support ticket interactions, particularly for authentication and web portal issues on Chrome and other platforms.'
                        enabled: true
                        chat_history_corpus: true
                        queries_are_answers: false
                        documents_are_questions: false
                        encoder_name: boomerang-2023-q3
                        save_history: true
                        filter_attributes:
                          - name: issue
                            level: document
                            description: 'The type of support issue (auth_token_stale, login_error).'
                            indexed: true
                            type: text
                          - name: platform
                            level: document
                            description: 'The platform where the issue occurred (web_portal, mobile_app).'
                            indexed: true
                            type: text
                        limits:
                          used_docs: 500
                          used_parts: 10000
                          used_characters: 5000000
                          max_metadata_bytes: 10485760
                          index_rate: 0
                        created_at: '2025-06-27T13:49:00.0000000+00:00'
                    metadata:
                      page_key: page_support_003
        '403':
          description: Permissions do not allow listing corpora.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-supported-api-key-type:
        - QueryService
        - Personal
      x-fern-sdk-group-name: corpora
      x-fern-sdk-method-name: list
      x-fern-pagination:
        cursor: $request.page_key
        next_cursor: $response.metadata.page_key
        results: $response.corpora
  '/v2/corpora/{corpus_key}':
    get:
      tags:
        - Corpora
      summary: Retrieve metadata about a corpus
      description: "The Get Corpus API lets you view metadata about a specific corpus. This is useful for getting information about a corpus without performing a search. This operation does not search the corpus contents. Specify the `corpus_key` to identify the corpus whose metadata you want to retrieve.\n\nThis endpoint helps administrators understand the access control details and monitor the size of corpora to understand information like the amount of quota consumed. You can also use this information for optimizing search and storage utilization.\n\nFor example, you can track the read and write activity of a specific corpus which can help you change your security strategy proactively. You noticed a corpus with an API key with read/write access that is only being used for high volume reads. You may decide to switch to a read-only key.\n\nIn another case, you might respond to a security incident by disabling a specific corpus because of information returned by this endpoint.\n\n## Get the number of documents or document parts in a corpus\n\nTracking the usage of documents in a corpus enables adminstrators to manage resource allocation efficiently. Monitoring corpus metrics also helps data usage stay within allocated quotas and identify trends in document growth and document segmentation.\n\nThe `limit` object in the response provides comprehensive information about the current usage and limits of a corpus including the number of stored documents, document parts, and character count.\n"
      operationId: getCorpus
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: corpus_key
          in: path
          description: The unique key identifying the corpus to retrieve.
          required: true
          schema:
            $ref: '#/components/schemas/CorpusKey'
          examples:
            Financial:
              summary: Retrieve metadata for the EU bank ESG compliance corpus
              value: fin_esg_docs
            Legal:
              summary: Retrieve metadata for the California IP case law corpus
              value: legal_ip_cases
            Support:
              summary: Retrieve metadata for the web portal support knowledge base corpus
              value: support_web_portal
      responses:
        '200':
          description: 'The response includes details such as the corpus ID, key, name, description, enabled status, encoder information, filter attributes, custom dimensions, and usage limits.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Corpus'
              examples:
                Financial:
                  summary: Metadata for the EU bank ESG compliance corpus
                  value:
                    id: crp_1001
                    key: fin_esg_docs
                    name: EU Bank ESG Compliance
                    description: 'A corpus for storing and querying financial documents, such as annual reports and ESG compliance filings, for European banks in 2023.'
                    enabled: true
                    save_history: true
                    queries_are_answers: false
                    documents_are_questions: false
                    encoder_name: boomerang-2023-q3
                    filter_attributes:
                      - name: industry
                        type: text
                        level: document
                        description: The industry sector of the document (banking).
                        indexed: true
                      - name: region
                        type: text
                        level: document
                        description: The geographical region of the document (EU).
                        indexed: true
                      - name: year
                        type: integer
                        level: document
                        description: The publication year of the document (2023).
                        indexed: true
                      - name: doc_type
                        type: text
                        level: document
                        description: The type of document (annual_report).
                        indexed: true
                    limits:
                      used_docs: 150
                      used_parts: 4500
                      used_bytes: 0
                      used_characters: 1200000
                      max_bytes: 0
                      max_metadata_bytes: 1048576
                      index_rate: 0
                    created_at: '2025-06-17T15:10:00.0000000+00:00'
                Legal:
                  summary: Metadata for the California IP case law corpus
                  value:
                    id: crp_1002
                    key: legal_ip_cases
                    name: California IP Case Law
                    description: 'A corpus for indexing and searching legal documents related to intellectual property rights cases in California, including court rulings and contracts.'
                    enabled: true
                    save_history: true
                    queries_are_answers: false
                    documents_are_questions: false
                    encoder_name: boomerang-2023-q3
                    filter_attributes:
                      - name: jurisdiction
                        type: text
                        level: document
                        description: The legal jurisdiction of the document (California).
                        indexed: true
                      - name: legal_domain
                        type: text
                        level: document
                        description: The legal domain of the document (IP).
                        indexed: true
                      - name: year
                        type: integer
                        level: document
                        description: The year of the case or document (2023).
                        indexed: true
                      - name: case_name
                        type: text
                        level: document
                        description: The name of the legal case (TechCo v. Ex-Employee).
                        indexed: true
                    limits:
                      used_docs: 200
                      used_parts: 6000
                      used_bytes: 0
                      used_characters: 1800000
                      max_bytes: 0
                      max_metadata_bytes: 1048576
                      index_rate: 0
                    created_at: '2025-06-17T15:10:00.0000000+00:00'
                Support:
                  summary: Metadata for the web portal support knowledge base corpus
                  value:
                    id: crp_1003
                    key: support_web_portal
                    name: Web Portal Support KB
                    description: 'A corpus for storing knowledge base articles to troubleshoot issues in a web portal application, focusing on part-level metadata for precise query filtering.'
                    enabled: true
                    save_history: true
                    queries_are_answers: false
                    documents_are_questions: false
                    encoder_name: boomerang-2023-q3
                    filter_attributes:
                      - name: product
                        type: text
                        level: part
                        description: The product or application (portal_app).
                        indexed: true
                      - name: browser
                        type: text
                        level: part
                        description: The browser used (chrome).
                        indexed: true
                      - name: category
                        type: text
                        level: part
                        description: 'The issue category (sso, caching).'
                        indexed: true
                    limits:
                      used_docs: 100
                      used_parts: 3000
                      used_bytes: 0
                      used_characters: 900000
                      max_bytes: 0
                      max_metadata_bytes: 1048576
                      index_rate: 0
                    created_at: '2025-06-17T15:10:00.0000000+00:00'
        '403':
          description: Permissions do not allow retrieving the corpus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Corpus not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
      x-supported-api-key-type:
        - QueryService
        - Personal
      x-fern-sdk-group-name: corpora
      x-fern-sdk-method-name: get
    delete:
      tags:
        - Corpora
      summary: Delete a corpus and all its data
      description: "Permanently delete a corpus and all its associated data. The `corpus_key` uniquely identifies the corpus. \n\nUpon successful completion, space quota consumed by the corpus will be freed, and the corpus will no longer be useable for future indexing or querying.\n\n:::note\nThe corpus_key assigned to the corpus will be released and can be reused.\n:::\n"
      operationId: deleteCorpus
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: corpus_key
          in: path
          description: The unique key identifying the corpus to delete.
          required: true
          schema:
            $ref: '#/components/schemas/CorpusKey'
      responses:
        '204':
          description: Successfully deleted a corpus.
        '403':
          description: Permissions do not allow deleting the corpus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Corpus not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
      x-supported-api-key-type:
        - Personal
      x-fern-sdk-group-name: corpora
      x-fern-sdk-method-name: delete
    patch:
      tags:
        - Corpora
      summary: Update a corpus
      description: "The Update Corpus API lets you enable, disable, or update the name and description of a corpus. This is useful to manage the availability of data within the system, such as when you need to take the corpus offline without having to delete the corpus.\n\nThis lets you utilize automated scripts to programmatically control the availability of corpora based on certain conditions. For example, quickly disable a corpus for maintenance updates or in response to security incidents.\n"
      operationId: updateCorpus
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: corpus_key
          in: path
          description: The unique key identifying the corpus to update.
          required: true
          schema:
            $ref: '#/components/schemas/CorpusKey'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCorpusRequest'
      responses:
        '200':
          description: Successfully modified the corpus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Corpus'
        '403':
          description: Permissions do not allow updating the corpus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Corpus not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
      x-supported-api-key-type:
        - Personal
      x-fern-sdk-group-name: corpora
      x-fern-sdk-method-name: update
  '/v2/corpora/{corpus_key}/reset':
    post:
      tags:
        - Corpora
      summary: Remove all documents and data in a corpus
