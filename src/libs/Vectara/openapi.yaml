        '403':
          description: Permissions do not allow listing documents in the corpus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Corpus not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
      x-fern-sdk-group-name: documents
      x-fern-sdk-method-name: list
      x-fern-pagination:
        cursor: $request.page_key
        next_cursor: $response.metadata.page_key
        results: $response.documents
    delete:
      tags:
      - Documents
      summary: Bulk delete documents from a corpus
      x-required-roles:
      - type: CorpusRole
        roles:
        - editor
        - administrator
        - owner
      - type: ApiRole
        roles:
        - corpus_developer
        - corpus_administrator
        - administrator
        - owner
      description: 'Initiates an asynchronous bulk delete operation for documents
        in a corpus.

        This operation accepts a metadata filter, a list of specific document IDs,
        or both.


        **Important**: This is a best-effort operation.

        See the response schema documentation for details on the behavior differences
        between `metadata_filter` and `document_ids` parameters.


        The operation runs as a background workflow.

        Use the returned `job_id` to track progress via the Jobs API.

        '
      operationId: bulkDeleteCorpusDocuments
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      - in: path
        name: corpus_key
        description: The unique key identifying the corpus containing documents to
          delete.
        required: true
        schema:
          $ref: '#/components/schemas/CorpusKey'
      - name: metadata_filter
        in: query
        description: 'Filter documents by metadata. Uses the same expression as a
          query metadata filter.

          Example: `doc.status = ''archived'' AND doc.year < 2020`

          '
        required: false
        schema:
          type: string
      - name: document_ids
        in: query
        description: Comma-separated list of document IDs to delete. Maximum 10,000
          IDs per request.
        required: false
        schema:
          type: string
      - name: async
        in: query
        description: 'Whether to perform the deletion asynchronously.

          - `true` (default): Returns immediately with job_id to track progress (HTTP
          202)

          - `false`: Waits for completion and returns deletion results (HTTP 200)


          When `async=false`, the operation will wait for the deletion to complete
          up to the timeout specified in the `Request-Timeout` or `Request-Timeout-Millis`
          header.

          If no timeout header is provided, defaults to 7 days.

          If the operation times out, returns HTTP 504 with job_id to track via Jobs
          API.


          The workflow continues running in the background even if the API wait times
          out.

          '
        required: false
        schema:
          type: boolean
          default: true
      responses:
        '200':
          description: Bulk delete operation completed successfully (synchronous mode).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteDocumentsResponse'
        '202':
          description: Bulk delete operation accepted and queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteDocumentsResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Permissions do not allow bulk deleting documents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Corpus not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '504':
          description: Synchronous operation timed out. The error message contains
            the job_id to track status via Jobs API. Workflow continues running in
            background.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-fern-sdk-group-name: documents
      x-fern-sdk-method-name: bulk_delete
