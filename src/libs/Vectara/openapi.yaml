          structured_indexing: '#/components/schemas/StructuredIndexingTool'
          sub_agent: '#/components/schemas/SubAgentTool'
          artifact_create: '#/components/schemas/ArtifactCreateTool'
          artifact_read: '#/components/schemas/ArtifactReadTool'
          artifact_grep: '#/components/schemas/ArtifactGrepTool'
          image_read: '#/components/schemas/ImageReadTool'
          document_conversion: '#/components/schemas/DocumentConversionTool'
          get_document_text: '#/components/schemas/GetDocumentTextTool'
