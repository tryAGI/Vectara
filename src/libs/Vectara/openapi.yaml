    CreateInstructionRequest:
      description: Request to create an instruction. Currently only initial instructions
        are supported.
      discriminator:
        propertyName: type
        mapping:
          initial: '#/components/schemas/CreateInitialInstructionRequest'
      oneOf:
      - $ref: '#/components/schemas/CreateInitialInstructionRequest'
    UpdateInitialInstructionRequest:
      description: Request object for updating an existing initial instruction.
      type: object
      properties:
        type:
          description: The type of instruction to update.
          type: string
          default: initial
          example: initial
        name:
          $ref: '#/components/schemas/InstructionName'
        description:
          description: A detailed description of what this instruction does.
          type: string
          example: Enhanced initial context and guidelines for customer support interactions
        template:
          $ref: '#/components/schemas/InstructionTemplate'
        template_type:
          $ref: '#/components/schemas/TemplateType'
        metadata:
          description: Arbitrary metadata associated with the instruction.
          type: object
          additionalProperties: true
          example:
            version: 1.1.0
            author: support-team
            last_reviewed: '2024-01-15'
        enabled:
          description: Whether the instruction is enabled.
          type: boolean
          example: true
      required:
      - type
      x-vectaraParents:
      - UpdateInstructionRequest
    UpdateInstructionRequest:
      description: Request to update an instruction. Currently only initial instructions
        are supported.
      discriminator:
        propertyName: type
        mapping:
          initial: '#/components/schemas/UpdateInitialInstructionRequest'
      oneOf:
      - $ref: '#/components/schemas/UpdateInitialInstructionRequest'
    TestInstructionRequest:
      description: Request to test an instruction with provided context data.
      type: object
      properties:
        context:
          description: 'Context data to use when rendering the instruction template.
            This will be merged into `$session.metadata` for template access.


            Example: If you provide `{"currentDate": "2024-01-15"}`, you can access
            it in the template as `$session.metadata.currentDate`.

            '
          type: object
          additionalProperties: true
          example:
            currentDate: '2024-01-15'
            companyName: Acme Corp
        tools:
          description: List of tools to include in the instruction context for testing.
          type: array
          items:
            $ref: '#/components/schemas/Tool'
          default: []
          example: []
    TestInstructionResponse:
      description: Response containing the rendered instruction.
      type: object
      properties:
        rendered_instruction:
          description: The instruction template rendered with the provided context.
          type: string
          example: 'You are a helpful customer support agent for Acme Corp. Today''s
            date is 2024-01-15. You have access to the following tools: Web Search,
            Email Sender'
      required:
      - rendered_instruction
    AgentName:
      description: The human-readable name of an agent.
      type: string
      minLength: 1
      maxLength: 50
      example: Customer Support Agent
    AgentSkill:
      title: AgentSkill
      description: 'A skill that provides progressively disclosed instructions to
        an agent; it allows the agent to access more instructions without

        always being within the system scope. Additionally, skills are explicitly
        loaded as an input event rather than normal text input event.

        Skills are defined at the agent level and can be filtered per step via allowed_skills.

        The skill key and description are shown to the agent in its instructions;

        the full content is sent as a user message when the skill is invoked via the
        invoke_skill tool.

        '
      type: object
      properties:
        description:
          description: A brief description of what the skill does, shown to the agent
            in its instructions.
          type: string
          maxLength: 500
          example: Reviews code for best practices, bugs, and security issues.
        when_to_use:
          description: 'Trigger conditions describing when the agent should invoke
            this skill, such as concrete user situations or

            phrases that should cause the skill to load. Used alongside the description
            when the agent decides which

            skill to invoke.

            '
          type: string
          maxLength: 500
          example: Use when the user asks to review, audit, or check code, or mentions
            "bugs", "security", or "best practices".
        content:
          description: 'The full instruction content for this skill.

            This is NOT shown in the instructions by default; it is loaded when the
            skill is invoked.

            '
          type: string
          maxLength: 50000
          example: When reviewing code, check for security vulnerabilities, performance
            issues, and adherence to best practices...
      required:
      - description
      - content
    RetryConfiguration:
      title: RetryConfiguration
      description: Configuration for automatic retry of failed LLM requests with exponential
        backoff.
      type: object
      properties:
        enabled:
          description: Whether retry is enabled. Enabled by default to provide resilience
            against transient failures.
          type: boolean
          default: true
          example: true
        max_retries:
          description: Maximum number of retry attempts after initial failure.
          type: integer
          minimum: 0
          maximum: 10
          default: 3
          example: 3
        initial_backoff_ms:
          description: Initial backoff time in milliseconds before first retry.
          type: integer
          minimum: 100
          maximum: 60000
          default: 1000
          example: 1000
        max_backoff_ms:
          description: Maximum backoff time in milliseconds between retries.
          type: integer
          minimum: 1000
          maximum: 300000
          default: 30000
          example: 30000
        backoff_factor:
          description: Multiplication factor for exponential backoff between retries.
          type: number
          format: double
          minimum: 1
          maximum: 10
          default: 2
          example: 2
    AgentModel:
      title: AgentModel
      description: Configuration for the model used in this step, including the model
        name and arbitrary parameters.
      type: object
      properties:
        name:
          description: The name of the model to use for this step.
          type: string
          example: gpt-4
        parameters:
          description: Arbitrary model-specific parameters that can be passed to the
            model.
          type: object
          additionalProperties: true
          example:
            temperature: 0.7
            max_tokens: 1000
            top_p: 0.9
        retry_configuration:
          $ref: '#/components/schemas/RetryConfiguration'
          description: Optional retry configuration for handling transient failures.
            When not provided, no retry is performed.
      required:
      - name
    InstructionReference:
      description: A reference to an instruction that can be used by an agent. If
        version is not specified, the latest version will be used. Note that when
        the instruction is updated, agents using it will need to be updated to reference
        the new version explicitly.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/InstructionId'
        version:
          description: The specific version of the instruction to use. If not specified,
            the latest version will be used.
          type: integer
          minimum: 1
          example: 1
      required:
      - id
    ReferenceInstruction:
      title: ReferenceInstruction
      description: An instruction specified by reference.
      allOf:
      - $ref: '#/components/schemas/InstructionReference'
      - type: object
        properties:
          type:
            type: string
            description: The type of instruction, used for discrimination.
            default: reference
        required:
        - type
      x-vectaraParents:
      - AgentStepInstruction
    InlineInstruction:
      title: InlineInstruction
      description: An instruction defined inline in the request.
      allOf:
      - $ref: '#/components/schemas/InstructionRequestBase'
      - type: object
        properties:
          type:
            type: string
            description: The type of instruction, used for discrimination.
            default: inline
        required:
        - type
      x-vectaraParents:
      - AgentStepInstruction
    AgentStepInstruction:
      title: AgentStepInstruction
      description: An instruction that can be used in an agent step, either by reference,
        defined inline, or using a Vectara built-in instruction.
      discriminator:
        propertyName: type
        mapping:
          reference: '#/components/schemas/ReferenceInstruction'
          inline: '#/components/schemas/InlineInstruction'
      oneOf:
      - $ref: '#/components/schemas/ReferenceInstruction'
      - $ref: '#/components/schemas/InlineInstruction'
      example:
      - type: reference
        name: Customer Support Initial Instruction
        version: 1
      - type: inline
        name: Temporary On-the-fly Guideline
        description: A special instruction for this specific step only.
        template_type: velocity
        template: Please prioritize issues tagged with 'urgent' for the next hour.
    DefaultOutputParser:
      title: DefaultOutputParser
      description: Uses native tool calling capabilities and returns output directly
        to the user. This parser leverages the underlying model's built-in tool calling
        functionality and passes responses through without additional processing.
      type: object
      properties:
        type:
          description: The type of output parser, which is always 'default' for this
            parser type.
          type: string
          default: default
          example: default
      required:
      - type
      x-vectaraParents:
      - AgentOutputParser
    StructuredOutputParser:
      title: StructuredOutputParser
      description: 'Parses agent output as structured JSON conforming to a specified
        schema.

        Uses the model''s native structured outputs capability to guarantee valid
        JSON

        that adheres to the provided schema. This is useful when you need the agent''s

        final response in a specific format for downstream processing.


        When this parser is configured, the agent emits a StructuredOutputEvent instead

        of AgentOutputEvent. The StructuredOutputEvent contains the validated JSON
        content

        along with the schema name for identification.


        Note: When using structured outputs, the agent can still use tools normally.

        The schema constraint only applies to the agent''s final text response.

        When streaming, the structured output is delivered as a single complete event

        rather than being streamed in chunks.

        '
      type: object
      properties:
        type:
          description: The type of output parser, which is always 'structured' for
            this parser type.
          type: string
          default: structured
          example: structured
        json_schema:
          $ref: '#/components/schemas/JsonSchemaSpec'
      required:
      - type
      - json_schema
      x-vectaraParents:
      - AgentOutputParser
    AgentOutputParser:
      title: AgentOutputParser
      description: 'Configuration for how the agent''s output should be parsed and
        formatted.


        The output parser determines how the agent''s responses are processed before
        being returned to the user.

        '
      discriminator:
        propertyName: type
        mapping:
          default: '#/components/schemas/DefaultOutputParser'
          structured: '#/components/schemas/StructuredOutputParser'
      oneOf:
      - $ref: '#/components/schemas/DefaultOutputParser'
      - $ref: '#/components/schemas/StructuredOutputParser'
    TemplatedReminder:
      title: TemplatedReminder
      description: A reminder whose template is rendered at session start according
        to its template_type (Velocity by default, or text for verbatim content) and
        injected into messages matching the specified hooks.
      type: object
      properties:
        type:
          description: The type of reminder.
          type: string
          default: templated
          example: templated
        template_type:
          $ref: '#/components/schemas/TemplateType'
        template:
          $ref: '#/components/schemas/InstructionTemplate'
        hooks:
          description: Event types that trigger this reminder to be appended to the
            corresponding message.
          type: array
          items:
            type: string
            enum:
            - input_message
            - tool_output
          minItems: 1
          example:
          - tool_output
        fire_every:
          description: 'Fire this reminder on every Nth matching hook event (counted
            independently per hook). Defaults to 1, which preserves the legacy

            behavior of firing on every matching event. Must be at least 1.


            Counters reset after a session compaction: the post-compaction event stream
            is treated as a fresh sequence (index 0), so

            `skip_first` warmup applies again from the first new matching event.

            '
          type: integer
          format: int32
          minimum: 1
          default: 1
          example: 3
        skip_first:
          description: 'Skip the first N matching hook events at session start before
            firing this reminder for the first time (counted independently per hook).

            Defaults to 0, meaning no warmup delay. Must be non-negative.


            Counters reset after a session compaction: the post-compaction event stream
            is treated as a fresh sequence (index 0), so

            the warmup applies again from the first new matching event.

            '
          type: integer
          format: int32
          minimum: 0
          default: 0
          example: 2
      required:
      - type
      - template
      - hooks
      x-vectaraParents:
      - AgentStepReminder
    GlossaryKey:
      description: A user-provided key that uniquely identifies a glossary.
      type: string
      pattern: ^[a-zA-Z0-9_=\-]+$
      minLength: 1
      maxLength: 50
      example: eng-acronyms
    GlossaryExpansionReminder:
      title: GlossaryExpansionReminder
      description: 'A reminder that expands terms, acronyms, and abbreviations in
        user messages using a glossary.

        When attached to a step, user input is run through the glossary''s lookup
        index and matching

        terms are expanded before the message reaches the agent.

        '
      type: object
      properties:
        type:
          description: The type of reminder.
          type: string
          default: glossary_expansion
          example: glossary_expansion
        glossary_key:
          description: The key of the glossary to use for term expansion.
          $ref: '#/components/schemas/GlossaryKey'
      required:
      - type
      - glossary_key
      x-vectaraParents:
      - AgentStepReminder
    AgentStepReminder:
      title: AgentStepReminder
      description: A reminder that is injected into the agent conversation when specific
        event types occur.
      discriminator:
        propertyName: type
        mapping:
          templated: '#/components/schemas/TemplatedReminder'
          glossary_expansion: '#/components/schemas/GlossaryExpansionReminder'
      oneOf:
      - $ref: '#/components/schemas/TemplatedReminder'
      - $ref: '#/components/schemas/GlossaryExpansionReminder'
    NextStep:
      title: NextStep
      description: A conditional transition to another step.
      type: object
      properties:
        condition:
          description: "UserFn expression evaluating to boolean.\nUses the `get()`\
            \ function with JSONPath to access the step transition context.\nSee https://docs.vectara.com/docs/search-and-retrieval/rerankers/user-defined-function-reranker\
            \ for the UserFn language reference.\nOmit for catch-all/default routing.\n\
            \nThe context available to `get()` has the following shape:\n```\n{\n\
            \  \"agent\": {\n    \"name\": \"...\",\n    \"key\": \"...\",\n    \"\
            description\": \"...\",\n    \"metadata\": { ... }\n  },\n  \"session\"\
            : {\n    \"key\": \"...\",\n    \"name\": \"...\",\n    \"description\"\
            : \"...\",\n    \"metadata\": { ... }\n  },\n  \"currentDate\": \"2024-01-15T10:35:00Z\"\
            ,\n  \"tools\": {\n    \"<tool_config_name>\": {\n      \"outputs\": {\n\
            \        \"latest\": { ... }\n      }\n    }\n  },\n  \"output\": { \"\
            text\": \"...\" }\n}\n```\n\n- `$.agent.metadata.<key>` \u2014 agent metadata\
            \ fields\n- `$.session.metadata.<key>` \u2014 session metadata fields\n\
            - `$.tools.<tool_config_name>.outputs.latest.<field>` \u2014 latest tool\
            \ output fields\n- `$.output.text` \u2014 agent text output (when output_parser\
            \ is `default`)\n- `$.output.<field>` \u2014 agent structured output fields\
            \ (when output_parser is `structured`)\n"
          type: string
          example: get('$.output.intent') == 'sales'
        step_name:
          description: 'Name of the step to transition to.

            Must reference a step defined in the agent''s steps list.

            '
          type: string
          example: sales_handler
      required:
      - step_name
    FirstAgentStep:
      title: FirstAgentStep
      description: 'The entry point step for an agent, with a unique name.

        See AgentStep for full step documentation.

        '
      type: object
      properties:
        name:
          description: Unique identifier for this step within the agent. Must not
            conflict with any key in the steps map.
          type: string
          minLength: 1
          maxLength: 255
          default: first_step
          example: classifier
        type:
          description: Deprecated. This field is ignored and exists only for backward
            compatibility.
          type: string
          deprecated: true
          default: conversational
        instructions:
          description: 'List of instructions that guide the agent''s behavior in this
            step.

            '
          type: array
          items:
            $ref: '#/components/schemas/AgentStepInstruction'
        output_parser:
          allOf:
          - $ref: '#/components/schemas/AgentOutputParser'
          default:
            type: default
        reminders:
          description: Reminders injected into conversation messages when specific
            events occur.
          type: array
          items:
            $ref: '#/components/schemas/AgentStepReminder'
          default: []
        next_steps:
          description: 'Conditional transitions to other steps.

            Evaluated in order; first matching condition is selected.

            A next_step without a condition acts as a catch-all/default.

            If no condition matches, the agent remains on the current step and the
            agent ends output.

            '
          type: array
          items:
            $ref: '#/components/schemas/NextStep'
        allowed_tools:
          description: 'List of tool configuration names that this step is allowed
            to use.

            If not specified (null), all tools defined in the agent''s tool_configurations
            are allowed.

            If set to an empty array, no tools are allowed and the agent can only
            respond with text.

            '
          type: array
          items:
            type: string
          example:
          - customer_search
          - web_search
        allowed_skills:
          description: 'List of skill names that this step is allowed to use.

            If not specified (null), all skills defined in the agent''s skills map
            are allowed.

            If set to an empty array, no skills are available and the invoke_skill
            tool is not shown.

            '
          type: array
          items:
            type: string
          example:
          - code_review
          - debugging
        reentry_step:
          description: 'Step name to resume at when the session receives the next
            user message.

            If not specified, the session re-enters at this step (i.e., stays here).

            Set to the agent''s first_step_name to always restart from the beginning.

            '
          type: string
          example: classifier
      required:
      - name
      - instructions
      - output_parser
    AgentStep:
      title: AgentStep
      description: 'A step in an agent''s execution flow that defines how the agent
        processes and responds to input.

        The step name comes from the map key in the agent''s steps map.


        A step gets all previous session history in the agent session, including any
        prior agent steps,

        then the agent decides what to do in this step based on the given instructions.
        Finally, the

        agent either stops working if there is no next step defined or continues to
        the first next step

        that matches the condition.


        An agent always executes steps serially. If parallel behavior is desired,
        giving the agent

        other agents as tools is usually the most correct approach.


        Each step can only use tools defined by its `allowed_tools` list; if this
        list is not specified

        then all tools known to the agent are allowed.

        '
      type: object
      properties:
        type:
          description: Deprecated. This field is ignored and exists only for backward
            compatibility.
          type: string
          deprecated: true
          default: conversational
        instructions:
          description: 'List of instructions that guide the agent''s behavior in this
            step.

            If omitted, the agent may behave oddly as it has no system instructions
            and

            will just attempt to respond to user input and previous session history.

            '
          type: array
          items:
            $ref: '#/components/schemas/AgentStepInstruction'
        output_parser:
          description: 'How to parse and format the agent''s output.

            Determines which event type is emitted.

            Defaults to ''default'' parser if not specified.

            '
          allOf:
          - $ref: '#/components/schemas/AgentOutputParser'
          default:
            type: default
        reminders:
          description: Reminders injected into conversation messages when specific
            events occur. Useful for keeping the agent on-task during long conversations.
          type: array
          items:
            $ref: '#/components/schemas/AgentStepReminder'
          default: []
        next_steps:
          description: 'Conditional transitions to other steps.

            Evaluated in order; first matching condition is selected.

            A next_step without a condition acts as a catch-all/default.

            If no condition matches, the agent remains on the current step and the
            agent ends output.

            '
          type: array
          items:
            $ref: '#/components/schemas/NextStep'
        allowed_tools:
          description: 'List of tool configuration names that this step is allowed
            to use.

            If not specified (null), all tools defined in the agent''s tool_configurations
            are allowed.

            If set to an empty array, no tools are allowed and the agent can only
            respond with text.

            Tool names must reference keys in the agent''s tool_configurations map.

            '
          type: array
          items:
            type: string
          example:
          - customer_search
          - web_search
        allowed_skills:
          description: 'List of skill names that this step is allowed to use.

            If not specified (null), all skills defined in the agent''s skills map
            are allowed.

            If set to an empty array, no skills are available and the invoke_skill
            tool is not shown.

            '
          type: array
          items:
            type: string
          example:
          - code_review
          - debugging
        reentry_step:
          description: 'Step name to resume at when the session receives the next
            user message.

            If not specified, the session re-enters at this step (i.e., stays here).

            Set to the agent''s first_step_name to always restart from the beginning.

            '
          type: string
          example: classifier
      required:
      - instructions
      - output_parser
    CompactionConfig:
      title: CompactionConfig
      description: Configuration for automatic context compaction.
      type: object
      properties:
        enabled:
          description: Enable automatic context compaction.
          type: boolean
          default: true
          example: true
        threshold_percent:
          description: Context usage % (50-95) at which compaction is applied.
          type: integer
          minimum: 50
          maximum: 95
          default: 80
          example: 80
        keep_recent_inputs:
          description: Number of recent turns to keep verbatim (not compacted).
          type: integer
          minimum: 1
          default: 1
          example: 1
        compaction_message:
          description: Custom additional instructions for the compaction summarization
            prompt.
          type: string
          maxLength: 10000
        tool_event_policy:
          description: How tool events are included in the compaction input.
          type: string
          enum:
          - exclude
          - include_outputs
          - include_all
          default: include_outputs
    ToolOutputOffloadingConfiguration:
      title: ToolOutputOffloadingConfiguration
      description: "Controls how large tool outputs are kept from overwhelming the\
        \ agent context window.\n\nTool outputs are inspected as they are produced.\
        \ A small output is always passed through\nunchanged. A larger output is handled\
        \ in one of two cases: when the output on its own is\nbig enough to dominate\
        \ the context, or when adding it to the conversation would leave\ntoo little\
        \ room for the agent to continue. In either case the output is handled according\n\
        to `mode` \u2014 stored as an artifact and replaced with a compact reference,\
        \ or truncated in\nplace with the head and tail preserved and the middle omitted.\
        \ When stored as an artifact,\nthe agent is expected to have artifact_read,\
        \ artifact_grep, or artifact_jq configured so\nit can retrieve the full content\
        \ on demand.\n\nAll fields are optional; omitted fields fall back to defaults.\n"
      type: object
      properties:
        enabled:
          description: 'Whether tool output offloading is active. Defaults to true.
            When disabled, tool

            outputs are always passed through to the agent verbatim.

            '
          type: boolean
          example: true
        mode:
          description: 'How a large tool output is handled once it has been selected
            for offloading.


            In `artifact` mode, the full output is stored as a session artifact and
            replaced in

            the conversation with a compact reference containing the artifact id,
            size, shape,

            and hints for the available artifact tools. The agent can then use artifact_read,

            artifact_grep, or artifact_jq to retrieve just the parts it needs.


            In `truncate` mode, the output is shortened in place to fit within the
            target size.

            The head and tail are preserved and the middle is replaced with a short
            notice

            explaining that content was omitted. No artifact is created.


            When unset, the default is `artifact` if the agent has any of artifact_read,

            artifact_grep, or artifact_jq configured, and `truncate` otherwise.

            '
          type: string
          enum:
          - artifact
          - truncate
          example: artifact
        context_percentage:
          description: 'The fraction of the model''s context window that a single
            tool output is allowed to

            occupy before it is considered large enough to offload on its own, estimated
            at four

            characters per token. The resulting byte threshold is clamped between

            `min_threshold_bytes` and `max_threshold_bytes`, so for very large context
            models

            this percentage is usually dominated by `max_threshold_bytes`, and for
            very small

            context models it is dominated by `min_threshold_bytes`.

            '
          type: number
          format: double
          minimum: 0.01
          maximum: 1
          default: 0.25
          example: 0.25
        max_threshold_bytes:
          description: 'An absolute ceiling on single-output size. Any output above
            this many bytes is

            considered large enough to offload on its own, regardless of the model''s
            context

            window. This prevents unusually large outputs from slipping through on
            models with

            very large context windows.

            '
          type: integer
          format: int64
          minimum: 1024
          example: 1048576
        min_threshold_bytes:
          description: 'A hard floor on offloading. Tool outputs below this size are
            always passed through

            to the agent unchanged, even when cumulative context usage is high. This
            ensures that

            short, useful outputs are never unnecessarily truncated or replaced with
            a reference.

            '
          type: integer
          format: int64
          minimum: 1024
          example: 4096
        headroom_percentage:
          description: 'The fraction of the model''s context window at which offloading
            becomes sensitive to

            cumulative usage. When adding a tool output would push total input tokens
            above this

            fraction of the context window (estimated at four characters per token),
            the output

            is offloaded even if it would otherwise be considered small enough to
            pass through.


            This is independent of the compaction `threshold_percent`: both can be
            configured on

            the same agent and both can apply. In practice it is often useful to set
            this below

            the compaction threshold so that large tool outputs are offloaded before
            compaction

            is triggered, avoiding the case where a large tool result is immediately
            summarized

            away. Setting this to 1.0 effectively disables the headroom behavior,
            leaving only

            the per-output size thresholds in effect.

            '
          type: number
          format: double
          minimum: 0.01
          maximum: 1
          default: 0.7
          example: 0.7
    Agent:
      description: An AI agent that can use tools to provide intelligent responses
        and actions.
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentKey'
        name:
          $ref: '#/components/schemas/AgentName'
        description:
          description: A detailed description of the agent's purpose and capabilities.
          type: string
          example: An AI agent specialized in handling customer support inquiries
            using company documentation and support tools.
        tool_configurations:
          description: A map of tool configurations available to the agent. The key
            is the name of the tool configuration and the value is an agent tool configuration.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentToolConfiguration'
            nullable: true
          example:
            customer_search:
              type: corpora_search
              argument_override:
                query: customer support documentation
        skills:
          description: 'A map of skills available to the agent, keyed by skill name.

            Skills provide specialized instructions that can be invoked during agent
            execution.

            The skill list (name + description) is shown in the system message; content
            is loaded on invocation.

            '
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentSkill'
            nullable: true
          example:
            code_review:
              description: Reviews code for best practices and security issues.
              content: When reviewing code, focus on...
        model:
          $ref: '#/components/schemas/AgentModel'
        first_step:
          $ref: '#/components/schemas/FirstAgentStep'
        first_step_name:
          description: The name of the first step. Matches first_step.name.
          type: string
          example: classifier
        steps:
          description: 'A map of additional named steps keyed by step name.

            The first_step can transition to steps defined here via next_steps.

            '
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentStep'
          example:
            sales_handler:
              instructions:
              - type: inline
                template: Handle sales inquiries
              output_parser:
                type: default
            support_handler:
              instructions:
              - type: inline
                template: Handle support requests
              output_parser:
                type: default
        metadata:
          description: Arbitrary metadata associated with the agent for customization
            and configuration.
          type: object
          additionalProperties: true
          example:
            department: customer_service
            version: 1.2.0
            owner: support-team
        enabled:
          description: Whether the agent is currently enabled and available for use.
          type: boolean
          default: true
          example: true
        compaction:
          description: Configuration for automatic context compaction when the session
            approaches context limits.
          $ref: '#/components/schemas/CompactionConfig'
        tool_output_offloading:
          $ref: '#/components/schemas/ToolOutputOffloadingConfiguration'
        created_at:
          description: Timestamp when the agent was created.
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updated_at:
          description: Timestamp when the agent was last updated.
          type: string
          format: date-time
          example: '2024-01-16T14:45:00Z'
      required:
      - key
      - name
      - tool_configurations
      - model
      - first_step
      - enabled
    ListAgentsResponse:
      description: Response containing a list of agents.
      type: object
      properties:
        agents:
          description: List of agents.
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      required:
      - agents
      - metadata
    CreateAgentRequest:
      description: 'Request object for creating a new agent.

        The entry point must be defined via first_step_name (preferred) or first_step
        (deprecated).

        '
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentKey'
          description: A user provided key that uniquely identifies this agent. If
            not provided, one will be auto-generated based on the agent name.
        name:
          $ref: '#/components/schemas/AgentName'
        description:
          description: A detailed description of the agent's purpose and capabilities.
          type: string
          example: An AI agent specialized in handling customer support inquiries
            using company documentation and support tools.
        tool_configurations:
          description: A map of tool configurations available to the agent. The key
            is the name of the tool configuration and the value is the AgentToolConfiguration.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentToolConfiguration'
            nullable: true
          example:
            customer_search:
              type: corpora_search
              argument_override:
                query: customer support documentation
        skills:
          description: 'A map of skills available to the agent, keyed by skill name.

            Skills provide specialized instructions that can be invoked during agent
            execution.

            '
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentSkill'
            nullable: true
          example:
            code_review:
              description: Reviews code for best practices.
              content: When reviewing code...
        model:
          $ref: '#/components/schemas/AgentModel'
        first_step:
          description: 'Deprecated: prefer defining all steps in the steps map and
            using first_step_name.

            Inline definition of the entry point step. Can be combined with first_step_name

            only if first_step_name equals first_step.name AND steps[first_step.name]
            is

            identical to first_step.

            '
          deprecated: true
          $ref: '#/components/schemas/FirstAgentStep'
        first_step_name:
          description: 'Name of a step in the steps map to use as the entry point.
            This is the preferred

            way to define the entry point - define all steps in the steps map and
            reference

            the entry point by name here.

            '
          type: string
          minLength: 1
          example: classifier
        steps:
          description: 'A map of named steps keyed by step name.

            Steps can transition to other steps defined here via next_steps.

            '
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentStep'
          example:
            sales_handler:
              instructions:
              - type: inline
                template: Handle sales inquiries
              output_parser:
                type: default
            support_handler:
              instructions:
              - type: inline
                template: Handle support requests
              output_parser:
                type: default
        metadata:
          description: Arbitrary metadata associated with the agent for customization
            and configuration.
          type: object
          additionalProperties: true
          default: {}
          example:
            department: customer_service
            version: 1.0.0
            owner: support-team
        enabled:
          description: Whether the agent should be enabled upon creation.
          type: boolean
          default: true
          example: true
        compaction:
          description: Configuration for automatic context compaction when the session
            approaches context limits.
          $ref: '#/components/schemas/CompactionConfig'
        tool_output_offloading:
          $ref: '#/components/schemas/ToolOutputOffloadingConfiguration'
      required:
      - name
      - tool_configurations
      - model
    UpdateFirstAgentStep:
      title: UpdateFirstAgentStep
      description: 'Partial update for the first (entry point) step. Omitted fields
        are preserved.

        Includes an optional name field to rename the first step.

        '
      type: object
      properties:
        name:
          description: Rename the first step. If omitted, the name is preserved.
          type: string
        type:
          description: Deprecated. Previously used as a discriminator.
          type: string
          default: conversational
          deprecated: true
        instructions:
          description: List of instructions that guide the agent's behavior. Set to
            null to clear all instructions.
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AgentStepInstruction'
        output_parser:
          $ref: '#/components/schemas/AgentOutputParser'
        reminders:
          description: Reminders injected into the session as the agent runs. Set
            to null to clear all reminders.
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AgentStepReminder'
        next_steps:
          description: Conditional transitions to other steps. Set to null to clear.
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/NextStep'
        allowed_tools:
          description: Tool configuration names this step may invoke. Set to null
            to clear.
          type: array
          nullable: true
          items:
            type: string
        allowed_skills:
          description: Skill names this step may use. Set to null to clear (allows
            all skills).
          type: array
          nullable: true
          items:
            type: string
        reentry_step:
          description: 'Step name to resume at when the session receives the next
            user message.

            Set to null to clear (re-enters at this step).

            '
          type: string
          nullable: true
    UpdateAgentStep:
      title: UpdateAgentStep
      description: 'Agent step for partial updates. Omitted fields are preserved.

        Nullable fields (instructions, reminders) can be set to null to clear them.

        '
      type: object
      properties:
        type:
          description: Deprecated. Previously used as a discriminator.
          type: string
          default: conversational
          deprecated: true
        instructions:
          description: List of instructions that guide the agent's behavior. Set to
            null to clear all instructions.
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AgentStepInstruction'
        output_parser:
          $ref: '#/components/schemas/AgentOutputParser'
        reminders:
          description: Reminders injected into the session as the agent runs. Set
            to null to clear all reminders.
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AgentStepReminder'
        next_steps:
          description: Conditional transitions to other steps. Set to null to clear.
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/NextStep'
        allowed_tools:
          description: Tool configuration names this step may invoke. Set to null
            to clear.
          type: array
          nullable: true
          items:
            type: string
        allowed_skills:
          description: Skill names this step may use. Set to null to clear (allows
            all skills).
          type: array
          nullable: true
          items:
            type: string
        reentry_step:
          description: 'Step name to resume at when the session receives the next
            user message.

            Set to null to clear (re-enters at this step).

            '
          type: string
          nullable: true
    UpdateAgentRequest:
      description: 'Request object for updating an existing agent. Omitted fields
        are preserved.

        Nullable fields (description, tool_configurations, metadata, enabled, guardrails)

        can be set to null to clear them.

        '
      type: object
      properties:
        name:
          $ref: '#/components/schemas/AgentName'
        description:
          description: A detailed description of the agent's purpose and capabilities.
            Set to null to clear.
          type: string
          nullable: true
          example: An enhanced AI agent specialized in handling customer support inquiries.
        tool_configurations:
          description: 'A map of tool configurations available to the agent. Set to
            null to clear all tools.

            Individual map values set to null will delete that tool configuration.

            '
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/AgentToolConfiguration'
            nullable: true
          example:
            customer_search:
              type: corpora_search
              argument_override:
                query: customer support documentation
        skills:
          description: 'A map of skills available to the agent. Set to null to clear
            all skills.

            Individual map values set to null will delete that skill.

            '
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/AgentSkill'
            nullable: true
        model:
          $ref: '#/components/schemas/AgentModel'
        first_step:
          description: 'Deprecated: prefer updating steps directly via the steps map.

            Partial update to the current first step. Can be combined with first_step_name

            only if first_step_name equals first_step.name.

            '
          deprecated: true
          $ref: '#/components/schemas/UpdateFirstAgentStep'
        first_step_name:
          description: 'Reassign the entry point to an existing step by name. This
            is the preferred way

            to change the entry point. The named step must exist in the steps map.

            '
          type: string
          minLength: 1
        metadata:
          description: Arbitrary metadata associated with the agent. Set to null to
            clear.
          type: object
          nullable: true
          additionalProperties: true
          example:
            department: customer_service
            version: 1.1.0
            owner: support-team
            last_reviewed: '2024-01-15'
        enabled:
          description: Whether the agent is enabled. Set to null to reset to default
            (true).
          type: boolean
          nullable: true
          example: true
        compaction:
          description: Configuration for automatic context compaction. Set to null
            to clear.
          $ref: '#/components/schemas/CompactionConfig'
          nullable: true
        tool_output_offloading:
          $ref: '#/components/schemas/ToolOutputOffloadingConfiguration'
          nullable: true
        steps:
          description: 'A map of additional named steps keyed by step name for partial
            update.

            Only provided keys are modified; missing keys are preserved.

            Set a key''s value to null to delete that step.

            '
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/UpdateAgentStep'
            nullable: true
          example:
            sales_handler:
              instructions:
              - type: inline
                template: Handle sales inquiries
    AgentSessionKey:
      description: A unique key that identifies an agent session.
      type: string
      pattern: '[0-9a-zA-Z_-]+$'
      minLength: 1
      maxLength: 50
      example: customer_support_chat
    InputTokens:
      title: InputTokens
      description: Input token usage details.
      type: object
      properties:
        count:
          description: Number of input tokens consumed by the most recent agent call,
            including cached tokens.
          type: integer
          format: int64
          example: 120
        cached_tokens:
          description: Subset of count served from the prompt cache. Omitted when
            no input tokens were served from the cache.
          type: integer
          format: int64
          example: 100
    OutputTokens:
      title: OutputTokens
      description: Output token usage details.
      type: object
      properties:
        count:
          description: Number of output tokens generated by the most recent agent
            call.
          type: integer
          format: int64
          example: 30
        reasoning_tokens:
          description: Number of tokens used for reasoning/thinking.
          type: integer
          format: int64
          example: 0
    SessionContextUsage:
      title: SessionContextUsage
      description: Token usage of the session's most recent agent call, reflecting
        current context window consumption. Not a running total across calls.
      type: object
      properties:
        input_tokens:
          $ref: '#/components/schemas/InputTokens'
        output_tokens:
          $ref: '#/components/schemas/OutputTokens'
        total_tokens:
          description: Input plus output tokens of the most recent agent call. Can
            be used with model_context_window to calculate context utilization percentage.
          type: integer
          format: int64
          example: 150
        model_context_window:
          description: Maximum context window size in tokens for the model used by
            this session. Can be used with total_tokens to calculate context utilization
            percentage.
          type: integer
          format: int64
          example: 200000
    AgentSession:
      description: A session for interacting with an agent, allowing conversation
        context.
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentSessionKey'
        agent_key:
          $ref: '#/components/schemas/AgentKey'
        name:
          description: Human-readable name for the session.
          type: string
          example: Customer Support Session
        description:
          description: 'A short description of the session''s purpose. If omitted
            at creation, one is auto-generated once the agent has produced events.
            An empty string indicates auto-generation is disabled for this session.

            '
          type: string
          example: Helping customer troubleshoot widget installation issues
        metadata:
          description: Arbitrary metadata associated with the session.
          type: object
          additionalProperties: true
          example:
            customer_id: '12345'
            priority: high
            channel: web_chat
        current_step_name:
          description: 'The step name the session will resume at on the next user
            message.

            If null, the session starts at the agent''s first_step.

            '
          type: string
          nullable: true
          example: billing
        enabled:
          description: Whether the session is currently active and can accept new
            messages.
          type: boolean
          default: true
          example: true
        status:
          description: "Lifecycle status of the session. `unstarted` before any event\
            \ has been submitted, `running` while the agent is producing events, and\
            \ `stopped` when the session is idle with no event in flight. `stopped`\
            \ implies no terminating action \u2014 the session returns to `running`\
            \ on the next request.\n"
          type: string
          enum:
          - unstarted
          - running
          - stopped
          readOnly: true
          example: stopped
        created_by_agent_key:
          allOf:
          - $ref: '#/components/schemas/AgentKey'
          description: 'Key of the agent that created this session via the sub-agent
            tool. Null if the session was not created by a sub-agent invocation. Read-only.

            '
          readOnly: true
        created_by_session_key:
          allOf:
          - $ref: '#/components/schemas/AgentSessionKey'
          description: 'Key of the parent session that created this session via the
            sub-agent tool. Only set together with `created_by_agent_key`. Read-only.

            '
          readOnly: true
        tti_minutes:
          description: Time-to-idle in minutes for the session. If no events occur
            in the session for this duration, the session will be automatically deleted.
            If not specified, the session will not expire.
          type: integer
          format: int64
          minimum: 0
          default: 0
          example: 60
        created_at:
          description: Timestamp when the session was created.
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        session_context_usage:
          description: Context used in session.
          $ref: '#/components/schemas/SessionContextUsage'
        effective_compaction:
          description: The compaction configuration snapshotted when the session was
            created.
          $ref: '#/components/schemas/CompactionConfig'
        alias_key:
          description: 'If this session was created through an alias (`POST /v2/agent_aliases/{alias_key}/sessions`),
            the alias key the caller used. The `agent_key` field above is the resolved
            agent the alias''s policy picked. Null when the session was created directly
            under an agent (`POST /v2/agents/{agent_key}/sessions`).

            '
          type: string
          nullable: true
          example: support
        secrets:
          description: 'Session-scoped secrets, with values masked as `"****"`. Plaintext
            is never returned on read;

            tools resolve the real value via `argument_override` with `{"$ref": "session.secrets.<name>"}`.

            Set or rotate via the session create or update request.

            '
          type: object
          additionalProperties:
            type: string
          example:
            slack_user_token: '****'
      required:
      - key
      - name
      - agent_key
      - enabled
      - created_at
    ListAgentSessionsResponse:
      description: Response containing a list of agent sessions.
      type: object
      properties:
        sessions:
          description: List of agent sessions.
          type: array
          items:
            $ref: '#/components/schemas/AgentSession'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      required:
      - sessions
      - metadata
    CreateAgentSessionRequest:
      description: Request object for creating a new agent session.
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentSessionKey'
          description: A user provided key that uniquely identifies this session.
            If not provided, one will be auto-generated based on the session name.
        name:
          description: Human-readable name for the session.
          type: string
          example: Customer Support Session
        description:
          description: 'A short description of the session''s purpose. If omitted,
            one is auto-generated once the session has produced events. Pass an empty
            string to suppress auto-generation.

            '
          type: string
          example: Helping customer troubleshoot issues
        metadata:
          description: Arbitrary metadata associated with the session.
          type: object
          additionalProperties: true
          default: {}
          example:
            customer_id: '12345'
            priority: medium
            channel: web_chat
        enabled:
          description: Whether the session should be enabled upon creation.
          type: boolean
          default: true
          example: true
        tti_minutes:
          description: Time-to-idle in minutes for the session. If no events occur
            in the session for this duration, the session will be automatically deleted.
            If set to 0, the session will not expire.
          type: integer
          format: int64
          minimum: 0
          default: 0
          example: 60
        secrets:
          description: 'Session-scoped secrets to store on the new session. Map of
            secret name to plaintext value.

            Encrypted at rest with the owning agent''s encryption key. Referenced
            from tool `argument_override` via

            `{"$ref": "session.secrets.<name>"}`. Returned masked (`****`) on reads.

            '
          type: object
          propertyNames:
            pattern: ^[A-Za-z0-9_-]+$
          additionalProperties:
            type: string
            minLength: 1
            maxLength: 4096
          example:
            slack_user_token: xoxp-your-token-here
        from_session:
          description: 'Create a new session by forking an existing one. By default,
            copies all visible events

            and artifacts from the source session without compaction. Optionally specify
            exactly one of

            include_up_to_event_id or compact_up_to_event_id to control which events
            are included

            and whether they are compacted. These two fields are mutually exclusive.

            '
          type: object
          properties:
            agent_key:
              description: Agent key of the source session (defaults to current agent).
              type: string
            session_key:
              description: Session key of the source session.
              type: string
            include_up_to_event_id:
              description: 'Only include events up to and including this event ID
                from the source session,

                copying them verbatim. Events after this ID are excluded. If null
                (the default),

                all visible events are included. Mutually exclusive with compact_up_to_event_id.

                '
              type: string
              nullable: true
            compact_up_to_event_id:
              description: 'Compact all source events up to this event ID into a summary
                instead of

                copying them verbatim. If null (the default), events are copied verbatim.

                Mutually exclusive with include_up_to_event_id.

                '
              type: string
              nullable: true
          required:
          - session_key
    UpdateAgentSessionRequest:
      description: Request object for updating an existing agent session.
      type: object
      properties:
        name:
          description: Human-readable name for the session.
          type: string
          example: Updated Session Name
        description:
          description: 'A short description of the session''s purpose. Pass an empty
            string to suppress auto-generation.

            '
          type: string
          example: Updated session description
        metadata:
          description: Arbitrary metadata associated with the session.
          type: object
          additionalProperties: true
          example:
            customer_id: '12345'
            priority: high
            status: escalated
        enabled:
          description: Whether the session is enabled.
          type: boolean
          example: false
        tti_minutes:
          description: Time-to-idle in minutes for the session. If no events occur
            in the session for this duration, the session will be automatically deleted.
            If set to 0, the session will not expire.
          type: integer
          format: int64
          minimum: 0
          example: 60
        secrets:
          description: 'Patch the session''s secrets. Names present in the map are
            added or replaced; names absent from the map are left unchanged.

            A name mapped to `null` is removed. Values are encrypted at rest with
            the owning agent''s encryption key and returned masked on reads.

            '
          type: object
          propertyNames:
            pattern: ^[A-Za-z0-9_-]+$
          additionalProperties:
            type: string
            nullable: true
            minLength: 1
            maxLength: 4096
          example:
            slack_user_token: xoxp-rotated-token
            old_token_to_remove: null
    AgentEventBase:
      description: Base properties shared by all agent event types.
      type: object
      properties:
        id:
          description: The unique identifier for the event.
          type: string
          pattern: aev_[0-9a-zA-Z_-]+$
          example: aev_user_001
        session_key:
          $ref: '#/components/schemas/AgentSessionKey'
          description: The key of the session this event belongs to.
        created_at:
          description: Timestamp when the event was created.
          type: string
          format: date-time
          example: '2024-01-15T10:35:00Z'
      required:
      - id
      - session_key
      - created_at
    AgentTextInput:
      description: A text input for an agent message.
      type: object
      properties:
        type:
          description: The type of input.
          type: string
          default: text
          example: text
        content:
          description: The text content of the input.
          type: string
          example: I need help with my widget installation
      required:
      - type
      - content
      x-vectaraParents:
      - AgentInput
    AgentSkillInput:
      description: An input that invokes a skill by name.
      type: object
      properties:
        type:
          description: The type of input.
          type: string
          default: skill
          example: skill
        skill_name:
          description: The name (key) of the skill to invoke.
          type: string
          example: code_review
      required:
      - type
      - skill_name
      x-vectaraParents:
      - AgentInput
    AgentInput:
      description: An input that can be provided to an agent message.
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/AgentTextInput'
          skill: '#/components/schemas/AgentSkillInput'
      oneOf:
      - $ref: '#/components/schemas/AgentTextInput'
      - $ref: '#/components/schemas/AgentSkillInput'
    InputMessageEvent:
      title: InputMessageEvent
      description: An input message event from a user.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: input_message
          messages:
            description: List of inputs that make up this message.
            type: array
            items:
              $ref: '#/components/schemas/AgentInput'
            example:
            - type: text
              content: I need help with my widget installation
          message_diffs:
            description: 'Per-produced-agent-message opaque platform-specific diff
              against the raw event payload, capturing the exact text sent to the
              model at emission time.

              When present, the array length MUST equal `messages.length`; the platform
              throws on mismatch. When absent the platform reconstructs the rendering
              on read.

              '
            type: array
            items:
              type: string
        required:
        - type
        - messages
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    SkillLoadEvent:
      title: SkillLoadEvent
      description: An event representing the loading of a skill's content into the
        conversation.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: skill_load
          skill_name:
            description: The name of the skill that was loaded.
            type: string
            example: code_review
          content:
            description: The skill content that was loaded.
            type: string
            example: You are a code reviewer. Review the code for bugs and security
              issues.
        required:
        - type
        - skill_name
        - content
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    ArtifactReference:
      title: ArtifactReference
      description: 'Reference to an artifact stored in the agent session workspace.


        Artifacts are files or documents that belong to a specific agent session,
        providing a persistent workspace where agents and users can share files throughout
        a conversation. When users upload files (such as PDFs, Word documents, PowerPoint
        presentations, or images) to an agent session, these files are stored as artifacts
        that remain available for the duration of the session.


        **Session Binding**: Each artifact is scoped to a specific agent session and
        cannot be accessed from other sessions, ensuring data privacy and security.


        **Lifecycle**: Artifacts are created when users upload files via multipart
        requests or when agent tools generate new files (such as converting a PDF
        to markdown). Artifacts have a configurable time-to-live and are automatically
        removed when they expire or when the session is deleted. A per-artifact size
        limit applies to each upload.


        **How Agents Use Artifacts**: Agent tools can read artifacts, process them,
        and create new derived artifacts. For example, the document conversion tool
        can take a PDF artifact, convert it to markdown, and store the result as a
        new artifact. This enables multi-step document processing workflows within
        a single session.


        **Common Use Cases**: Upload a document for the agent to analyze, provide
        multiple reference files for context, enable the agent to convert between
        formats, or allow the agent to generate and store processed files for later
        retrieval.

        '
      type: object
      properties:
        artifact_id:
          description: Unique identifier for the artifact
          type: string
          pattern: ^art_[a-z0-9_-]+$
          example: art_report_pdf_a3f2
        filename:
          description: Original filename of the artifact
          type: string
          example: report.pdf
        mime_type:
          description: MIME type of the file
          type: string
          example: application/pdf
        size_bytes:
          description: File size in bytes
          type: integer
          format: int64
          example: 2048576
      required:
      - artifact_id
      - filename
      - mime_type
      - size_bytes
    ArtifactUploadEvent:
      title: ArtifactUploadEvent
      description: 'Event representing files uploaded to the agent workspace as artifacts.


        This event is created when users upload one or more files to an agent session
        using multipart requests. The event becomes part of the session''s conversation
        history and contains references to all artifacts that were uploaded in the
        request. Each uploaded file is assigned a unique artifact identifier and stored
        in the session''s workspace.


        When an agent processes this event, it becomes aware that new files are available
        in the session and can use various tools to read, analyze, or transform these
        artifacts. For example, after receiving an artifact upload event with a PDF,
        the agent might use the document conversion tool to extract and analyze the
        document''s contents.


        See the `ArtifactReference` schema for comprehensive details about what artifacts
        are, how they are stored, their lifecycle, and how agents interact with them.

        '
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: artifact_upload
          artifacts:
            description: References to uploaded artifacts
            type: array
            items:
              $ref: '#/components/schemas/ArtifactReference'
            example:
            - artifact_id: art_report_pdf_a3f2
              filename: report.pdf
              mime_type: application/pdf
              size_bytes: 2048576
          agent_upload_message:
            description: 'Frozen text of the single user-role agent message rendered
              for this artifact upload at emission time, capturing the artifact metadata
              and instruction

              block as one prompt. When absent the platform reconstructs the rendering
              on read using current templates.

              '
            type: string
        required:
        - type
        - artifacts
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    ToolInputEvent:
      title: ToolInputEvent
      description: An event representing input to a tool call.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: tool_input
          tool_call_id:
            description: The identifier for the tool call.
            type: string
            example: call_tool_search_001
          tool_configuration_name:
            description: The name of the tool configuration being invoked, as defined
              in the agent's tool_configurations map.
            type: string
            example: customer_search
          tool_name:
            description: Name of the tool being called.
            type: string
            example: web_search
          tool_input:
            description: Input data for the tool.
            type: object
            additionalProperties: true
            example:
              query: weather in San Francisco
          argument_override_paths:
            description: "Dot-notation leaf paths supplied by the tool configuration's\
              \ argument overrides rather than by the agent \u2014 for example `api_key`,\n\
              `config.auth.token`, or `items[0]`. These paths are frozen on the input\
              \ event so that the agent's view of its own past tool calls stays\n\
              stable when the tool configuration changes: overrides are excluded from\
              \ replayed calls regardless of how the override has evolved since.\n\
              Only the paths are frozen here; the resolved values at those paths are\
              \ not \u2014 they are recomputed against the live session at each launch\n\
              and recorded on the corresponding `ToolOutputEvent.resolved_argument_overrides`.\n"
            type: array
            items:
              type: string
        required:
        - type
        - tool_call_id
        - tool_configuration_name
        - tool_name
        - tool_input
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    ToolOutputEvent:
      title: ToolOutputEvent
      description: An event representing output from a tool call.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: tool_output
          tool_call_id:
            description: The unique identifier for the tool call, matching the input
              event.
            type: string
            example: call_tool_search_001
          tool_configuration_name:
            description: The name of the tool configuration that was invoked, as defined
              in the agent's tool_configurations map.
            type: string
            example: customer_search
          tool_name:
            description: Name of the tool that was called.
            type: string
            example: web_search
          resolved_argument_overrides:
            description: "The values the tool configuration's argument overrides contributed\
              \ to this call, keyed by the paths in\n`ToolInputEvent.argument_override_paths`.\
              \ `$ref` overrides are resolved against the session \u2014 agent secrets,\n\
              session metadata, and prior tool outputs \u2014 with secret values masked\
              \ as `****`. Literal overrides appear as-is.\n\nOverlay these onto `ToolInputEvent.tool_input`\
              \ at the matching paths to see exactly what the tool received.\n\nAbsent\
              \ when the tool short-circuits before running (for example, malformed\
              \ arguments from the agent or an\nunresolved dependency).\n"
            type: object
            additionalProperties: true
            example:
              api_key: '****'
              base_url: https://api.example.com
          tool_output:
            description: Output data from the tool.
            type: object
            additionalProperties: true
            example:
              result: "Current weather is 70\xB0F and sunny"
          error:
            description: Whether the tool call resulted in an error.
            type: boolean
            default: false
        required:
        - type
        - tool_call_id
        - tool_configuration_name
        - tool_name
        - tool_output
        - error
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    ThinkingEvent:
      title: ThinkingEvent
      description: An event representing chain-of-thought thinking by the agent.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: thinking
          content:
            description: Human-readable content of the reasoning process.
            type: string
            example: Analyzing user request and considering available options
        required:
        - type
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    AgentOutputEvent:
      title: AgentOutputEvent
      description: An event representing a complete agent response.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: agent_output
          content:
            description: The complete agent response content.
            type: string
            example: Hello! I can help you with your widget installation. Let me guide
              you through the process.
        required:
        - type
        - content
      x-vectaraParents:
      - AgentEvent
    StructuredOutputEvent:
      title: StructuredOutputEvent
      description: 'An event representing a complete agent response with structured
        JSON content conforming to a schema.


        This event is published instead of AgentOutputEvent when the agent''s output_parser
        is configured

        with type "structured". It contains the agent''s final response parsed as
        validated JSON that

        conforms to the schema specified in the StructuredOutputParser configuration.


        When streaming is enabled, this event appears as a single complete event (not
        streamed in chunks)

        after any tool interactions are complete. The content field contains the parsed
        JSON,

        and schema_name identifies which schema the content was validated against.

        '
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: structured_output
          schema_name:
            description: The name of the JSON schema that the content conforms to.
            type: string
            example: order_response
          content:
            description: The structured JSON content conforming to the output schema.
            example:
              result: success
              data:
                id: 123
        required:
        - type
        - schema_name
        - content
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    ContextLimitExceededEvent:
      title: ContextLimitExceededEvent
      description: 'A transient event indicating the current request exceeded the
        agent''s context limit.

        This event is not persisted to the session history.

        '
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: context_limit_exceeded
          context_limit:
            description: The maximum number of tokens allowed by the model
            type: integer
            format: int64
            example: 128000
          actual_tokens:
            description: The actual number of tokens in the request
            type: integer
            format: int64
            example: 140658
          message:
            description: Human-readable error message
            type: string
            example: 'Context limit exceeded: 140658 tokens used, 128000 limit'
        required:
        - type
        - message
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    StepTransitionLimitExceededEvent:
      title: StepTransitionLimitExceededEvent
      description: 'A transient event indicating the agent exceeded the maximum number
        of step transitions,

        which may indicate an infinite loop between steps.

        This event is not persisted to the session history.

        '
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: step_transition_limit_exceeded
          transition_limit:
            description: The maximum number of step transitions allowed
            type: integer
            example: 10
          message:
            description: Human-readable error message
            type: string
            example: Agent exceeded maximum step transitions (10). Possible infinite
              loop between steps.
        required:
        - type
        - message
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    SessionInterruptedEvent:
      title: SessionInterruptedEvent
      description: 'A transient event indicating the agent session was interrupted
        by a user request.

        This event is not persisted to the session history.

        '
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: session_interrupted
        required:
        - type
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    ClientToolPendingCall:
      title: ClientToolPendingCall
      description: A single client tool call awaiting output, with its fully materialized
        arguments.
      type: object
      properties:
        event_id:
          description: The `tool_input` event this call corresponds to. Submit the
            matching `tool_output` with this `event_id`.
          type: string
          example: aev_3Kx9QpVn2mZr8YbLc5TdWe
        tool_configuration_name:
          description: The name of the tool configuration being invoked, as defined
            in the agent's tool_configurations map.
          type: string
          example: notify_slack
        tool_name:
          description: Name of the tool being called.
          type: string
          example: notify_slack
        arguments:
          description: 'The fully materialized arguments for this call: the agent-supplied
            arguments merged with the tool

            configuration''s argument overrides and literals, with `$ref`s resolved
            against the session. Secret-derived

            values are delivered unmasked because the client needs them to execute
            the tool. This is exactly what the

            client should execute the tool with.

            '
          type: object
          additionalProperties: true
          example:
            channel: support
            message: Ticket escalated
      required:
      - event_id
      - tool_configuration_name
      - tool_name
      - arguments
    ClientToolPendingEvent:
      title: ClientToolPendingEvent
      description: "Signals that the agent is waiting for the client to deliver outputs\
        \ for the listed client tool\ncalls before it continues. Not persisted to\
        \ session history. Resume by submitting a `tool_output`\ninput containing\
        \ one entry per `event_id` in `pending_calls`.\n\nOnly client tools awaiting\
        \ output are listed. Each call carries its fully materialized arguments \u2014\
        \nthe agent-supplied arguments already merged with the tool configuration's\
        \ argument overrides and\nliterals, with `$ref`s resolved against the session\
        \ \u2014 so the client can dispatch the call without\ncross-referencing the\
        \ corresponding `tool_input` event. Secret-derived values are delivered unmasked\n\
        because the client needs them to execute the tool.\n"
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: client_tool_pending
          pending_calls:
            description: The client tool calls awaiting output, one entry per outstanding
              call.
            type: array
            items:
              $ref: '#/components/schemas/ClientToolPendingCall'
        required:
        - type
        - pending_calls
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    ImageReadEvent:
      title: ImageReadEvent
      description: An event representing an image being loaded into the conversation
        context for viewing and analysis.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: image_read
          artifact_id:
            description: The ID of the image artifact being loaded into the agent's
              conversation context.
            type: string
            pattern: ^art_[a-z0-9_-]+$
            example: art_photo_a3f2
          detail:
            description: Detail level for image processing.
            type: string
            enum:
            - auto
            - low
            - high
            default: auto
            example: auto
        required:
        - type
        - artifact_id
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    StepTransitionEvent:
      title: StepTransitionEvent
      description: An event representing a transition between agent steps.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: step_transition
          from_step:
            description: The name of the step being transitioned from.
            type: string
          to_step:
            description: The name of the step being transitioned to.
            type: string
          content:
            description: The handoff message content for the agent.
            type: string
        required:
        - type
        - from_step
        - to_step
        - content
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    CompactionEvent:
      title: CompactionEvent
      description: An event indicating that context compaction has completed.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: compaction
            example: compaction
          turns_compacted:
            description: Number of conversation turns that were compacted.
            type: integer
            example: 5
          events_compacted:
            description: Number of events that were hidden by compaction.
            type: integer
            example: 47
          summary_text:
            description: The plain text summary produced by compaction.
            type: string
          summary_key:
            description: The key of the summary created by compaction.
            type: string
            example: sum_abc123
        required:
        - type
        - turns_compacted
        - events_compacted
        - summary_key
      x-vectaraParents:
      - AgentEvent
      - AgentStreamedResponse
    AgentEvent:
      description: An event in an agent session conversation.
      type: object
      x-vectara-base-schema: '#/AgentEventBase'
      discriminator:
        propertyName: type
        mapping:
          input_message: '#/components/schemas/InputMessageEvent'
          skill_load: '#/components/schemas/SkillLoadEvent'
          artifact_upload: '#/components/schemas/ArtifactUploadEvent'
          tool_input: '#/components/schemas/ToolInputEvent'
          tool_output: '#/components/schemas/ToolOutputEvent'
          thinking: '#/components/schemas/ThinkingEvent'
          agent_output: '#/components/schemas/AgentOutputEvent'
          structured_output: '#/components/schemas/StructuredOutputEvent'
          context_limit_exceeded: '#/components/schemas/ContextLimitExceededEvent'
          step_transition_limit_exceeded: '#/components/schemas/StepTransitionLimitExceededEvent'
          session_interrupted: '#/components/schemas/SessionInterruptedEvent'
          client_tool_pending: '#/components/schemas/ClientToolPendingEvent'
          image_read: '#/components/schemas/ImageReadEvent'
          step_transition: '#/components/schemas/StepTransitionEvent'
          compaction: '#/components/schemas/CompactionEvent'
      oneOf:
      - $ref: '#/components/schemas/InputMessageEvent'
      - $ref: '#/components/schemas/SkillLoadEvent'
      - $ref: '#/components/schemas/ArtifactUploadEvent'
      - $ref: '#/components/schemas/ToolInputEvent'
      - $ref: '#/components/schemas/ToolOutputEvent'
      - $ref: '#/components/schemas/ThinkingEvent'
      - $ref: '#/components/schemas/AgentOutputEvent'
      - $ref: '#/components/schemas/StructuredOutputEvent'
      - $ref: '#/components/schemas/ContextLimitExceededEvent'
      - $ref: '#/components/schemas/StepTransitionLimitExceededEvent'
      - $ref: '#/components/schemas/SessionInterruptedEvent'
      - $ref: '#/components/schemas/ClientToolPendingEvent'
      - $ref: '#/components/schemas/ImageReadEvent'
      - $ref: '#/components/schemas/StepTransitionEvent'
      - $ref: '#/components/schemas/CompactionEvent'
    ListAgentEventsResponse:
      description: Response containing a list of agent events.
      type: object
      properties:
        events:
          description: List of agent events.
          type: array
          items:
            $ref: '#/components/schemas/AgentEvent'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      required:
      - events
      - metadata
    CreateInputRequestBase:
      description: Base properties shared by all input request types.
      type: object
      properties:
        stream_response:
          description: Indicates whether the response should be streamed or not.
          type: boolean
          default: false
    InputBehavior:
      description: "Controls how the input is processed when the session is already\
        \ running.\n- `steer`: Insert the message as soon as possible on the next\
        \ iteration of the agent loop.\n- `follow_up`: Insert the message after the\
        \ current agent loop finishes, as a follow-up turn.\n  Follow-up inputs are\
        \ consumed one at a time: after each follow-up turn completes, the next\n\
        \  queued follow-up is processed. This ensures each follow-up gets a full\
        \ agent loop iteration.\n"
      type: string
      enum:
      - steer
      - follow_up
    CreateInputMessageRequest:
      description: A user input message with text or other content.
      allOf:
      - $ref: '#/components/schemas/CreateInputRequestBase'
      - type: object
        properties:
          type:
            type: string
            default: input_message
          messages:
            description: List of inputs that make up this event.
            type: array
            items:
              $ref: '#/components/schemas/AgentInput'
            example:
            - type: text
              content: I need help with my widget installation
          since:
            description: 'Event ID to return all events created after queueing the
              new input. When provided and the session is currently running, the response
              will include all events created after this event ID, and the new input
              will be processed according to the behavior field. Use the special value
              "start" to receive all events from the beginning of the session, including
              the input message itself.

              '
            type: string
            pattern: ^(start|aev_[0-9a-zA-Z_-]+)$
            example: start
          behavior:
            $ref: '#/components/schemas/InputBehavior'
        required:
        - messages
      x-vectaraParents:
      - CreateInputRequest
    CreateInterruptRequest:
      description: Cancels the current agent operation.
      allOf:
      - $ref: '#/components/schemas/CreateInputRequestBase'
      - type: object
        properties:
          type:
            type: string
            default: interrupt
        required:
        - type
      x-vectaraParents:
      - CreateInputRequest
    CreateCompactRequest:
      description: 'Requests compaction of the session history. Can be sent while
        the session is processing

        (queued as a follow-up) or when idle.

        '
      allOf:
      - $ref: '#/components/schemas/CreateInputRequestBase'
      - type: object
        properties:
          type:
            type: string
            default: compact
          compact_up_to_event_id:
            description: "Compact all inputs up to this event ID (inclusive), e.g.\
              \ \"aev_abc123\".\nWhen specified, `keep_recent_inputs` is bypassed\
              \ \u2014 all inputs up to the anchor are compacted.\nIf omitted, compacts\
              \ all inputs except the most recent `keep_recent_inputs` inputs.\n"
            type: string
            example: aev_abc123
          compaction_message:
            description: Override the compaction prompt for this compaction.
            type: string
        required:
        - type
      x-vectaraParents:
      - CreateInputRequest
    CreateToolOutputBase:
      description: Base properties shared by client tool output submissions.
      type: object
      properties:
        event_id:
          description: The `tool_input` event this output responds to.
          type: string
          example: aev_3Kx9QpVn2mZr8YbLc5TdWe
      required:
      - event_id
    CreateToolOutputSuccess:
      description: A successful client tool output to be returned to the agent.
      allOf:
      - $ref: '#/components/schemas/CreateToolOutputBase'
      - type: object
        properties:
          type:
            description: Always `success`. Indicates the client tool call succeeded.
            type: string
            default: success
          output:
            description: The tool's result. Validated against the tool's `output_schema`
              if one is defined.
            type: object
            additionalProperties: true
        required:
        - type
        - output
      x-vectaraParents:
      - CreateToolOutputRequest
    CreateToolOutputError:
      description: An error reported by the client for a tool call. Surfaced to the
        agent as a tool execution error.
      allOf:
      - $ref: '#/components/schemas/CreateToolOutputBase'
      - type: object
        properties:
          type:
            description: Always `error`. Indicates the client tool call failed.
            type: string
            default: error
          error:
            description: Error returned to the agent. May be a string message or a
              structured object.
        required:
        - type
        - error
      x-vectaraParents:
      - CreateToolOutputRequest
    CreateToolOutputRequest:
      description: Delivers the result of a client tool call identified by its `tool_input`
        event ID.
      x-vectara-base-schema: '#/CreateToolOutputBase'
      discriminator:
        propertyName: type
        mapping:
          success: '#/components/schemas/CreateToolOutputSuccess'
          error: '#/components/schemas/CreateToolOutputError'
      oneOf:
      - $ref: '#/components/schemas/CreateToolOutputSuccess'
      - $ref: '#/components/schemas/CreateToolOutputError'
    ClientToolOutputRequest:
      description: 'Delivers outputs for `tool_input` events emitted by a prior client
        tool invocation. Submit one

        entry per pending event ID listed in the `client_tool_pending` event.

        '
      allOf:
      - $ref: '#/components/schemas/CreateInputRequestBase'
      - type: object
        properties:
          type:
            description: Always `tool_output`. Identifies this input as a client tool
              output submission.
            type: string
            default: tool_output
          tool_outputs:
            description: The tool outputs to deliver, one per pending client tool
              call.
            type: array
            items:
              $ref: '#/components/schemas/CreateToolOutputRequest'
        required:
        - type
        - tool_outputs
      x-vectaraParents:
      - CreateInputRequest
    CreateInputRequest:
      description: A request to create input for an agent session.
      x-vectara-base-schema: '#/CreateInputRequestBase'
      properties:
        type:
          type: string
          default: input_message
      discriminator:
        propertyName: type
        mapping:
          input_message: '#/components/schemas/CreateInputMessageRequest'
          interrupt: '#/components/schemas/CreateInterruptRequest'
          compact: '#/components/schemas/CreateCompactRequest'
          tool_output: '#/components/schemas/ClientToolOutputRequest'
      oneOf:
      - $ref: '#/components/schemas/CreateInputMessageRequest'
      - $ref: '#/components/schemas/CreateInterruptRequest'
      - $ref: '#/components/schemas/CreateCompactRequest'
      - $ref: '#/components/schemas/ClientToolOutputRequest'
    MultipartInputEvent:
      description: Input event with file uploads and optional message parts. Sent
        as multipart form data.
      type: object
      properties:
        message:
          description: 'Deprecated: use messages instead.

            Plain text input message to accompany the file upload.

            If both message and messages are provided, messages takes precedence and
            message is ignored.

            '
          deprecated: true
          type: string
          example: I need help with my widget installation
        messages:
          description: 'List of inputs that make up this event. Each entry is an AgentInput
            selected by "type: text" for plain text content (default), or "skill"
            to invoke a skill by name. Sent as a JSON-encoded string in the multipart
            form. If omitted, falls back to the deprecated "message" field as a single
            text input.

            '
          type: array
          items:
            $ref: '#/components/schemas/AgentInput'
          example:
          - type: text
            content: Review this file
          - type: skill
            skill_name: code_review
        files:
          description: 'Files to upload to the agent session. Any file type is accepted.

            What the agent can do with the file depends on the tools available to
            it.

            '
          type: array
          items:
            type: string
            format: binary
        stream_response:
          description: Indicates whether the response should be streamed or not.
          type: boolean
          default: false
        since:
          description: 'Event ID to return all events created after queueing the new
            input. When provided and the session is currently running, the response
            will include all events created after this event ID, and the new input
            will be processed according to the behavior field. Use the special value
            "start" to receive all events from the beginning of the session, including
            the input message itself.

            '
          type: string
          pattern: ^(start|aev_[0-9a-zA-Z_-]+)$
          example: start
        behavior:
          $ref: '#/components/schemas/InputBehavior'
    AgentResponse:
      description: Response containing the complete list of events generated by an
        agent.
      type: object
      properties:
        events:
          description: List of all events generated during agent processing.
          type: array
          items:
            $ref: '#/components/schemas/AgentEvent'
        session_key:
          $ref: '#/components/schemas/AgentSessionKey'
          description: The key of the session where these events occurred.
      required:
      - events
      - session_key
    StreamingAgentOutput:
      title: StreamingAgentOutput
      description: A streaming chunk of agent output (SSE only, not stored).
      type: object
      properties:
        type:
          description: The type of streaming event.
          type: string
          default: streaming_agent_output
          example: streaming_agent_output
        content:
          description: The text chunk content.
          type: string
          example: Hello, I can help you with
        created_at:
          description: Timestamp when the event was created.
          type: string
          format: date-time
          example: '2024-01-15T10:35:00Z'
      required:
      - type
      - content
      - created_at
      x-vectaraParents:
      - AgentStreamedResponse
    StreamingAgentOutputEnd:
      title: StreamingAgentOutputEnd
      description: Signals the end of streaming agent output (SSE only, not stored).
      type: object
      properties:
        type:
          description: The type of streaming event.
          type: string
          default: streaming_agent_output_end
          example: streaming_agent_output_end
        event_id:
          description: 'The ID of the persisted AgentOutputEvent for this streamed
            output.

            Use this as the `since` cursor on a subsequent reconnect to resume after
            this output.

            '
          type: string
          example: aev_user_001
        created_at:
          description: Timestamp when the event was created.
          type: string
          format: date-time
          example: '2024-01-15T10:35:00Z'
      required:
      - type
      - created_at
      x-vectaraParents:
      - AgentStreamedResponse
    StreamingThinking:
      title: StreamingThinking
      description: A streaming chunk of agent thinking (SSE only, not stored).
      type: object
      properties:
        type:
          description: The type of streaming event.
          type: string
          default: streaming_thinking
          example: streaming_thinking
        content:
          description: The thinking chunk content.
          type: string
          example: Let me think about this step
        created_at:
          description: Timestamp when the event was created.
          type: string
          format: date-time
          example: '2024-01-15T10:35:00Z'
      required:
      - type
      - content
      - created_at
      x-vectaraParents:
      - AgentStreamedResponse
    StreamingThinkingEnd:
      title: StreamingThinkingEnd
      description: Signals the end of streaming thinking (SSE only, not stored).
      type: object
      properties:
        type:
          description: The type of streaming event.
          type: string
          default: streaming_thinking_end
          example: streaming_thinking_end
        created_at:
          description: Timestamp when the event was created.
          type: string
          format: date-time
          example: '2024-01-15T10:35:00Z'
      required:
      - type
      - created_at
      x-vectaraParents:
      - AgentStreamedResponse
    ContextConsumedEvent:
      title: ContextConsumedEvent
      description: Token usage event reporting context window consumption.
      type: object
      properties:
        type:
          description: The event type.
          type: string
          default: context_consumed
          example: context_consumed
        session_context_usage:
          description: Context used in session.
          $ref: '#/components/schemas/SessionContextUsage'
        created_at:
          description: Timestamp when the event was created.
          type: string
          format: date-time
          example: '2024-01-15T10:35:00Z'
      required:
      - type
      - session_context_usage
      - created_at
      x-vectaraParents:
      - AgentStreamedResponse
    CompactionStartedEvent:
      title: CompactionStartedEvent
      description: An event indicating that context compaction has started.
      allOf:
      - $ref: '#/components/schemas/AgentEventBase'
      - type: object
        properties:
          type:
            description: The type of event.
            type: string
            default: compaction_started
            example: compaction_started
        required:
        - type
      x-vectaraParents:
      - AgentStreamedResponse
    ToolActivityEventBase:
      description: Base properties shared by all tool activity event types.
      type: object
      properties:
        type:
          description: The type of streaming event.
          type: string
          default: tool_activity
          example: tool_activity
        tool_call_id:
          description: The tool_call_id of the tool invocation this activity belongs
            to. Matches tool_input/tool_output.
          type: string
          example: call_tool_search_001
        tool_configuration_name:
          description: The name of the tool configuration emitting the activity.
          type: string
        tool_name:
          description: Name of the tool emitting the activity.
          type: string
        created_at:
          description: Timestamp when the event was created.
          type: string
          format: date-time
          example: '2024-01-15T10:35:00Z'
      required:
      - type
      - tool_call_id
      - created_at
    GenericToolActivityEvent:
      title: GenericToolActivityEvent
      description: A free-form progress update from a tool. The only payload is a
        human-readable message.
      allOf:
      - $ref: '#/components/schemas/ToolActivityEventBase'
      - type: object
        properties:
          activity_type:
            description: Discriminator for ToolActivityEvent subtypes.
            type: string
            default: generic
            example: generic
          message:
            description: Human-readable progress update. Safe to render directly to
              the user.
            type: string
            example: Sub-agent finished step 2 of 5
        required:
        - activity_type
        - message
      x-vectaraParents:
      - ToolActivityEvent
    SubAgentToolActivityEvent:
      title: SubAgentToolActivityEvent
      description: A relayed event from a sub-agent's inner execution stream, emitted
        by the sub_agent tool while it runs.
      allOf:
      - $ref: '#/components/schemas/ToolActivityEventBase'
      - type: object
        properties:
          activity_type:
            description: Discriminator for ToolActivityEvent subtypes.
            type: string
            default: sub_agent
            example: sub_agent
          agent_event:
            description: The inner agent event being relayed (tool_input, tool_output,
              agent_output, etc.).
            $ref: '#/components/schemas/AgentEvent'
        required:
        - activity_type
        - agent_event
      x-vectaraParents:
      - ToolActivityEvent
    ToolActivityEvent:
      description: "A sideband event emitted by a tool during its execution (streaming\
        \ only, not stored). Always falls between the tool's tool_input and tool_output\
        \ events for the same tool_call_id. Polymorphic on `activity_type` \u2014\
        \ see GenericToolActivityEvent (free-form text) and SubAgentToolActivityEvent\
        \ (relayed inner AgentEvent)."
      type: object
      x-vectara-base-schema: '#/ToolActivityEventBase'
      discriminator:
        propertyName: activity_type
        mapping:
          generic: '#/components/schemas/GenericToolActivityEvent'
          sub_agent: '#/components/schemas/SubAgentToolActivityEvent'
      oneOf:
      - $ref: '#/components/schemas/GenericToolActivityEvent'
      - $ref: '#/components/schemas/SubAgentToolActivityEvent'
      x-vectaraParents:
      - AgentStreamedResponse
    AgentStreamedResponse:
      description: An individual event sent with Server-sent Events (SSE) when the
        agent response is streamed.
      type: object
      discriminator:
        propertyName: type
        mapping:
          input_message: '#/components/schemas/InputMessageEvent'
          streaming_agent_output: '#/components/schemas/StreamingAgentOutput'
          streaming_agent_output_end: '#/components/schemas/StreamingAgentOutputEnd'
          streaming_thinking: '#/components/schemas/StreamingThinking'
          streaming_thinking_end: '#/components/schemas/StreamingThinkingEnd'
          tool_input: '#/components/schemas/ToolInputEvent'
          tool_output: '#/components/schemas/ToolOutputEvent'
          structured_output: '#/components/schemas/StructuredOutputEvent'
          context_limit_exceeded: '#/components/schemas/ContextLimitExceededEvent'
          step_transition_limit_exceeded: '#/components/schemas/StepTransitionLimitExceededEvent'
          session_interrupted: '#/components/schemas/SessionInterruptedEvent'
          client_tool_pending: '#/components/schemas/ClientToolPendingEvent'
          image_read: '#/components/schemas/ImageReadEvent'
          step_transition: '#/components/schemas/StepTransitionEvent'
          context_consumed: '#/components/schemas/ContextConsumedEvent'
          compaction_started: '#/components/schemas/CompactionStartedEvent'
          compaction: '#/components/schemas/CompactionEvent'
          skill_load: '#/components/schemas/SkillLoadEvent'
          thinking: '#/components/schemas/ThinkingEvent'
          artifact_upload: '#/components/schemas/ArtifactUploadEvent'
          tool_activity: '#/components/schemas/ToolActivityEvent'
          error: '#/components/schemas/StreamError'
          end: '#/components/schemas/StreamResponseEnd'
      oneOf:
      - $ref: '#/components/schemas/SkillLoadEvent'
      - $ref: '#/components/schemas/ThinkingEvent'
      - $ref: '#/components/schemas/ArtifactUploadEvent'
      - $ref: '#/components/schemas/InputMessageEvent'
      - $ref: '#/components/schemas/StreamingAgentOutput'
      - $ref: '#/components/schemas/StreamingAgentOutputEnd'
      - $ref: '#/components/schemas/StreamingThinking'
      - $ref: '#/components/schemas/StreamingThinkingEnd'
      - $ref: '#/components/schemas/ToolInputEvent'
      - $ref: '#/components/schemas/ToolOutputEvent'
      - $ref: '#/components/schemas/ToolActivityEvent'
      - $ref: '#/components/schemas/StructuredOutputEvent'
      - $ref: '#/components/schemas/ContextLimitExceededEvent'
      - $ref: '#/components/schemas/StepTransitionLimitExceededEvent'
      - $ref: '#/components/schemas/SessionInterruptedEvent'
      - $ref: '#/components/schemas/ClientToolPendingEvent'
      - $ref: '#/components/schemas/ImageReadEvent'
      - $ref: '#/components/schemas/StepTransitionEvent'
      - $ref: '#/components/schemas/ContextConsumedEvent'
      - $ref: '#/components/schemas/CompactionStartedEvent'
      - $ref: '#/components/schemas/CompactionEvent'
      - $ref: '#/components/schemas/StreamError'
      - $ref: '#/components/schemas/StreamResponseEnd'
    OutstandingClientToolCallsResponse:
      description: The client tool calls a session is currently waiting on the caller
        to fulfill, re-materialized from persisted history. Empty when the session
        is not parked on a client tool.
      type: object
      properties:
        client_tool_calls:
          description: The outstanding client tool calls, one entry per `tool_input`
            event still awaiting a `tool_output`.
          type: array
          items:
            $ref: '#/components/schemas/ClientToolPendingCall'
      required:
      - client_tool_calls
    SessionArtifact:
      title: SessionArtifact
      description: 'Complete artifact information including metadata and optional
        base64-encoded content.


        Represents a file stored in an agent session workspace with all associated
        metadata.

        The `data` field contains the base64-encoded file content and is only included
        when

        fetching a single artifact, not in list responses.

        '
      type: object
      properties:
        artifact_id:
          description: Unique identifier for the artifact
          type: string
          pattern: ^art_[a-z0-9_-]+$
          example: art_report_pdf_a3f2
        filename:
          description: Original filename of the artifact
          type: string
          example: report.pdf
        mime_type:
          description: MIME type of the file
          type: string
          example: application/pdf
        size_bytes:
          description: File size in bytes
          type: integer
          format: int64
          example: 2048576
        checksum_sha256:
          description: SHA-256 checksum of the file content
          type: string
          example: a3f2b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2
        metadata:
          description: Custom metadata associated with the artifact
          type: object
          additionalProperties: true
          example:
            original_filename: report.pdf
            source: user_upload
        description:
          description: Optional description of the artifact
          type: string
          example: Q4 financial report
        ttl_days:
          description: Time-to-live in days before the artifact is automatically deleted
          type: integer
          example: 30
        created_at:
          description: Timestamp when the artifact was created
          type: string
          format: date-time
          example: '2024-01-15T10:35:00Z'
        updated_at:
          description: Timestamp when the artifact was last updated
          type: string
          format: date-time
          example: '2024-01-15T10:35:00Z'
        data:
          description: Base64-encoded file content (only included in single artifact
            fetch, not in list responses)
          type: string
          format: byte
          example: JVBERi0xLjQKJeLjz9MKMy4uLg==
      required:
      - artifact_id
      - filename
      - mime_type
      - size_bytes
      - checksum_sha256
      - metadata
      - created_at
      - updated_at
    ListSessionArtifactsResponse:
      title: ListSessionArtifactsResponse
      description: Response containing a paginated list of artifacts in a session
      type: object
      properties:
        artifacts:
          description: List of artifacts in the session
          type: array
          items:
            $ref: '#/components/schemas/SessionArtifact'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
          description: Pagination metadata with page_key for fetching next page
      required:
      - artifacts
      - metadata
    AgentScheduleKey:
      description: 'A unique key that identifies an agent schedule. Uses "key" terminology
        (instead of "id")

        for consistency with other Vectara API resources (AgentKey, SessionKey, CorpusKey,
        etc.).

        '
      type: string
      pattern: '[0-9a-zA-Z_-]+$'
      minLength: 1
      maxLength: 50
      example: daily-report
    AgentScheduleName:
      description: The human-readable name of an agent schedule.
      type: string
      minLength: 1
      maxLength: 255
      example: Daily Summary Report
    IntervalScheduleConfiguration:
      description: Configuration for interval-based schedule execution.
      type: object
      properties:
        type:
          description: The type of schedule.
          type: string
          enum:
          - interval
          example: interval
        interval:
          description: 'ISO-8601 duration string specifying the interval between executions.

            Minimum interval is 1 minute (PT1M).


            Format: P[n]Y[n]M[n]DT[n]H[n]M[n]S

            - P: Period designator (required)

            - T: Time designator (separates date and time components)


            Common examples:

            - PT1M: Every 1 minute

            - PT1H: Every 1 hour

            - PT6H: Every 6 hours

            - PT24H or P1D: Every 24 hours (daily)

            - P7D: Every 7 days (weekly)

            - P1M: Every 1 month


            Reference: https://en.wikipedia.org/wiki/ISO_8601#Durations

            '
          type: string
          pattern: ^P(?:\d+Y)?(?:\d+M)?(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+(?:\.\d+)?S)?)?$
          x-vectara-duration:
            min_interval: PT1H
          example: PT24H
      required:
      - type
      - interval
    CronScheduleConfiguration:
      description: Configuration for cron-based schedule execution.
      type: object
      properties:
        type:
          description: The type of schedule.
          type: string
          enum:
          - cron
          example: cron
        cron_expression:
          description: "Cron expression specifying when the schedule should execute.\n\
            \nUses standard 5-field cron format:\n\u250C\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 minute (0-59)\n\u2502\
            \ \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500 hour (0-23)\n\u2502 \u2502 \u250C\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 day of month (1-31)\n\
            \u2502 \u2502 \u2502 \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500 month (1-12)\n\u2502 \u2502 \u2502 \u2502\
            \ \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500 day of week (0-6, Sunday=0)\n\u2502 \u2502 \u2502 \u2502\
            \ \u2502\n* * * * *\n\nSpecial characters:\n- * : Any value\n- , : List\
            \ (e.g., \"1,15\" for 1st and 15th)\n- - : Range (e.g., \"1-5\" for Monday-Friday)\n\
            - / : Step (e.g., \"*/15\" for every 15 units)\n\nCommon examples:\n-\
            \ \"0 9 * * *\": Every day at 9:00 AM\n- \"0 9 * * 1-5\": Weekdays at\
            \ 9:00 AM\n- \"*/15 * * * *\": Every 15 minutes\n- \"0 */6 * * *\": Every\
            \ 6 hours\n- \"0 0 1 * *\": First day of every month at midnight\n- \"\
            0 0 * * 0\": Every Sunday at midnight\n\nTool for testing: https://crontab.guru/\n"
          type: string
          x-vectara-cron:
            min_interval: PT1H
          example: 0 9 * * *
      required:
      - type
      - cron_expression
    ScheduleConfiguration:
      description: Configuration for when and how often the schedule should execute.
      oneOf:
      - $ref: '#/components/schemas/IntervalScheduleConfiguration'
      - $ref: '#/components/schemas/CronScheduleConfiguration'
    ScheduleStallTimeoutSeconds:
      description: 'Number of seconds a scheduled run may go without producing output
        (streamed tokens, tool calls,

        or other progress events) before it is considered stalled and retried. Set
        this above the longest

        silent operation the agent is expected to perform so an in-flight run is not
        retried mid-operation.

        '
      type: integer
      format: int32
      default: 3600
      minimum: 1
      example: 1800
    AgentSchedule:
      description: An agent schedule that automates agent execution at specified intervals.
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentScheduleKey'
        agent_key:
          $ref: '#/components/schemas/AgentKey'
        name:
          $ref: '#/components/schemas/AgentScheduleName'
        description:
          description: A detailed description of the schedule's purpose.
          type: string
          example: Generates a daily summary report of customer support activities
        message:
          description: The input message to send to the agent on each scheduled execution.
          type: array
          items:
            $ref: '#/components/schemas/AgentInput'
          example:
          - type: text
            content: Generate a summary of today's activities
        schedule:
          $ref: '#/components/schemas/ScheduleConfiguration'
        enabled:
          description: Whether the schedule is currently active and executing.
          type: boolean
          default: true
          example: true
        session_metadata:
          description: Arbitrary metadata to include in each session created by this
            schedule.
          type: object
          additionalProperties: true
          default: {}
          example:
            report_type: daily
            format: markdown
        max_executions_to_keep:
          description: Maximum number of past execution records to keep. Older records
            are deleted automatically when a new execution is recorded.
          type: integer
          format: int32
          default: 10
          minimum: 1
          maximum: 50
          example: 10
        stall_timeout_seconds:
          $ref: '#/components/schemas/ScheduleStallTimeoutSeconds'
        last_execution_at:
          description: 'Timestamp of the most recent execution. Tracked by Temporal
            and updated automatically

            after each execution. Null if the schedule has never executed.

            '
          type: string
          format: date-time
          nullable: true
          example: '2024-01-15T10:30:00Z'
        created_at:
          description: 'Timestamp when the schedule was created. Note: This is a placeholder
            value as Temporal

            does not store creation timestamps. Use for API compatibility only.

            '
          type: string
          format: date-time
          example: '1970-01-01T00:00:00Z'
      required:
      - key
      - agent_key
      - name
      - message
      - schedule
      - enabled
      - created_at
    ListAgentSchedulesResponse:
      description: Response containing a list of agent schedules with pagination metadata.
      type: object
      properties:
        schedules:
          description: Array of agent schedules.
          type: array
          items:
            $ref: '#/components/schemas/AgentSchedule'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      required:
      - schedules
      - metadata
    CreateAgentScheduleRequest:
      description: Request object for creating a new agent schedule.
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentScheduleKey'
          description: Optional unique key for the schedule. If not provided, will
            be auto-generated.
        name:
          $ref: '#/components/schemas/AgentScheduleName'
        description:
          description: Optional detailed description of the schedule's purpose.
          type: string
        message:
          description: The input message to send to the agent on each scheduled execution.
          type: array
          items:
            $ref: '#/components/schemas/AgentInput'
        schedule:
          $ref: '#/components/schemas/ScheduleConfiguration'
        enabled:
          description: Whether the schedule should be active upon creation.
          type: boolean
          default: true
        session_metadata:
          description: Arbitrary metadata to include in each session created by this
            schedule.
          type: object
          additionalProperties: true
          default: {}
        max_executions_to_keep:
          description: Maximum number of past execution records to keep. Defaults
            to 10.
          type: integer
          format: int32
          default: 10
          minimum: 1
          maximum: 50
        stall_timeout_seconds:
          $ref: '#/components/schemas/ScheduleStallTimeoutSeconds'
      required:
      - name
      - message
      - schedule
    UpdateAgentScheduleRequest:
      description: Request object for updating an existing agent schedule. All fields
        are optional for PATCH semantics.
      type: object
      properties:
        name:
          $ref: '#/components/schemas/AgentScheduleName'
        description:
          description: Updated description of the schedule's purpose.
          type: string
        message:
          description: Updated input message to send to the agent on each scheduled
            execution.
          type: array
          items:
            $ref: '#/components/schemas/AgentInput'
        schedule:
          $ref: '#/components/schemas/ScheduleConfiguration'
        enabled:
          description: Updated enabled status for the schedule.
          type: boolean
        session_metadata:
          description: Updated metadata to include in each session created by this
            schedule.
          type: object
          additionalProperties: true
        max_executions_to_keep:
          description: Updated maximum number of past execution records to keep.
          type: integer
          format: int32
          minimum: 1
          maximum: 50
        stall_timeout_seconds:
          description: 'Updated number of seconds a scheduled run may go without producing
            output before it is

            considered stalled and retried. Omit to leave the current value unchanged.

            '
          type: integer
          format: int32
          minimum: 1
    AgentScheduleExecution:
      description: A single execution attempt of an agent schedule.
      type: object
      properties:
        schedule_key:
          $ref: '#/components/schemas/AgentScheduleKey'
        workflow_run_id:
          description: Temporal run ID grouping all retry attempts of the same trigger.
          type: string
        session_key:
          description: Session created by this attempt. Null if the attempt failed
            before session creation.
          type: string
          nullable: true
        attempt:
          description: 1-based attempt number within the workflow run.
          type: integer
          format: int32
        status:
          description: Outcome of this attempt.
          type: string
          enum:
          - success
          - error
        error_message:
          description: Error message if the attempt failed.
          type: string
          nullable: true
        executed_at:
          description: Timestamp when this attempt ran.
          type: string
          format: date-time
      required:
      - schedule_key
      - workflow_run_id
      - attempt
      - status
      - executed_at
    ListAgentScheduleExecutionsResponse:
      description: Response containing a paginated list of schedule execution attempts.
      type: object
      properties:
        executions:
          type: array
          items:
            $ref: '#/components/schemas/AgentScheduleExecution'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      required:
      - executions
      - metadata
    AgentIdentityMode:
      description: 'The role management mode of the agent''s identity.

        - `auto`: The platform keeps roles in sync with the agent''s tool configuration.
        When tools change, roles are automatically recomputed.

        - `manual`: Roles are user-managed. The platform will not modify roles when
        the agent is updated.

        '
      type: string
      enum:
      - auto
      - manual
      example: auto
    AgentIdentity:
      description: The identity associated with an agent, including its roles and
        management mode.
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/AgentIdentityMode'
        client_id:
          description: The OAuth2 client ID of the agent's service account.
          type: string
          readOnly: true
          example: abc123def456
        api_roles:
          description: Customer-level roles assigned to this identity.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        corpus_roles:
          description: Corpus-specific role assignments for this identity.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: Agent-specific role assignments for this identity.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
      required:
      - mode
      - client_id
      - api_roles
      - corpus_roles
      - agent_roles
    UpdateAgentIdentityRequest:
      description: "Update the agent's identity. All fields are optional \u2014 only\
        \ provided fields are changed.\n\nSetting `mode` to `manual` freezes roles.\
        \ The platform will no longer recompute roles when the agent's tool configuration\
        \ changes.\n\nSetting `mode` to `auto` resumes platform-managed roles. The\
        \ platform will immediately resync roles to match the current tool configuration.\
        \ Any provided role fields are ignored in auto mode.\n"
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/AgentIdentityMode'
        api_roles:
          description: Customer-level roles to assign. Only applied in `manual` mode.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        corpus_roles:
          description: Corpus-specific roles to assign. Only applied in `manual` mode.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: Agent-specific roles to assign. Only applied in `manual` mode.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
    AgentSecrets:
      description: "Agent-scoped secrets for the agent. On read, values are masked\
        \ (`****`) \u2014 plaintext is never returned.\nReference values from a tool's\
        \ `argument_override` via `{\"$ref\": \"agent.secrets.<name>\"}`.\n"
      type: object
      properties:
        secrets:
          description: Map of secret name to masked value.
          type: object
          additionalProperties:
            type: string
          example:
            jira_api_token: '****'
            slack_webhook: '****'
      required:
      - secrets
    ReplaceAgentSecretsRequest:
      description: "Replace the agent's secrets set. The submitted map fully replaces\
        \ what was previously stored \u2014 names not in the request are removed.\n\
        Stored encrypted at rest using the agent's encryption key.\n"
      type: object
      properties:
        secrets:
          description: Map of secret name to plaintext value.
          type: object
          additionalProperties:
            type: string
            maxLength: 4096
          example:
            jira_api_token: ATATT3xFf...
      required:
      - secrets
    UpdateAgentSecretsRequest:
      description: 'Patch the agent''s secrets. Names present in the map are added
        or replaced; names absent from the map are left unchanged.

        A name mapped to `null` is removed. Stored encrypted at rest using the agent''s
        encryption key.

        '
      type: object
      properties:
        secrets:
          description: 'Map of secret name to plaintext value (or `null` to remove).
            Names not in the map are not touched.

            '
          type: object
          additionalProperties:
            type: string
            nullable: true
            maxLength: 4096
          example:
            jira_api_token: ATATT3xFf...
            old_token_to_remove: null
      required:
      - secrets
    AgentOutputType:
      description: A category of intermediate agent output a connector can hide from
        its channel via `hidden_output_types`. `tool_calls` is the agent's tool-call
        activity, `thinking` is the model's reasoning output, and `structured_output`
        is structured (JSON) payloads emitted by the agent. The final response is
        never one of these and is always posted.
      type: string
      enum:
      - tool_calls
      - thinking
      - structured_output
      example: tool_calls
    ConnectorConfigurationBase:
      description: Properties shared by every connector configuration read view.
      type: object
      properties:
        hidden_output_types:
          description: Agent output types omitted from the connector's channel; the
            final response is always posted.
          type: array
          default: []
          items:
            $ref: '#/components/schemas/AgentOutputType'
          example:
          - tool_calls
    SlackConnectorConfiguration:
      description: Read view of a Slack connector's configuration.
      allOf:
      - $ref: '#/components/schemas/ConnectorConfigurationBase'
      - type: object
        properties:
          type:
            description: The type of connector configuration.
            type: string
            default: slack
            example: slack
          bot_token:
            description: Slack bot token (xoxb-) for API access. Encrypted at rest.
            type: string
            example: xoxb-1234567890-1234567890123-abcdefghijklmnopqrstuvwx
          signing_secret:
            description: Slack signing secret for webhook verification. Encrypted
              at rest.
            type: string
            example: abcdef1234567890abcdef1234567890abcdef12
          api_app_id:
            description: Slack App ID for customer lookup in webhooks.
            type: string
            example: A1234567890
          webhook_path:
            description: The webhook path for this Slack connector to receive events.
            type: string
            example: /v2/agents/customer_support/connectors/con_3Kx9QpVn2mZr8YbLc5TdWe/input
          respond_to_thread_replies:
            description: When true, the agent responds to follow-up replies in any
              thread it has already replied in or started, without requiring a new
              @-mention. Starting a new thread still requires an @-mention.
            type: boolean
            default: false
        required:
        - type
        - bot_token
        - signing_secret
        - api_app_id
        - webhook_path
      x-vectaraParents:
      - ConnectorConfiguration
    GchatConnectorConfiguration:
      description: 'Read view of a Google Chat connector''s configuration. Includes
        the display

        fields `client_email` and `project_id` parsed out of the service account key,

        and the audience URL used to verify inbound events. The service account key
        is

        never returned.

        '
      allOf:
      - $ref: '#/components/schemas/ConnectorConfigurationBase'
      - type: object
        properties:
          type:
            description: The type of connector configuration.
            type: string
            default: gchat
            example: gchat
          audience_url:
            description: 'The webhook URL for this connector. Set the Chat app''s
              HTTP endpoint URL

              and Authentication audience fields to this value in the Google Cloud

              console. Inbound Google Chat ID tokens are accepted only if aud equals

              this URL. This value contains a secret and is encrypted at rest.

              '
            type: string
            example: https://api.example.com/v2/agents/customer_support/connectors/con_3Kx9QpVn2mZr8YbLc5TdWe/gchat
          client_email:
            description: 'Service account email derived from the service account key.

              '
            type: string
            example: chat-bot@my-gchat-app.iam.gserviceaccount.com
          project_id:
            description: 'Google Cloud project id derived from the service account
              key. This is the project that hosts the Chat app, so clients can use
              it to deep-link into

              the app''s Google Chat configuration.

              '
            type: string
            example: my-gchat-app
        required:
        - type
        - audience_url
        - client_email
        - project_id
      x-vectaraParents:
      - ConnectorConfiguration
    ZoomConnectorConfiguration:
      description: 'Read view of a Zoom Contact Center connector''s configuration.
        Includes the

        server-generated `connector_token` to configure as the `x-zoom-connector-token`
        header on the

        Zoom Contact Center bot connector, and the `webhook_path` to configure as

        the bot endpoint URL. The agent''s reply is always delivered asynchronously.

        The webhook returns a typing indicator and the reply is POSTed to

        `callback_url` when the agent finishes.

        '
      allOf:
      - $ref: '#/components/schemas/ConnectorConfigurationBase'
      - type: object
        properties:
          type:
            description: The type of connector configuration.
            type: string
            default: zoom
            example: zoom
          connector_token:
            description: 'Server-generated shared secret that authenticates inbound
              webhook

              requests. Zoom Contact Center must send this value in the

              `x-zoom-connector-token` header. Generated at create time, preserved

              across configuration updates, and encrypted at rest.

              '
            type: string
            example: 3q2-8hG7kPzR5tWvYxA1bC4dE6fJ9mN0oQsUiZlXnKw
          callback_url:
            description: 'The Zoom-provided URL the agent''s reply is POSTed to once
              it is

              ready. Always an absolute https URL.

              '
            type: string
            example: https://zcc.zoom.us/webhook/chatbot/12345
          callback_access_token:
            description: 'Optional access token issued by Zoom for the callback URL.
              When

              set, reply POSTs carry it as a bearer Authorization header.

              Encrypted at rest.

              '
            type: string
            example: kP9mW2nR7sT1vX6cB3dF8gH5jL0qYzA4eU7iO2xK
          typing_duration_seconds:
            description: 'How long the typing indicator returned by the webhook runs
              while

              the agent works on its reply.

              '
            type: integer
            default: 60
            minimum: 1
            example: 60
          webhook_path:
            description: 'The inbound webhook path for this connector. Configure the
              Zoom

              Contact Center bot endpoint URL to this path on the Vectara API

              host.

              '
            type: string
            example: /v2/agents/customer_support/connectors/con_3Kx9QpVn2mZr8YbLc5TdWe/zoom
        required:
        - type
        - connector_token
        - callback_url
        - typing_duration_seconds
        - webhook_path
      x-vectaraParents:
      - ConnectorConfiguration
    ConnectorConfiguration:
      description: 'Read view of a connector''s configuration as returned by GET and
        list

        endpoints. Contains the secrets supplied at create time alongside

        server-derived display fields: Slack exposes `webhook_path`, gchat

        exposes `audience_url` and `client_email`, and zoom exposes the

        generated `connector_token` and `webhook_path`.

        '
      x-vectara-base-schema: '#/ConnectorConfigurationBase'
      discriminator:
        propertyName: type
        mapping:
          slack: '#/components/schemas/SlackConnectorConfiguration'
          gchat: '#/components/schemas/GchatConnectorConfiguration'
          zoom: '#/components/schemas/ZoomConnectorConfiguration'
      oneOf:
      - $ref: '#/components/schemas/SlackConnectorConfiguration'
      - $ref: '#/components/schemas/GchatConnectorConfiguration'
      - $ref: '#/components/schemas/ZoomConnectorConfiguration'
    AgentConnector:
      description: A connector that allows an agent to receive events from external
        platforms like Slack, Google Chat, or Zoom Contact Center.
      type: object
      properties:
        id:
          description: The unique identifier for the connector.
          type: string
          pattern: con_[0-9a-zA-Z_-]+$
          example: con_3Kx9QpVn2mZr8YbLc5TdWe
        agent_key:
          $ref: '#/components/schemas/AgentKey'
        name:
          description: The human-readable name of the connector.
          type: string
          example: Customer Support Slack Channel
        description:
          description: A detailed description of what this connector does.
          type: string
          example: Receives customer support messages from the
        type:
          description: The type of connector.
          type: string
          enum:
          - slack
          - gchat
          - zoom
          example: slack
        status:
          description: The current status of the connector.
          type: string
          enum:
          - active
          - inactive
          - error
          default: active
          example: active
        status_message:
          description: Detailed status message (e.g., error description or success
            confirmation).
          type: string
          example: Slack authentication successful
        metadata:
          description: Arbitrary metadata associated with the connector.
          type: object
          additionalProperties: true
          example:
            priority: high
            department: customer_service
        enabled:
          description: Whether the connector is currently enabled and can receive
            events.
          type: boolean
          default: true
          example: true
        configuration:
          $ref: '#/components/schemas/ConnectorConfiguration'
        created_at:
          description: Timestamp when the connector was created.
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updated_at:
          description: Timestamp when the connector was last updated.
          type: string
          format: date-time
          example: '2024-01-16T14:45:00Z'
        last_webhook_at:
          description: 'Timestamp of the most recently received inbound webhook for
            this

            connector, regardless of outcome. Absent until the first webhook

            arrives.

            '
          type: string
          format: date-time
          example: '2024-01-16T14:45:00Z'
        last_webhook_status:
          description: 'Outcome of the most recently received inbound webhook. Absent
            until the

            first webhook arrives. Values:

            - `success`: the webhook verified and the event was accepted.

            - `jwt_verification_failed`: the bearer token was missing or could not
            be verified.

            - `audience_mismatch`: the token was valid but its aud did not equal the
            connector''s audience_url.

            - `auth_failed`: the inbound request lacked or did not match the connector''s
            authentication secret.

            - `missing_signature`: the request lacked the signature needed for an
            asynchronous reply.

            - `missing_engagement`: the request lacked the engagement identifier needed
            to route the session.

            - `event_parse_failed`: the event body could not be parsed.

            - `internal_error`: an unexpected error occurred after the connector was
            resolved.

            - `unknown`: the outcome could not be classified.

            '
          type: string
          enum:
          - success
          - jwt_verification_failed
          - audience_mismatch
          - auth_failed
          - missing_signature
          - missing_engagement
          - event_parse_failed
          - internal_error
          - unknown
          example: success
      required:
      - id
      - agent_key
      - name
      - type
      - status
      - enabled
      - configuration
      - created_at
    ListAgentConnectorsResponse:
      description: Response containing a list of agent connectors.
      type: object
      properties:
        connectors:
          description: List of agent connectors.
