          example: python
        code:
          maxLength: 100000
          minLength: 1
          type: string
          description: "The Python 3.12 code for the function. Must define a `process()` entry point.\nObject parameters must use `TypedDict`; bare `dict` and `Dict[K, V]` parameters are rejected.\nSee the `code` field on `CreateLambdaToolRequest` for full details and examples.\n"
          example: "def process(order_count: int, total_revenue: float) -> dict:\n    score = order_count * 10 + total_revenue * 0.1\n    return {'score': round(score, 2)}\n"
        execution_configuration:
          $ref: '#/components/schemas/ExecutionConfiguration'
        test_input:
          type: object
          description: The input parameters to test the function with. Will be validated against the discovered input schema.
          example:
            order_count: 10
            total_revenue: 500
        timeout_seconds:
          maximum: 300
          minimum: 1
