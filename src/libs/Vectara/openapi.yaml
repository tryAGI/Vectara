        agent_roles:
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
          description: The new agent role assignments. These will replace the current agent roles.
      description: Request to update an existing OAuth application client's properties.
    ToolServerId:
      pattern: ^tsr_.*
