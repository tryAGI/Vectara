          bot_token:
            description: Slack bot token (xoxb-) for API access. Encrypted at rest.
            type: string
            example: xoxb-1234567890-1234567890123-abcdefghijklmnopqrstuvwx
          signing_secret:
            description: Slack signing secret for webhook verification. Encrypted
              at rest.
            type: string
            example: abcdef1234567890abcdef1234567890abcdef12
          api_app_id:
            description: Slack App ID for customer lookup in webhooks.
            type: string
            example: A1234567890
          respond_to_thread_replies:
            description: When true, the agent responds to follow-up replies in any
              thread it has already replied in or started, without requiring a new
