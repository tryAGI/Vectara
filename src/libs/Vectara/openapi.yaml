      x-required-roles:
      - type: ApiRole
        roles:
        - agent_developer
        - agent_administrator
        - administrator
        - owner
      description: "Create a new alias. Aliases are routing primitives that map a\
        \ public name to one or more underlying agents under a configurable policy.\
        \ When a session is created through an alias (via `POST /v2/agent_aliases/{alias_key}/sessions`),\
        \ the alias's policy decides which underlying agent runs that session.\n\n\
        Common patterns:\n- **Direct alias** \u2014 a `routed` policy with one rule\
        \ and one target. Identical in behavior to invoking the agent directly.\n\
        - **Canary rollout** \u2014 a `routed` policy with one rule and multiple weighted\
        \ targets (e.g. 90% v1, 10% v2).\n- **Tenant routing** \u2014 a `routed` policy\
        \ with multiple rules, each matching on session metadata (e.g. `session.metadata.tenant`).\n"
      operationId: createAgentAlias
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
