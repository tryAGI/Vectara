        - required:
            - type
            - language
            - function_definition
          type: object
          properties:
            type:
              type: string
              description: This should always be `lambda`.
              default: lambda
              example: lambda
            language:
              enum:
                - python
              type: string
              description: The programming language of the lambda function. Currently only Python 3.12 is supported.
              default: python
              example: python
            output_schema:
              type: object
              description: The schema that defines the expected output structure from the function.
            function_definition:
              $ref: '#/components/schemas/FunctionDefinition'
      description: "A user-defined function that can be executed as a tool by agents.\nLambda tools run in a secure, sandboxed environment with resource limits.\nCurrently supports Python 3.12 with a curated set of libraries.\n"
      x-vectaraParents:
        - Tool
    StructuredIndexingTool:
