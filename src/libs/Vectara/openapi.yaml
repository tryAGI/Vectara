  /v2/hallucination_correctors:
    get:
      tags:
        - Hallucination Correctors
      summary: List hallucination correctors
      description: "The List Hallucination Correctors API enables users to list available hallucination correctors used for detecting and correcting hallucinations in AI-generated content. Vectara provides these models as part of its broader hallucination evaluation framework, and the Hallucination Correctors endpoint uses these models to propose factual corrections to summaries and other generative outputs.\n\nUse this API to inspect available correctors, filter results, and determine which hallucination corrector to reference in downstream workflows or evaluation pipelines.\n"
      operationId: listHallucinationCorrectors
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: filter
          in: query
          description: A regular expression applied to the name and description fields. Use this to return only hallucination correctors that match specific keywords or naming conventions.
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of hallucination correctors to return in the list. Defaults to 10. Range is between 1 and 100.
          schema:
            maximum: 100
            minimum: 1
            type: integer
