      type: string
      description: The type of tool server.
      example: mcp
    ToolServerTransport:
      enum:
        - sse
        - streamable-http
      type: string
      description: "Transport protocol for MCP server connections. Both use Server-Sent Events (SSE).\n- `sse`: Legacy format (https://modelcontextprotocol.io/specification/2024-11-05/basic/transports)\n- `streamable-http`: New format (https://modelcontextprotocol.io/specification/2025-03-26/basic/transports)\n"
      example: sse
    ToolServer:
      required:
        - name
        - type
        - uri
        - transport
