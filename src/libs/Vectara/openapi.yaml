        - $ref: '#/components/schemas/WebGetTool'
        - $ref: '#/components/schemas/LambdaTool'
        - $ref: '#/components/schemas/StructuredIndexingTool'
        - $ref: '#/components/schemas/SubAgentTool'
        - $ref: '#/components/schemas/ArtifactCreateTool'
