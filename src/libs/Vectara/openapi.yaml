  /v2/llms/chat/completions:
    post:
      tags:
        - LLM Chat Completions
      summary: Creates a model response for the given chat conversation
      description: "The Chat Completions API provides an OpenAI-compatible interface for generating model responses in multi-turn chat conversations. This API enables you to integrate our language models directly into applications designed to work with the OpenAI Chat Completions format, making it easy to leverage Vectara capabilities with minimal changes to existing tools or code.\n\nUse this API to enable interactive chat experiences that support context-aware responses, streaming output, and token usage tracking.\n\nThe request includes a series of chat messages and optional parameters that control the behavior and structure of the model response. The request body must include the `messages` parameter, an array of message objects (role, content) representing the full conversation so far.\n\n### Streaming responses\n\nIf the `stream` parameter is set to `true`, the response appears as a series of text/event-stream parts (also known as chunks). Each chunk includes a `delta` field showing the incremental message update.\n\n### Example request\n\nThis example sends a simple chat conversation to the API, asking the assistant for the capital of France. The request includes a system prompt, a user message, and a temperature setting for response variability.\n```json\n{\n  \"model\": \"chat-model-001\",\"messages\": [{ \"role\": \"system\", \"content\": \"You are a helpful assistant.\" },\n  { \"role\": \"user\", \"content\": \"What is the capital of France?\" }\n],\n\"temperature\": 0.7,\n\"stream\": false\n}\n```\n\n### Example response\nThe response includes a generated reply from the assistant, along with token usage statistics. In this example, the model returns a direct answer to a user question.\n```json\n{\n\"id\": \"chatcmpl-abc123\",}\n\"object\": \"chat.completion\",\n\"created\": 1712454830,\n\"model\": \"chat-model-001\",\n\"choices\": [\n  {\n    \"index\": 0,\n    \"message\": {\n      \"role\": \"assistant\",\n      \"content\": \"The capital of France is Paris.\"\n  },\n    \"finish_reason\": \"stop\"\n  }\n],\n\"usage\": {\n  \"prompt_tokens\": 21,\n  \"completion_tokens\": 9,\n  \"total_tokens\": 30\n  } \n} \n```\nIf the input summary is accurate, the `corrected_summary` matches the `original_summary`.\n"
      operationId: createChatCompletion
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
        required: true
      responses:
        '200':
          description: A chat completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatCompletionResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/CreateChatCompletionStreamResponse'
        '400':
          description: Chat completion request was malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Permissions do not allow creating a chat completion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-supported-api-key-type:
        - QueryService
        - Personal
      x-stream-based-on-body: stream()
      x-fern-sdk-group-name: llm
      x-fern-sdk-method-name: chatCompletion
  /v2/generation_presets:
    get:
      tags:
        - Generation Presets
      summary: List generation presets
      description: "Organizations often struggle to fine-tune query responses and maintain consistency across different use cases. Vectara creates and maintains predefined generation presets for our users which provides a flexible and powerful way to utilize generation parameters. Each preset includes a complete Velocity template for the prompt along with other generation parameters. Presets are typically associated with a single LLM.\n\nThe List Generation Presets API lets you view the generation presets used for [query](/docs/rest-api/queries) requests. Generation presets group several properties that configure generation for a request. These presets provide more flexibility in how generation parameters are configured, enabling more fine-tuned control over query responses.\n\nThis includes the `prompt_template`, the Large Language Model (LLM), and other generation settings like `max_tokens` and `temperature`. Users specify a generation preset in their query or chat requests using the `generation_preset_name` field.\n\n## Generation presets object\n\nThe `generation_presets` object contains the `name`, `description`, `llm_name`, `prompt_template`, and other fields make up the preset.\n\nIf your account has access to a preset, then `enabled` is set to `true`. A preset can also be set as a `default`.\\n\\n### Example generation presets response\\n\\n```json\\n{\\n  \\\"generation_presets\\\": [\\n    {\\n      \\\"name\\\": \\\"vectara-summary-ext-24-05-med-omni\\\",\\n      \\\"description\\\": \\\"Generate summary with controllable citations, Uses GPT-4o with 2,048 max tokens\\\",\\n      \\\"llm_name\\\": \\\"gpt-4o\\\",\\n      \\\"prompt_template\\\": \\\"[\\\\n    {\\\\\\\"role\\\\\\\": \\\\\\\"system\\\\\\\", \\\\\\\"content\\\\\\\": \\\\\\\"Follow these detailed step-by-step\\\",\\n      \\\"max_used_search_results\\\": 25,\\n      \\\"max_tokens\\\": 2048,\\n      \\\"temperature\\\": 0,\\n      \\\"frequency_penalty\\\": 0,\\n      \\\"presence_penalty\\\": 0,\\n      \\\"enabled\\\": true,\\n      \\\"default\\\": false\\n    },\\n    // More presets appear here\\n}\\n```\\n\"\n"
      operationId: listGenerationPresets
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: llm_name
          in: query
          description: Filter presets by the LLM name.
          schema:
            type: string
            example: mockingbird-2.0
        - name: limit
          in: query
          description: The maximum number of results to return in the list.
          schema:
            maximum: 100
            minimum: 1
            type: integer
            format: int32
            default: 10
          example: 50
        - name: page_key
          in: query
          description: Used to retrieve the next page of generation presets after the limit has been reached. This parameter is not needed for the first page of results.
          schema:
            type: string
      responses:
        '200':
          description: List of Generation Presets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGenerationPresetsResponse'
        '403':
          description: Permissions do not allow listing generation presets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-supported-api-key-type:
        - QueryService
        - Personal
      x-fern-sdk-group-name: generation_presets
      x-fern-sdk-method-name: list
      x-fern-pagination:
        cursor: $request.page_key
        next_cursor: $response.metadata.page_key
        results: $response.generation_presets
  /v2/evaluate_factual_consistency:
    post:
      tags:
        - Factual Consistency Evaluation
      summary: Evaluate factual consistency
      description: "Evaluate the factual consistency of a generated text (like a summary) against source documents. This determines how accurately the generated text reflects the information in the source documents, helping identify potential hallucinations or misrepresentations.\n\nUse this API to programmatically validate generated content against trusted source materials—an essential capability for applications in high-integrity environments such as legal, healthcare, scientific publishing, and enterprise knowledge systems.\n\nThe request body must include the following parameters:\n* `model_parameters:` Optionally specifies the evaluation model to use. Default is `hhem_v2.2`.\n* `generated_text`: The output text you want to evaluate, such as a model-generated summary, answer, or response.\n* `source_texts`: An array of source documents or passages used to verify the accuracy of the generated text.\n* `language`: The ISO 639-3 code representing the language of the provided texts (`eng` for English, `fra` for French).\n\n### Example request\n\nThis example evaluates whether a generated statement about the Eiffel Tower is factually accurate based on two reference documents.\n\n```json\n{\n  \"generated_text\": \"The Eiffel Tower is located in Berlin.\",\n  \"source_texts\": [\n    \"The Eiffel Tower is a famous landmark located in Paris, France.\",\n    \"It was built in 1889 and remains one of the most visited monuments in the world.\"\n  ],\n  \"language\": \"eng\"\n}\n```\n### Example response\n\nThe response includes a factual consistency score and probability estimates.\n\n```json\n{\n  \"score\": 0.23,\n  \"p_consistent\": 0.12,\n  \"p_inconsistent\": 0.88\n}\n```\n* `score`: A normalized value between `0.0` and `1.0` that reflects the overall factual alignment between the generated text and the source texts. Higher scores indicate stronger consistency.\n* `p_consistent`: The estimated probability that the generated text is factually consistent with the sources.\n* `p_inconsistent`: The estimated probability that the generated text contains factual inaccuracies relative to the source documents.\n"
      operationId: evaluateFactualConsistency
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateFactualConsistencyRequest'
      responses:
        '200':
          description: The factual consistency evaluation results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateFactualConsistencyResponse'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Permissions do not allow factual consistency evaluation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Language not supported by the factual consistency service.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-supported-api-key-type:
        - QueryService
        - Personal
      x-fern-sdk-group-name: factual-consistency
      x-fern-sdk-method-name: evaluate
