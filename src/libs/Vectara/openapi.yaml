        - name
        - model
        - uri
        - auth
      type: object
      properties:
        type:
          type: string
          description: Must be "vertex-ai" for Google Cloud Vertex AI Gemini models
          default: vertex-ai
        name:
          type: string
          description: 'Name to reference the LLM. This will be used in other endpoints (like query) when using this LLM. If this name conflicts with a global LLM (a LLM that is preconfigured with the Vectara platform), then it will override that LLM for all usages.'
        description:
          type: string
