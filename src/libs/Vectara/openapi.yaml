      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      - in: path
        name: agent_key
        description: The unique identifier of the agent to list sessions for.
        required: true
        schema:
          $ref: '#/components/schemas/AgentKey'
      - in: query
        name: filter
        description: A regular expression against session names and descriptions to
          filter the results.
        required: false
        schema:
          type: string
          example: support.*
      - in: query
        name: metadata_filter
        description: 'A filter expression to narrow the list to sessions whose metadata
          matches. Field names refer to keys on the session''s `metadata` object.
          Syntax is similar to a SQL WHERE clause, the same as the `metadata_filter`
          used in query requests. See [metadata filters documentation](https://docs.vectara.com/docs/learn/metadata-search-filtering/filter-overview)
          for more information.


          Examples:

          - `user_role = ''premium''`

          - `tier >= 2 AND region = ''us''`

          - `user LIKE ''%@example.com''`

          - `tier IN (''premium'', ''enterprise'')`

          - `tier IS NULL`

          - `"profile.country" = ''US''` (nested fields use a quoted dotted path)

          - `1 IN user_ids` (value present in an array)

          '
        required: false
        schema:
          type: string
          maxLength: 8000
          example: user_role = 'premium' AND tier >= 2
      - in: query
        name: limit
        description: The maximum number of sessions to return in the list.
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 10
      - name: page_key
        in: query
        description: Used to retrieve the next page of sessions after the limit has
          been reached.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: List of available agent sessions.
          content:
            application/json:
              schema:
