openapi: 3.0.0
info:
  title: Vectara REST API v2
  description: "The Vectara Platform to context engineer Enterprise Agents. The REST\
    \ API gives you server-side control with enterprise-grade RBAC, multi-tenancy,\
    \ and full observability. Build agents that combine Vectara's multimodal retrieval\
    \ with tool use, structured instructions, and managed sessions \u2014 all through\
    \ simple REST endpoints.\n\nAll endpoints live at `https://api.vectara.io/v2/<resource>`\
    \ using lowercase paths with underscores for multi-word segments (e.g. `/corpora/:corpus_key/documents`,\
    \ `/tool_servers`).\n\n## API conventions\n\nWe follow standard REST conventions:\
    \ `GET` to read, `POST` to create, `PATCH` to partially update, `PUT` to replace,\
    \ and `DELETE` to remove. Most resources use `PATCH` for updates; a few use `PUT`\
    \ for full replacement. Actions that don't map to CRUD verbs use a separate `POST\
    \ /<resource>/<action>` path (e.g. `POST /corpora/:corpus_key/reset`).\n\n**Backward\
    \ compatibility** \u2014 New fields may be added to any response at any time.\
    \ Fields are never removed, only deprecated. Clients should ignore unknown fields.\
    \ We aim for strong backward compatibility, though the agentic AI space is evolving\
    \ rapidly and agent-related APIs may see more frequent additions.\n\n## Authentication\
    \ methods\n\nEvery API request must be authenticated using one of these methods:\n\
    \n**API Key** \u2014 Pass your key in the `x-api-key` header. Create API keys\
    \ with precise roles for least-privilege access, or use personal API keys that\
    \ inherit the same roles as your user account.\n\n**OAuth 2.0** \u2014 Use the\
    \ client credentials flow to obtain a JWT token from `https://auth.vectara.io/oauth2/token`,\
    \ then pass it in the `Authorization: Bearer <token>` header. Tokens expire after\
    \ 30 minutes.\n\n## Role-based access control\n\nEach endpoint requires specific\
    \ roles. The role badges on each endpoint page show which roles grant access.\
    \ Vectara uses three role types:\n\n**API Roles** (account-wide, assigned to users):\
    \ Roles like `owner`, `administrator`, `corpus_administrator`, `corpus_developer`,\
    \ `corpus_viewer`, `agent_administrator`, `agent_developer`, `agent_viewer`, `agent_user`,\
    \ `pipeline_administrator`, `pipeline_viewer`, and `viewer`. These grant access\
    \ across all resources of that type.\n\n**Corpus Roles** (per-corpus, assigned\
    \ on specific corpora): `owner`, `administrator`, `editor`, `viewer`. These grant\
    \ access to a specific corpus only.\n\n**Agent Roles** (per-agent, assigned on\
    \ specific agents): `agent_administrator`, `agent_developer`, `agent_viewer`,\
    \ `agent_user`. These grant access to a specific agent only.\n\nA user's effective\
    \ permissions are the union of their API roles, corpus roles, and agent roles.\
    \ Higher roles in each hierarchy inherit lower role permissions. See [Role-based\
    \ access control](/docs/security/authorization/role-based-access-control) for\
    \ the full role hierarchy and assignment instructions.\n"
  version: '2.0'
  termsOfService: https://vectara.com/legal/terms-of-service/
  x-logo:
    url: https://docs.vectara.com/img/vectara_wordmark.png
    altText: Vectara
  x-dark-logo:
    url: https://docs.vectara.com/img/vectara_wordmark_light.png
    altText: Vectara
  contact:
    email: feedback@vectara.com
servers:
- url: https://api.vectara.io
security:
- ApiKeyAuth: []
- OAuth2: []
tags:
- name: Agents
  description: Create and interact with AI agents that can use tools and corpora to
    perform complex queries.
- name: Agent Sessions
  description: Manage agent sessions and interact with agents through conversational
    events.
- name: Agent Schedules
  description: Create and manage scheduled automated execution of agents at specified
    intervals.
- name: Agent Identity
  description: View and manage the identity used by an agent to execute tools.
- name: Agent Secrets
  description: Manage agent-scoped secrets that can be referenced from tool argument
    overrides via $ref.
- name: Agent Memory
  description: Read and update the agent's accumulated learned memory, with version
    history.
- name: Agent Aliases
  description: 'Manage routing aliases that map a public name to one or more agents
    under a configurable policy. Create a session through an alias (`POST /v2/agent_aliases/{alias_key}/sessions`)
    and the alias''s policy picks the underlying agent that runs.

    '
- name: Guardrails
  description: List predefined guardrails for validating tool calls, agent outputs,
    and agent actions.
- name: Instructions
  description: Create and manage instructions that guide agent behavior.
- name: Tools
  description: Manage and discover tools available for AI agents to use in their workflows.
- name: Tool Configurations
  description: Manage reusable tool configurations that agents can reference by key.
- name: Tool Servers
  description: Manage tool servers that provide access to external tools for AI agents.
- name: Agent Connectors
  description: Create and manage connectors that allow agents to receive events from
    external platforms like Slack.
- name: Pipelines
  description: Create and manage automated data pipelines. A pipeline is a one-directional
    flow that sends all data from a source system to an agent, creating a new session
    per source record for the agent to act on. This is distinct from agent schedules
    (recurring single executions) and connectors (bidirectional chat integrations
    like Slack).
- name: Pipeline Runs
  description: Monitor pipeline execution runs and their processing outcomes.
- name: Agent Analytics
  description: Inspect traces emitted by agent executions and retrieve evaluation
    data.
- name: CustomerMetrics
  description: Query pre-aggregated time-series and distribution metrics scoped to
    the authenticated customer.
- name: Pipeline Dead Letters
  description: View and manage dead letters (failed records) for a pipeline. Dead
    letters are pipeline-scoped and can be retried individually or in bulk.
- name: Queries
  description: The Query APIs are the primary interface for searching your data and
    generating AI-powered summaries. After indexing documents into corpora, you use
    these endpoints to retrieve relevant information and optionally generate grounded
    summaries using Retrieval Augmented Generation (RAG).
- name: Metadata Query
  description: Query across arbitrary metadata fields in a corpus.
- name: Upload
  description: Upload files to a corpus for automatic parsing, text extraction, chunking,
    and indexing.
- name: Index
  description: Index and manage both core and structured documents to enable efficient
    search and retrieval.
- name: Corpora
  description: Create, manage, and update corpora and their associated settings.
- name: Documents
  description: Retrieve and manage documents stored in a corpus for administrative
    tasks.
- name: Generation Presets
  description: Manage generation presets for controlling the behavior of generative
    AI responses.
- name: Query History
  description: Retrieve and manage the history of previous queries for analytics and
    auditing.
- name: Authentication
  description: Authenticate with the API using OAuth 2.0 or API keys.
- name: API Keys
  description: Create, manage, and revoke API keys for secure access to the platform.
- name: Application Clients
  description: Configure and manage application clients for OAuth authentication.
- name: Large Language Models
  description: List LLMs for text summarization, chat, and other generation tasks.
- name: Encoders
  description: List available encoders (such as Boomerang) that turn text into vectors.
- name: Rerankers
  description: List rerankers for reranking search results.
- name: Jobs
  description: Monitor background jobs such as rebuilding indexes or updating corpus
    settings.
- name: Users
  description: Create, manage, and authenticate users within the platform for user
    administration.
- name: Table Extractors
  description: List available extractors for tabular data from documents.
- name: Hallucination Correctors
  description: API for managing hallucination correction, including listing available
    models and correcting hallucinated content in generated text.
- name: LLM Chat Completions
  description: Create model responses for chat conversations using OpenAI-compatible
    endpoints.
- name: Factual Consistency Evaluation
  description: Evaluate text quality metrics like factual consistency and hallucination
    detection.
- name: Customer Configuration
  description: Retrieve customer configuration and authentication details.
- name: Events
  description: Publish events to named streams for downstream consumption by analytics
    pipelines, data warehouses, and alerting systems.
- name: Glossaries
  description: Create and manage glossaries that map terms, acronyms, and abbreviations
    to their expanded forms. Agents can be reminded by glossaries to map domain specific
    terms to other terms.
- name: Chats
  description: 'Deprecated: use Agents instead. Chat endpoints are no longer supported.'
paths:
  /v2/corpora:
    post:
      summary: Create a corpus
      x-required-roles:
      - type: ApiRole
        roles:
        - corpus_administrator
        - administrator
        - owner
      description: "The Create Corpus API lets you create a corpus to store and manage\
        \ your documents. A corpus is a container for documents and their associated\
        \ metadata. When creating a corpus, you can specify various settings such\
        \ as the corpus key, name, description, encoder, and filter attributes.\n\n\
        ## Corpus object\n\nWhen you create a `corpus` object, the `corpus_key` property\
        \ is required to uniquely identify the corpus. The `name` parameter is optional\
        \ and defaults to the value of `key`. The optional `description` properties\
        \ lets you provide additional information about the corpus. When creating\
        \ a new corpus, you also have the flexibility to specify a custom `corpus_key`\
        \ that follows a naming convention of your choice. This allows you to assign\
        \ easily identifiable keys to your corpora, making it easier to manage and\
        \ reference them in your application.\n\nYou can specify whether to treat\
        \ queries or documents in the corpus as questions or answers using the `queries_are_answers`\
        \ and `documents_are_questions` boolean properties. These settings affect\
        \ the semantics of the encoder used at query time and indexing time.\n\n##\
        \ Add metadata as filter attributes\n\nWhen creating a corpus with this endpoint\
        \ or the Vectara Console, you define metadata fields using the `filter_attributes`\
        \ object. This ensures the corpus supports filtering on specific metadata\
        \ attributes, either at the document level or the part level.\n\nFilter attributes\
        \ enable you to attach metadata to your data at the document (`doc`) or `part`\
        \ level, which you can use later in filter expressions to narrow the scope\
        \ of your queries. A filter attribute must specify a unique `name` (up to\
        \ 64 characters long), and a `level` which indicates whether it exists in\
        \ the `doc` or `part` level metadata. At indexing time, metadata with this\
        \ name is extracted and made available for filter expressions to operate on.\
        \ [Learn more](https://docs.vectara.com/docs/build/prepare-data/metadata-filters)\n\
        \n### Doc and part filter levels\n\nThe `doc` attribute applies to the entire\
        \ document. Use this for metadata that is consistent across the whole document,\
        \ such as author, publication date, and document ID.\n\nThe `part` attribute\
        \ applies to specific sections or chunks within a document. Use for metadata\
        \ that may vary within different parts of the document, such as sections,\
        \ page numbers, and sentiment scores.\n\nIf `indexed` is true, the system\
        \ will build an index on the extracted values to further improve the performance\
        \ of filter expressions involving the attribute.\n\nFilter attributes must\
        \ specify a `type`, which is validated when documents are indexed. The four\
        \ supported types are `integer`, which stores signed whole-number values up\
        \ to eight bytes in length; `real`, for storing floating point values in [IEEE\
        \ 754 8-byte format]; `text` for storing textual strings in [UTF-8 encoding],\
        \ and `boolean` for storing true/false values.\n\nAfter you define filter\
        \ attributes, you can use them within your queries. For example:\n* Document-level\
        \ attribute: `doc.publication_year > 2020`\n* Part-level attribute: `part.sentiment_score\
        \ > 0.7`\n\n## Custom dimensions \nCustom dimensions let you add additional\
        \ context to your data that contain user-defined values in addition to what\
        \ Vectara automatically extracts and stores from the text. For example, *upvotes*\
        \ can be a custom dimension. For example, see [Add custom dimensions to boost\
        \ content](/docs/tutorials/add-custom-dimensions).\"\n"
      operationId: createCorpus
      tags:
      - Corpora
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCorpusRequest'
            examples:
              Financial:
                summary: Create a corpus for storing financial documents related to
                  ESG compliance in EU banks.
                value:
                  key: fin_esg_docs
                  name: EU Bank ESG Compliance
                  description: A corpus for storing and querying financial documents,
                    such as annual reports and ESG compliance filings, for European
                    banks in 2023.
                  save_history: true
                  encoder_name: boomerang-2023-q3
                  filter_attributes:
                  - level: part
                    name: industry
                    type: text
                    description: The industry sector of the document (banking).
                    indexed: true
                  - level: part
                    name: region
                    type: text
                    description: The geographical region of the document (EU).
                    indexed: true
                  - level: part
                    name: year
                    type: integer
                    description: The publication year of the document (2023).
                    indexed: true
                  - level: part
                    name: doc_type
                    type: text
                    description: The type of document (annual_report).
                    indexed: true
              Legal:
                summary: Create a corpus for legal documents focusing on intellectual
                  property cases in California.
                value:
                  key: legal_ip_cases
                  name: California IP Case Law
                  description: A corpus for indexing and searching legal documents
                    related to intellectual property rights cases in California, including
                    court rulings and contracts.
                  save_history: true
                  encoder_name: boomerang-2023-q3
                  filter_attributes:
                  - level: part
                    name: jurisdiction
                    type: text
                    description: The legal jurisdiction of the document (California).
                    indexed: true
                  - level: part
                    name: legal_domain
                    type: text
                    description: The legal domain of the document (IP).
                    indexed: true
                  - level: part
                    name: year
                    type: integer
                    description: The year of the case or document (2023).
                    indexed: true
                  - level: part
                    name: case_name
                    type: text
                    description: The name of the legal case (TechCo v. Ex-Employee).
                    indexed: true
              Support:
                summary: Create a corpus for technical support knowledge base articles
                  addressing web portal issues.
                value:
                  key: support_web_portal
                  name: Web Portal Support KB
                  description: A corpus for storing knowledge base articles to troubleshoot
                    issues in a web portal application, focusing on part-level metadata
                    for precise query filtering.
                  save_history: true
                  encoder_name: boomerang-2023-q3
                  filter_attributes:
                  - name: product
                    level: part
                    type: text
                    description: The product or application (portal_app).
                    indexed: true
                  - name: browser
                    level: part
                    type: text
                    description: The browser used (chrome).
                    indexed: true
                  - name: category
                    level: part
                    type: text
                    description: The issue category (sso, caching).
                    indexed: true
      responses:
        '201':
          description: The response message returns a unique `id` that you use to
            reference the corpus. The `name` does not need to be unique within an
            account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Corpus'
              examples:
                Financial:
                  summary: Newly created corpus for EU bank ESG compliance documents.
                  value:
                    id: crp_1001
                    key: fin_esg_docs
                    name: EU Bank ESG Compliance
                    description: A corpus for storing and querying financial documents,
                      such as annual reports and ESG compliance filings, for European
                      banks in 2023.
                    enabled: true
                    save_history: true
                    queries_are_answers: false
                    documents_are_questions: false
                    encoder_name: boomerang-2023-q3
                    filter_attributes:
                    - level: document
                      name: industry
                      type: text
                      description: The industry sector of the document (banking).
                      indexed: true
                    - level: document
                      name: region
                      type: text
                      description: The geographical region of the document (EU).
                      indexed: true
                    - level: document
                      name: year
                      type: integer
                      description: The publication year of the document (2023).
                      indexed: true
                    - level: document
                      name: doc_type
                      type: text
                      description: The type of document (annual_report).
                      indexed: true
                    limits:
                      used_docs: 0
                      used_parts: 0
                      used_bytes: 0
                      used_characters: 0
                      max_bytes: 0
                      max_metadata_bytes: 1048576
                      index_rate: 0
                    created_at: '2025-06-17T15:10:00Z'
                Legal:
                  summary: Newly created corpus for California intellectual property
                    case law.
                  value:
                    id: crp_1002
                    key: legal_ip_cases
                    name: California IP Case Law
                    description: A corpus for indexing and searching legal documents
                      related to intellectual property rights cases in California,
                      including court rulings and contracts.
                    enabled: true
                    save_history: true
                    queries_are_answers: false
                    documents_are_questions: false
                    encoder_name: boomerang-2023-q3
                    filter_attributes:
                    - level: document
                      name: jurisdiction
                      type: text
                      description: The legal jurisdiction of the document (California).
                      indexed: true
                    - level: document
                      name: legal_domain
                      type: text
                      description: The legal domain of the document (IP).
                      indexed: true
                    - level: document
                      name: year
                      type: integer
                      description: The year of the case or document (2023).
                      indexed: true
                    - level: document
                      name: case_name
                      type: text
                      description: The name of the legal case (TechCo v. Ex-Employee).
                      indexed: true
                    limits:
                      used_docs: 0
                      used_parts: 0
                      used_bytes: 0
                      used_characters: 0
                      max_bytes: 0
                      max_metadata_bytes: 1048576
                      index_rate: 0
                    created_at: '2025-06-17T15:10:00Z'
                Support:
                  summary: Newly created corpus for web portal technical support knowledge
                    base.
                  value:
                    id: crp_1003
                    key: support_web_portal
                    name: Web Portal Support KB
                    description: A corpus for storing knowledge base articles to troubleshoot
                      issues in a web portal application, focusing on part-level metadata
                      for precise query filtering.
                    enabled: true
                    save_history: true
                    queries_are_answers: false
                    documents_are_questions: false
                    encoder_name: boomerang-2023-q3
                    filter_attributes:
                    - name: product
                      level: part
                      type: text
                      description: The product or application (portal_app).
                      indexed: true
                    - name: browser
                      level: part
                      type: text
                      description: The browser used (chrome).
                      indexed: true
                    - name: category
                      level: part
                      type: text
                      description: The issue category (sso, caching).
                      indexed: true
                    limits:
                      used_docs: 0
                      used_parts: 0
                      used_bytes: 0
                      used_characters: 0
                      max_bytes: 0
                      max_metadata_bytes: 1048576
                      index_rate: 0
                    created_at: '2025-06-17T15:10:00Z'
        '400':
          description: Invalid request body in the create corpus request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Permissions do not allow creating a corpus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: The corpus already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-fern-sdk-group-name: corpora
      x-fern-sdk-method-name: create
    get:
      summary: List corpora
      x-required-roles:
      - type: ApiRole
        roles:
        - corpus_viewer
        - corpus_developer
        - corpus_administrator
        - viewer
        - administrator
        - owner
      description: 'The List Corpora API lets you retrieve a list of corpora in your
        account. This endpoint returns a paginated list of corpora objects, which
        contain basic information about each corpus. The returned corpus objects contain
        less detail compared to those retrieved the direct corpus retrieval operation.


        You can specify optional parameters to control the pagination and filtering
        of the results. The limit parameter determines the maximum number of corpora
        to return, with a default value of 10 and a maximum value of 100.

        '
      operationId: listCorpora
      tags:
      - Corpora
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      - name: limit
        in: query
        description: The maximum number of corpora to return at one time.
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 10
      - name: filter
        in: query
        description: A regular expression to filter the corpora by their name or summary.
        required: false
        schema:
          type: string
        example: Vectara Content
      - name: corpus_id
        in: query
        description: Filter corpora to only include corpora with these IDs.
        required: false
        schema:
          type: array
          items:
            type: string
            pattern: crp_[0-9]+$
        example:
        - crp_12345
      - name: page_key
        in: query
        description: Used to retrieve the next page of corpora after the limit has
          been reached.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: The response includes an array of `corpora` objects with matching
            `corpora` and `metadata`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCorporaResponse'
              examples:
                Legal:
                  summary: List of corpora containing legal documents, such as employment
                    contracts and non-disclosure agreements, with metadata filters
                    for jurisdiction and document type to support precise querying
                    for legal analysis
                  value:
                    corpora:
                    - id: crp_12345
                      key: legal-contracts-2025
                      name: Legal Contracts
                      description: Corpus for storing and querying employment contracts
                        and legal agreements, primarily for Delaware and California
                        jurisdictions.
                      enabled: true
                      chat_history_corpus: false
                      queries_are_answers: false
                      documents_are_questions: false
                      encoder_name: boomerang-2023-q3
                      save_history: true
                      filter_attributes:
                      - name: jurisdiction
                        level: document
                        description: The legal jurisdiction of the contract.
                        indexed: true
                        type: text
                      - name: type
                        level: document
                        description: The type of legal document (employment_contract,
                          nda).
                        indexed: true
                        type: text
                      limits:
                        used_docs: 150
                        used_parts: 4500
                        used_characters: 2500000
                        max_metadata_bytes: 10485760
                        index_rate: 0
                      created_at: '2025-06-27T13:47:00Z'
                    metadata:
                      page_key: page_legal_001
                Finance:
                  summary: List of corpora storing financial reports and equity policies
                    for banking and tech sectors, with metadata filters for sector
                    and reporting period to enable targeted financial analysis
                  value:
                    corpora:
                    - id: crp_67890
                      key: fin-reports-2025
                      name: Financial Reports
                      description: Corpus for quarterly financial reports and equity
                        compensation policies, focused on banking and technology sectors
                        in North America.
                      enabled: true
                      chat_history_corpus: false
                      queries_are_answers: false
                      documents_are_questions: false
                      encoder_name: boomerang-2023-q3
                      save_history: true
                      filter_attributes:
                      - name: sector
                        level: document
                        description: The industry sector of the financial report (Banking,
                          Technology).
                        indexed: true
                        type: text
                      - name: quarter
                        level: document
                        description: The reporting quarter (Q1-2025).
                        indexed: true
                        type: text
                      limits:
                        used_docs: 200
                        used_parts: 6000
                        used_characters: 3500000
                        max_metadata_bytes: 10485760
                        index_rate: 0
                      created_at: '2025-06-27T13:48:00Z'
                    metadata:
                      page_key: page_fin_002
                Support:
                  summary: List of corpora designed for storing chat-based support
                    ticket interactions, with metadata filters for issue type and
                    platform to facilitate troubleshooting and analysis of customer
                    support queries
                  value:
                    corpora:
                    - id: crp_98765
                      key: support-tickets-2025
                      name: Support Tickets
                      description: Corpus for storing chat-based support ticket interactions,
                        particularly for authentication and web portal issues on Chrome
                        and other platforms.
                      enabled: true
                      chat_history_corpus: true
                      queries_are_answers: false
                      documents_are_questions: false
                      encoder_name: boomerang-2023-q3
                      save_history: true
                      filter_attributes:
                      - name: issue
                        level: document
                        description: The type of support issue (auth_token_stale,
                          login_error).
                        indexed: true
                        type: text
                      - name: platform
                        level: document
                        description: The platform where the issue occurred (web_portal,
                          mobile_app).
                        indexed: true
                        type: text
                      limits:
                        used_docs: 500
                        used_parts: 10000
                        used_characters: 5000000
                        max_metadata_bytes: 10485760
                        index_rate: 0
                      created_at: '2025-06-27T13:49:00Z'
                    metadata:
                      page_key: page_support_003
        '403':
          description: Permissions do not allow listing corpora.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-fern-sdk-group-name: corpora
      x-fern-sdk-method-name: list
      x-fern-pagination:
        cursor: $request.page_key
        next_cursor: $response.metadata.page_key
        results: $response.corpora
  /v2/corpora/{corpus_key}:
    get:
      tags:
      - Corpora
      summary: Retrieve metadata about a corpus
      x-required-roles:
      - type: CorpusRole
        roles:
        - viewer
        - editor
        - administrator
        - owner
      - type: ApiRole
        roles:
        - corpus_viewer
        - corpus_developer
        - corpus_administrator
        - viewer
        - administrator
        - owner
      description: 'The Get Corpus API lets you view metadata about a specific corpus.
        This is useful for getting information about a corpus without performing a
        search. This operation does not search the corpus contents. Specify the `corpus_key`
        to identify the corpus whose metadata you want to retrieve.


        This endpoint helps administrators understand the access control details and
        monitor the size of corpora to understand information like the amount of quota
        consumed. You can also use this information for optimizing search and storage
        utilization.


        For example, you can track the read and write activity of a specific corpus
        which can help you change your security strategy proactively. You noticed
        a corpus with an API key with read/write access that is only being used for
        high volume reads. You may decide to switch to a read-only key.


        In another case, you might respond to a security incident by disabling a specific
        corpus because of information returned by this endpoint.


        ## Get the number of documents or document parts in a corpus


        Tracking the usage of documents in a corpus enables adminstrators to manage
        resource allocation efficiently. Monitoring corpus metrics also helps data
        usage stay within allocated quotas and identify trends in document growth
        and document segmentation.


        The `limit` object in the response provides comprehensive information about
        the current usage and limits of a corpus including the number of stored documents,
        document parts, and character count.

        '
      operationId: getCorpus
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
