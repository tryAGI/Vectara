          openai-responses: '#/components/schemas/UpdateOpenAIResponsesLLMRequest'
          vertex-ai: '#/components/schemas/UpdateVertexAILLMRequest'
          anthropic: '#/components/schemas/UpdateAnthropicLLMRequest'
      oneOf:
      - $ref: '#/components/schemas/UpdateOpenAILLMRequest'
      - $ref: '#/components/schemas/UpdateOpenAIResponsesLLMRequest'
      - $ref: '#/components/schemas/UpdateVertexAILLMRequest'
      - $ref: '#/components/schemas/UpdateAnthropicLLMRequest'
    ChatCompletionRequestMessage:
      description: A message in the chat completion request, representing part of
        the conversation.
      type: object
      required:
      - role
      - content
      properties:
        role:
          type: string
          description: The role of the author of this message. Common values include
            'system', 'user', 'assistant', 'function', and 'tool'.
        content:
          description: The contents of the message. Follows the exact format of the
            content field in the OpenAI Chat Completions API (https://platform.openai.com/docs/api-reference/chat/create).
            Can be a string for text-only messages, or an array of content parts for
            multimodal messages with text and images.
        name:
          type: string
          description: The name of the author of this message, used to connect messages
            in a conversation.
    JsonSchemaDefinition:
      description: A JSON Schema definition for describing data structure. Defines
        the minimum subset generally supported across LLM providers. Unknown keywords
        are passed through for forward compatibility.
      type: object
      properties:
        type:
          description: The JSON type for this schema element.
          type: string
          enum:
          - object
          - array
          - string
          - number
          - integer
          - boolean
          - 'null'
        title:
          description: Short human-readable label for this schema element.
          type: string
        description:
          description: Human-readable description of this schema element.
          type: string
        default:
          description: Default value when none is provided.
        enum:
          description: Allowed values for this schema element.
          type: array
        format:
          description: Semantic format hint (e.g. date-time, date, email, uri, uuid).
            Provider support varies.
          type: string
        properties:
          description: Property definitions when type is 'object'. Each key maps to
            a nested schema.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/JsonSchemaDefinition'
        required:
          description: List of required property names when type is 'object'.
          type: array
          items:
            type: string
        additionalProperties:
          description: Whether to allow additional properties beyond those defined.
          type: boolean
          default: false
        items:
          description: Schema for array elements when type is 'array'.
          $ref: '#/components/schemas/JsonSchemaDefinition'
        anyOf:
          description: Value must match at least one of the listed schemas.
          type: array
          items:
            $ref: '#/components/schemas/JsonSchemaDefinition'
      additionalProperties: true
    JsonSchemaSpec:
      description: Specification wrapper for a named JSON schema.
      type: object
      required:
      - name
      - schema
      properties:
        description:
          description: A description of what the response format is for, used by the
            model to determine how to respond in the format.
          type: string
        name:
          description: A unique name identifier for this schema.
          type: string
          pattern: ^[a-zA-Z0-9_-]+$
          minLength: 1
        strict:
          description: 'When true, enforces strict schema adherence. The model will
            always follow the exact schema structure.

            When strict mode is enabled, the schema must follow these rules:

            - `additionalProperties: false` must be set on all object types

            - All properties must be listed in the `required` array

            - Maximum 100 properties total, with max 5 levels of nesting

            - Unsupported keywords: minLength, maxLength, pattern, minimum, maximum,
            minItems, maxItems

            - Root schema cannot use `anyOf` type

            '
          type: boolean
          nullable: true
        schema:
          description: The JSON Schema definition that the model output must conform
            to.
          $ref: '#/components/schemas/JsonSchemaDefinition'
    ResponseFormat:
      description: 'Specifies the format the model must output.

        - `text`: Plain text responses (default).

        - `json_object`: Ensures the response is valid JSON.

        - `json_schema`: Ensures the response conforms to the provided JSON schema.

        '
      type: object
      required:
      - type
      properties:
        type:
          description: The format type. Use 'json_schema' for structured outputs,
            'json_object' for basic JSON mode, or 'text' for plain text.
          type: string
          default: text
          enum:
          - json_schema
          - json_object
          - text
        json_schema:
          description: The JSON schema specification. Required when type is 'json_schema'.
          $ref: '#/components/schemas/JsonSchemaSpec'
    CreateChatCompletionRequest:
      description: The request object for creating a chat completion with an OpenAI-compatible
        interface. This object is compatible with OpenAI's chat completion schema
        and supports customizable parameters for response generation.
      type: object
      required:
      - messages
      - model
      properties:
        model:
          type: string
          description: The ID of the model to use. This field is required.
        messages:
          type: array
          description: An ordered array of messages that represent the full context
            of the conversation to date. Each message includes a `role` and `content`.
          minItems: 1
          items:
            $ref: '#/components/schemas/ChatCompletionRequestMessage'
        stream:
          type: boolean
          description: Optional. When set to `true`, the API streams partial message
            deltas as they become available, similar to ChatGPT's streaming mode.
          default: false
        response_format:
          description: Specifies the output format for the model response.
          $ref: '#/components/schemas/ResponseFormat'
      additionalProperties: true
    ChatCompletionResponseMessage:
      description: A message in the chat completion response from the assistant.
      type: object
      required:
      - role
      properties:
        role:
          type: string
          description: The role of the author of this message, typically 'assistant'
            for responses.
      additionalProperties: true
    ChatCompletionResponseChoice:
      description: A single chat completion choice returned in the response
      type: object
      required:
      - index
      - message
      properties:
        index:
          type: integer
          description: The index of the choice in the array of choices.
        message:
          $ref: '#/components/schemas/ChatCompletionResponseMessage'
      additionalProperties: true
    CreateChatCompletionResponse:
      description: Response object containing the generated chat completion.
      type: object
      required:
      - object
      - choices
      properties:
        object:
          type: string
          enum:
          - chat.completion
          description: The object type, which is always 'chat.completion'.
        choices:
          type: array
          description: A list of chat completion choices. Can be more than one if
            `n` is greater than `1`.
          items:
            $ref: '#/components/schemas/ChatCompletionResponseChoice'
      additionalProperties: true
    ChatCompletionStreamResponseDelta:
      description: A partial message update to be merged with previous chunks in a
        streaming response.
      type: object
      properties:
        role:
          type: string
          description: The role of the author of this message, typically 'assistant'
            for responses.
      additionalProperties: true
    ChatCompletionStreamResponseChoice:
      description: A single chat completion chunk choice in a streaming response.
      type: object
      required:
      - index
      - delta
      properties:
        index:
          type: integer
          description: The index of the choice in the array of choices.
        delta:
          $ref: '#/components/schemas/ChatCompletionStreamResponseDelta'
      additionalProperties: true
    CreateChatCompletionStreamResponse:
      description: The response object for streaming chat completions in chunks.
      type: object
      required:
      - object
      - choices
      properties:
        object:
          type: string
          enum:
          - chat.completion.chunk
          description: The object type, which is always 'chat.completion.chunk' for
            streaming responses.
        choices:
          type: array
          description: A list of chat completion chunks.
          items:
            $ref: '#/components/schemas/ChatCompletionStreamResponseChoice'
      additionalProperties: true
    GenerationPresetOwnership:
      description: Indicates whether the generation preset is provided by the platform
        or created by the customer. Platform presets are pre-configured and cannot
        be modified or deleted. Customer presets are created and managed by the customer.
      type: string
      enum:
      - platform
      - customer
      example: platform
    GenerationPreset:
      description: Bundle of default values used when calling generation. All values
        except model name can be overridden at generation time.
      type: object
      properties:
        id:
          description: The ID of the generation preset.
          type: string
          pattern: gnp_.*
          example: gnp_123
        name:
          description: Name of the generation preset to be used with configuring generation.
          type: string
          example: Mockingbird 2.0
        description:
          description: Description of the generation preset.
          type: string
          example: Mockingbird LLM 2.0 prompt for summarizing query results as an
            answer. Designed for RAG.
        llm_name:
          description: Name of the model that these presets are used with. The list
            of available names can be fetched by the `GET /v2/llms` endpoint.
          type: string
          example: mockingbird-2.0
        prompt_template:
          description: Preset template used to render the prompt sent to generation.
          type: string
        max_used_search_results:
          description: Preset maximum number of search results that will be available
            to the prompt.
          type: integer
          format: int32
          minimum: 1
          example: 50
        max_tokens:
          description: Preset maximum number of tokens to be returned by the generation.
          type: integer
          format: int32
          minimum: 1
          example: 500
        temperature:
          description: The sampling temperature to use. Higher values make the output
            more random, while lower values make it more focused and deterministic.
          type: number
          format: float
          example: 0.4
        frequency_penalty:
          description: Higher values penalize new tokens based on their existing frequency
            in the generation so far, decreasing the model's likelihood to repeat
            the same line verbatim.
          type: number
          format: float
          example: 0.2
        presence_penalty:
          description: Higher values penalize new tokens based on whether they appear
            in the generation so far, increasing the model's likelihood to talk about
            new topics.
          type: number
          format: float
          example: 0.2
        additional_model_params:
          description: Additional model parameters beyond the standard fields above.
          type: object
          additionalProperties: true
        enabled:
          description: Indicates whether the prompt is enabled.
          type: boolean
        default:
          description: Indicates if this prompt is the default prompt used with the
            LLM.
          type: boolean
        ownership:
          description: Indicates whether the preset is provided by the platform (`platform`)
            or created by the customer (`customer`).
          $ref: '#/components/schemas/GenerationPresetOwnership'
      required:
      - name
    ListGenerationPresetsResponse:
      description: Response containing a list of generation presets for configuring
        RAG behavior.
      type: object
      properties:
        generation_presets:
          description: List of generation presets.
          type: array
          items:
            $ref: '#/components/schemas/GenerationPreset'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
    CreateGenerationPresetRequest:
      description: Request to create a new generation preset.
      type: object
      allOf:
      - $ref: '#/components/schemas/GenerationPreset'
      required:
      - name
      - llm_name
      - prompt_template
    EvaluateFactualConsistencyRequest:
      description: Request to evaluate the factual consistency of a generated text
        against source documents.
      type: object
      required:
      - generated_text
      - source_texts
      properties:
        model_parameters:
          description: The model parameters for the evaluation.
          type: object
          properties:
            model_name:
              description: The name of the model to use for evaluation. Only hhem_v2.3
                is supported.
              type: string
              example: hhem_v2.3
              default: hhem_v2.3
        generated_text:
          type: string
          description: The generated text (e.g., summary or answer) to evaluate for
            factual consistency.
        source_texts:
          type: array
          description: The source documents or text snippets against which to evaluate
            factual consistency.
          items:
            type: string
    EvaluateFactualConsistencyResponse:
      description: Results of the factual consistency evaluation.
      type: object
      required:
      - score
      properties:
        score:
          type: number
          format: double
          description: A prediction score that must be greater than 0 but less than
            1 from HHEM, monotonically indicates the likelihood of hallucinations.
          minimum: 0
          maximum: 1
    Encoder:
      description: A model that converts text into vector embeddings for semantic
        search.
      type: object
      properties:
        id:
          description: The Encoder ID.
          type: string
          pattern: enc_[0-9]+$
          example: enc_1
        name:
          description: The encoder name, `boomerang-2023-q3`.
          type: string
          example: openai-text-encoder
        type:
          description: The encoder type
          example: openai-compatible
          type: string
          default: vectara
        output_dimensions:
          description: When this encoder is used to create an embedding, it shows
            the count of dimensions for the output embedding. A high dimensionality
            will consume more storage space, but it allows for an increase in the
            quality of the embedding.
          type: integer
          format: int32
          example: 1536
        description:
          description: The encoder description.
          type: string
        default:
          description: Indicates whether the default encoder is used when creating
            a corpus.
          type: boolean
          example: true
        enabled:
          description: Indicates whether the encoder is enabled.
          type: boolean
          example: true
        image_encoding:
          description: Whether this encoder can produce embeddings for images, either
            of an image alone or jointly with accompanying text.
          type: boolean
          example: false
      required:
      - id
      - name
    ListEncodersResponse:
      description: Response containing a list of available encoders for converting
        text to vector embeddings.
      type: object
      properties:
        encoders:
          type: array
          items:
            $ref: '#/components/schemas/Encoder'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
    CreateOpenAIEncoderRequest:
      description: Configuration for a text-only encoder served by an endpoint that
        implements OpenAI's `/v1/embeddings` request shape.
      type: object
      properties:
        type:
          description: Must be "openai-compatible" for OpenAI and OpenAI-compatible
            text-embedding APIs.
          type: string
          default: openai-compatible
        name:
          description: A unique name for the encoder.
          type: string
          example: openai-text-encoder
        description:
          description: A description of what this encoder does.
          type: string
          example: Text encoder for product catalog search
        output_dimensions:
          description: The number of dimensions in the output embedding vector. If
            provided and the model supports truncation, the response will be truncated
            to this number of dimensions.
          type: integer
          format: int32
          minimum: 1
        uri:
          description: The URI endpoint for the embedding API (can be OpenAI or any
            compatible embedding API endpoint)
          type: string
          format: uri
          example: https://api.openai.com/v1/embeddings
        model:
          description: The model name to use for embeddings
          type: string
          example: text-embedding-ada-002
        auth:
          $ref: '#/components/schemas/RemoteAuth'
      required:
      - name
      - description
      - uri
      - model
      x-vectaraParents:
      - CreateEncoderRequest
    CreateVLlmEncoderRequest:
      description: Configuration for a vLLM-served embedding encoder. The endpoint
        must accept text-embedding requests and, when `image_encoding` is true, image-embedding
        requests.
      type: object
      properties:
        type:
          description: Must be "vllm-compatible" for vLLM-served embedding endpoints.
          type: string
          default: vllm-compatible
        name:
          description: A unique name for the encoder.
          type: string
          example: vllm-multimodal-encoder
        description:
          description: A description of what this encoder does.
          type: string
          example: Multimodal encoder for chart and table images
        output_dimensions:
          description: The number of dimensions in the output embedding vector. If
            provided and the model supports truncation, the response will be truncated
            to this number of dimensions.
          type: integer
          format: int32
          minimum: 1
        uri:
          description: The URI endpoint for the vLLM embedding API.
          type: string
          format: uri
          example: https://my-vllm-host/v1/embeddings
        model:
          description: The model name to use for embeddings.
          type: string
          example: nomic-embed-vision-v1.5
        auth:
          $ref: '#/components/schemas/RemoteAuth'
        image_encoding:
          description: Whether the encoder produces image embeddings, either of an
            image alone or jointly with accompanying text. When `true`, the endpoint
            must accept image-embedding requests; the create call validates this and
            fails if the endpoint does not support them.
          type: boolean
          default: false
      required:
      - name
      - description
      - uri
      - model
      x-vectaraParents:
      - CreateEncoderRequest
    CreateEncoderRequest:
      type: object
      description: Request to create a new encoder. Use `openai-compatible` for text-only
        endpoints that implement OpenAI's `/v1/embeddings`. Use `vllm-compatible`
        for endpoints that additionally support image embeddings.
      discriminator:
        propertyName: type
        mapping:
          openai-compatible: '#/components/schemas/CreateOpenAIEncoderRequest'
          vllm-compatible: '#/components/schemas/CreateVLlmEncoderRequest'
      oneOf:
      - $ref: '#/components/schemas/CreateOpenAIEncoderRequest'
      - $ref: '#/components/schemas/CreateVLlmEncoderRequest'
      required:
      - type
    Reranker:
      description: A reranker can be used in query or chat endpoints to reorder the
        search results.
      type: object
      properties:
        id:
          description: The ID of the reranker.
          type: string
          pattern: rnk_[0-9]+$
        name:
          description: The name of the reranker.
          type: string
        description:
          description: The description of the reranker.
          type: string
        enabled:
          description: Whether the reranker is enabled.
          type: boolean
      required:
      - id
      - name
    ListRerankersResponse:
      description: Response containing a list of available rerankers for improving
        search result ordering.
      type: object
      properties:
        rerankers:
          description: An array of rerankers.
          type: array
          items:
            $ref: '#/components/schemas/Reranker'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
    TableExtractor:
      description: A table extractor can be used to extract tabular data from documents
        during indexing.
      type: object
      properties:
        name:
          description: The name of the table extractor.
          type: string
          example: textract
        is_default:
          description: Indicates whether it is the default extractor when not specified
            during indexing.
          type: boolean
        description:
          description: The description of the table extractor.
          type: string
          example: Uses the AWS Textract service to extract tables.
        generation:
          $ref: '#/components/schemas/TableGenerationSpec'
    ListTableExtractorsResponse:
      type: object
      description: Response containing a list of available table extractors for document
        processing
      properties:
        table_extractors:
          description: An array of table extractors.
          type: array
          items:
            $ref: '#/components/schemas/TableExtractor'
    HallucinationCorrector:
      description: A hallucination corrector that detects and corrects hallucinations
        in generated text.
      type: object
      properties:
        id:
          description: The unique ID for the Hallucination Corrector (HC).
          type: string
          pattern: hcm_[0-9]+$
          example: hcm_520721853
        name:
          description: The hallucination corrector name, typically including the base
            name and variant.
          type: string
          example: vhc-small-1.0
        type:
          description: The hallucination corrector type. Defaults to `vectara`.
          type: string
          default: vectara
        description:
          description: "A short description of the hallucination corrector\u2019s\
            \ purpose."
          type: string
          example: Basic model for hallucination correction in AI-generated text.
        enabled:
          description: Indicates whether the hallucination corrector is enabled and
            available for use in hallucination correction workflows.
          type: boolean
          example: true
      required:
      - id
      - name
    ListHallucinationCorrectorsResponse:
      description: Response containing a list of hallucination correctors.
      type: object
      properties:
        hallucination_correctors:
          description: An array of hallucination correctors that match the request
            parameters.
          type: array
          items:
            $ref: '#/components/schemas/HallucinationCorrector'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
    HcmSourceDocument:
      description: An array of source documents used to verify the factual accuracy
        of the generated text. Each document should reflect the context used to generate
        the original text.
      type: object
      required:
      - text
      properties:
        text:
          type: string
          description: The full text content of the source document. Hallucination
            correction uses this content as the factual basis for correcting the generated
            text.
    HallucinationCorrectionRequest:
      description: The request to detect and correct hallucinations in generated text.
      type: object
      required:
      - generated_text
      - documents
      - model_name
      properties:
        generated_text:
          type: string
          description: The generated text to be evaluated. The hallucination corrector
            reviews this text and applies corrections based on the provided source
            documents.
        documents:
          type: array
          description: The source documents that were used to generate the text.
          items:
            $ref: '#/components/schemas/HcmSourceDocument'
        model_name:
          type: string
          description: The name of the LLM model to use for hallucination correction.
          example: vhc-large-1.0
        query:
          type: string
          description: Optional query that provides context for the expected response
            format and factual information. When provided, enables query-aware hallucination
            correction that considers the specific response format and factual context
            expected for the query.
          required: false
    CorrectionItem:
      description: A single correction applied to a span of text in the generated
        text.
      type: object
      required:
      - original_text
      - corrected_text
      - explanation
      properties:
        original_text:
          type: string
          description: The original text containing a hallucination or error.
        corrected_text:
          type: string
          description: The corrected version of the text.
        explanation:
          type: string
          description: An explanation of why the correction was needed for the text.
    HallucinationCorrectionResponse:
      description: The response that contains the hallucination correction results.
      type: object
      required:
      - corrected_text
      - corrections
      properties:
        corrections:
          type: array
          description: A list of corrections applied to the text, with explanations.
          items:
            $ref: '#/components/schemas/CorrectionItem'
        corrected_text:
          type: string
          description: The revised version of the text, with minimal edits made to
            correct unsupported or inaccurate statements. If no corrections are needed,
            this value is identical to the original text.
        model:
          type: string
          description: The name of the model used for hallucination correction.
    JobState:
      description: Enum representing the possible states of a background job.
      type: string
      enum:
      - unknown
      - queued
      - started
      - completed
      - failed
      - failed_will_retry
      - aborted
    Job:
      description: A background job for processing long-running operations on the
        platform.
      type: object
      properties:
        id:
          description: The ID of the job.
          type: string
          pattern: job_.+$
          example: job_1234
        type:
          description: The type of job.
          type: string
          enum:
          - rebuild_vector_index
          - replace_filter_attributes
          - bulk_delete_documents
          - unknown
        corpus_keys:
          description: The corpora that this job belongs to. It may not belong to
            any corpora.
          type: array
          items:
            $ref: '#/components/schemas/CorpusKey'
        state:
          $ref: '#/components/schemas/JobState'
        created_at:
          description: Specifies when the job was created.
          type: string
          format: date-time
        started_at:
          description: Specifies when the job was started.
          type: string
          format: date-time
        completed_at:
          description: Specifies when the job was completed.
          type: string
          format: date-time
        created_by_username:
          description: The username of the user who created the job. This property
            may be missing, e.g., if the job was created by the system, not a user.
          type: string
      required:
      - id
    ListJobsResponse:
      description: Response containing a list of background jobs and their current
        states.
      type: object
      properties:
        jobs:
          description: An array of jobs.
          type: array
          items:
            $ref: '#/components/schemas/Job'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
    ApiRole:
      description: Roles that a user or an app client can take on.
      type: string
      enum:
      - owner
      - administrator
      - billing_administrator
      - corpus_administrator
      - corpus_developer
      - agent_administrator
      - agent_viewer
      - agent_developer
      - agent_user
      - pipeline_administrator
      - pipeline_viewer
      - viewer
      - corpus_viewer
    CorpusRole:
      description: Corpus-specific role assignment.
      type: object
      properties:
        corpus_key:
          description: The key of the corpus this role applies to.
          type: string
        role:
          description: The role assigned for this specific corpus.
          type: string
          enum:
          - owner
          - administrator
          - viewer
          - editor
      required:
      - corpus_key
      - role
    AgentRole:
      description: Agent-specific role assignment.
      type: object
      properties:
        agent_key:
          description: The ID of the agent this role applies to.
          type: string
        role:
          description: 'The role assigned for this specific agent.

            * `agent_administrator` - Full administrative access to the agent including
            deletion and configuration.

            * `agent_viewer` - Read-only access to view agent configuration, sessions,
            events, instructions, and tools.

            * `agent_developer` - Can modify agent configuration, create/manage sessions,
            update tools and instructions.

            * `agent_user` - Limited access to interact with the agent by creating
            sessions and sending inputs. Cannot view agent configuration or modify
            settings.

            '
          type: string
          enum:
          - agent_administrator
          - agent_viewer
          - agent_developer
          - agent_user
      required:
      - agent_key
      - role
    ApiOperationPolicy:
      description: Policy to allow operations if only using the specified resource.
      type: object
      properties:
        allow_any_resource:
          description: If any resource is allowed for the operation.
          type: boolean
          default: true
        allowed_resources:
          description: Object with keys of resource paths to a list of allowed resources.
            A resource path starts with either body, path, or implicit. A body or
            path resource is within the operation body, and an implicit resource is
            a resource implied by the request.
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required:
      - allow_any_resource
    ApiPolicy:
      description: What actions a principal can take on the Vectara platform.
      type: object
      properties:
        name:
          description: The name of the API role.
          type: string
        allowed_operations:
          description: Operations that are allowed by the API role. Each operation
            may only allow certain resources that are described by a resource path
            to resource value map. If the value is null, then the operation is allowed
            on any resource.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ApiOperationPolicy'
      required:
      - name
      - allowed_operations
    User:
      description: A user account with associated profile information and permissions.
      type: object
      properties:
        id:
          description: The Vectara ID for the user.
          type: string
          pattern: usr_.+
        email:
          description: The email address for the user.
          type: string
          format: email
        username:
          description: The username for the user.
          type: string
          maxLength: 128
        enabled:
          description: Indicates whether the user is enabled or disabled.
          type: boolean
        description:
          description: The description of the user.
          type: string
          maxLength: 255
        created_at:
          description: When the user was created.
          type: string
          format: date-time
        updated_at:
          description: When a user property was last updated.
          type: string
          format: date-time
        api_roles:
          description: The customer-level role names of the user.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        corpus_roles:
          description: Corpus-specific role assignments for the user.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: Agent-specific role assignments for the user.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
        api_policy:
          $ref: '#/components/schemas/ApiPolicy'
      required:
      - id
      - email
    ListUsersResponse:
      description: Response containing a list of user accounts.
      type: object
      properties:
        users:
          description: List of users.
          type: array
          items:
            $ref: '#/components/schemas/User'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
    CreateUserRequest:
      description: Request to create a new user account in the system.
      type: object
      properties:
        email:
          description: The email address for the user.
          type: string
          format: email
        username:
          description: The username for the user. The value defaults to the email.
          type: string
          maxLength: 128
        description:
          description: The description of the user.
          type: string
          maxLength: 255
        api_roles:
          description: The customer-level role names assigned to the user.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        corpus_roles:
          description: Corpus-specific role assignments for the user.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: Agent-specific role assignments for the user.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
      required:
      - email
    UpdateUserRequest:
      description: Request to update an existing user's properties or permissions.
      type: object
      properties:
        enabled:
          description: Indicates whether to enable or disable the user.
          type: boolean
        api_roles:
          description: The new customer-level role names of the user.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        corpus_roles:
          description: New corpus-specific role assignments for the user.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: New agent-specific role assignments for the user.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
        description:
          description: The description of the user.
          type: string
          maxLength: 255
    ApiKeyRole:
      description: 'Role of the API key. A serving API key can only perform query
        type requests on its corpora. A serving and indexing key can perform both
        indexing and query type requests on its corpora.

        A personal API key has all the same permissions as the creator of the API
        key.'
      type: string
      enum:
      - serving
      - serving_and_indexing
      - personal
    ApiKey:
      description: An API key used to authenticate and authorize requests to the Vectara
        platform.
      type: object
      properties:
        id:
          description: The ID of the API key.
          type: string
          pattern: aky_.*
        name:
          description: The human-readable name of the API key.
          type: string
        secret_key:
          description: The key used in API requests. The key should be kept secure.
          type: string
        enabled:
          description: If this API key is enabled.
          type: boolean
        api_roles:
          description: Customer-level roles for this API key.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        api_key_role:
          deprecated: true
          description: 'Deprecated: Use api_roles instead. Legacy role of the API
            key.'
          $ref: '#/components/schemas/ApiKeyRole'
        corpus_roles:
          description: Corpus-specific role assignments for this API key.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: Agent-specific role assignments for this API key.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
        api_policy:
          $ref: '#/components/schemas/ApiPolicy'
      required:
      - id
      - name
      - secret_key
    ListApiKeysResponse:
      description: Response containing a list of API keys for the authenticated customer.
      type: object
      properties:
        api_keys:
          description: List of API keys.
          type: array
          items:
            $ref: '#/components/schemas/ApiKey'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
    CreateApiKeyRequest:
      description: Request to create a new API key for authenticating with the platform.
      type: object
      properties:
        name:
          description: The human-readable name of the API key.
          type: string
        api_roles:
          description: Customer-level roles for this API key.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        api_key_role:
          deprecated: true
          description: 'Deprecated: Use api_roles instead. Legacy role of the API
            key.'
          $ref: '#/components/schemas/ApiKeyRole'
        corpus_keys:
          deprecated: true
          description: 'Deprecated: Use corpus_roles instead. Corpora this API key
            has roles on.'
          type: array
          items:
            $ref: '#/components/schemas/CorpusKey'
        corpus_roles:
          description: Corpus-specific role assignments for this API key.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: Agent-specific role assignments for this API key.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
      required:
      - name
    UpdateApiKeyRequest:
      description: Request to update an existing API key's properties or permissions.
      type: object
      properties:
        enabled:
          description: Indicates whether to disable or enable an API key.
          type: boolean
    AppClient:
      description: An OAuth application client configuration used for authentication.
      type: object
      properties:
        id:
          description: The Vectara App Client ID. This ID is not used during an OAuth
            flow.  However, the ID used within the Vectara API.
          type: string
          pattern: app_.+$
        name:
          description: The human-readable name of the App Client.
          type: string
        description:
          description: Description of the App Client.
          type: string
        client_id:
          description: The client ID used with the OAuth flow.
          type: string
        client_secret:
          description: The client secret used in API requests.  The secret should
            be kept secure.
          type: string
        api_roles:
          description: The API roles attached to the App Client.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        corpus_roles:
          description: Corpus-specific role assignments for this App Client.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: Agent-specific role assignments for this App Client.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
        api_policy:
          $ref: '#/components/schemas/ApiPolicy'
      required:
      - id
      - name
      - client_id
      - client_secret
    ListAppClientsResponse:
      description: Response containing a list of OAuth application clients.
      type: object
      properties:
        app_clients:
          description: List of App Clients.
          type: array
          items:
            $ref: '#/components/schemas/AppClient'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
    CreateClientCredentialsRequest:
      description: Create an App Client which allows you to call Vectara APIs using
        OAuth 2.0 client credentials.
      type: object
      properties:
        name:
          description: Name of the client credentials.
          type: string
        description:
          description: Description of the client credentials.
          type: string
        type:
          description: This will always be the value `client_credentials`.
          type: string
          default: client_credentials
        api_roles:
          description: API roles that the client credentials will have.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        corpus_roles:
          description: Corpus-specific role assignments for this App Client.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: Agent-specific role assignments for this App Client.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
      required:
      - name
      - type
      x-vectaraParents:
      - CreateAppClientRequest
    CreateAppClientRequest:
      description: Request to create a new OAuth application client for the platform.
      type: object
      discriminator:
        propertyName: type
        mapping:
          client_credentials: '#/components/schemas/CreateClientCredentialsRequest'
      oneOf:
      - $ref: '#/components/schemas/CreateClientCredentialsRequest'
      required:
      - type
    UpdateAppClientRequest:
      description: Request to update an existing OAuth application client's properties.
      type: object
      properties:
        description:
          description: The new App Client description.
          type: string
        api_roles:
          description: The new roles attached to the App Client. These roles will
            replace the current roles.
          type: array
          items:
            $ref: '#/components/schemas/ApiRole'
        corpus_roles:
          description: The new corpus role assignments. These will replace the current
            corpus roles.
          type: array
          items:
            $ref: '#/components/schemas/CorpusRole'
        agent_roles:
          description: The new agent role assignments. These will replace the current
            agent roles.
          type: array
          items:
            $ref: '#/components/schemas/AgentRole'
    ToolServerId:
      description: Unique identifier for a tool server.
      type: string
      pattern: ^tsr_.*
      example: tsr_rag_search
    ToolServerName:
      description: The human-readable name of a tool server.
      type: string
      minLength: 1
      maxLength: 50
      example: RAG Search Server
    ToolServerType:
      description: The type of tool server.
      type: string
      enum:
      - mcp
      example: mcp
    ToolServerTransport:
      description: 'Transport protocol for MCP server connections. Both use Server-Sent
        Events (SSE).

        - `sse`: Legacy format (https://modelcontextprotocol.io/specification/2024-11-05/basic/transports)

        - `streamable-http`: New format (https://modelcontextprotocol.io/specification/2025-03-26/basic/transports)

        '
      type: string
      enum:
      - sse
      - streamable-http
      example: sse
    ToolServer:
      description: Represents a tool server that can provide various functionalities.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ToolServerId'
        name:
          $ref: '#/components/schemas/ToolServerName'
        type:
          $ref: '#/components/schemas/ToolServerType'
        description:
          description: A detailed description of what this tool server does.
          type: string
          example: Provides RAG search capabilities for documents.
        uri:
          description: The URI of the server.
          type: string
          format: uri
          example: https://api.example.com/sse/
        headers:
          description: Optional HTTP headers to include when connecting to the server.
          type: object
          additionalProperties:
            type: string
          example:
            Content-Type: application/json
        transport:
          $ref: '#/components/schemas/ToolServerTransport'
          default: sse
        enabled:
          description: Whether the tool server is currently enabled and available
            for use.
          type: boolean
          default: true
        metadata:
          description: Arbitrary metadata associated with the tool server.
          type: object
          additionalProperties: true
          example:
            version: '1.0'
        created_at:
          description: Timestamp when the tool server was created.
          type: string
          format: date-time
        updated_at:
          description: Timestamp when the tool server was last updated.
          type: string
          format: date-time
      required:
      - name
      - type
      - uri
      - transport
      - enabled
    ListToolServersResponse:
      description: Response containing a list of tool servers.
      type: object
      properties:
        tool_servers:
          description: List of tool servers.
          type: array
          items:
            $ref: '#/components/schemas/ToolServer'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      required:
      - tool_servers
    CreateToolServerRequest:
      description: Request object for creating a new tool server.
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ToolServerName'
        type:
          $ref: '#/components/schemas/ToolServerType'
        description:
          description: A detailed description of what this tool server does.
          type: string
          example: Provides RAG search capabilities for documents.
        uri:
          description: The URI of the tool server.
          type: string
          format: uri
          example: https://api.example.com/rag_search
        headers:
          description: Optional HTTP headers to include when connecting to the server.
          type: object
          additionalProperties:
            type: string
        transport:
          $ref: '#/components/schemas/ToolServerTransport'
          default: sse
        auth:
          $ref: '#/components/schemas/RemoteAuth'
          description: Authentication configuration for connecting to the tool server.
        enabled:
          description: Whether the tool server is currently enabled and available
            for use.
          type: boolean
          default: true
        metadata:
          description: Arbitrary metadata associated with the tool server.
          type: object
          additionalProperties: true
      required:
      - name
      - type
      - uri
      - transport
    UpdateToolServerRequest:
      description: Request object for updating an existing tool server.
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ToolServerName'
        description:
          description: A detailed description of what this tool server does.
          type: string
          example: Provides Vectara specific functionalities.
        uri:
          description: The URI of the tool server.
          type: string
          format: uri
          example: https://api.example.com/vectara_mcp/sse/
        headers:
          description: Optional HTTP headers to include when connecting to the server.
          type: object
          additionalProperties:
            type: string
        transport:
          $ref: '#/components/schemas/ToolServerTransport'
        auth:
          $ref: '#/components/schemas/RemoteAuth'
          description: Authentication configuration for connecting to the tool server.
        enabled:
          description: Whether the tool server is currently enabled and available
            for use.
          type: boolean
        metadata:
          description: Arbitrary metadata associated with the tool server.
          type: object
          additionalProperties: true
    ToolId:
      description: Unique identifier for a tool.
      type: string
      pattern: ^tol_.*
      example: tol_123e4567-e89b-12d3-a456-426614174000
    ToolDescriptionTemplate:
      description: 'Velocity template for generating dynamic tool descriptions. When
        set, this template is rendered at runtime to produce the tool description.


        Available Velocity variables:

        - `$agent.name` - Agent name

        - `$agent.metadata` - Agent metadata map

        - `$session.key` - Session key

        - `$session.metadata` - Session metadata map

        - `$currentDate` - Current date/time in ISO 8601 format (e.g., "2025-10-24T15:30:45Z")


        Example: "Search tool configured for agent $agent.name on $currentDate"

        '
      type: string
    OutputTransform:
      description: "An optional jq expression applied to the tool's JSON output before\
        \ it is returned to the agent.\nUse this to project, filter, or summarize\
        \ tool output to keep responses concise and on-topic.\n\nThe expression operates\
        \ on the tool's response JSON and the result replaces the original output.\n\
        If the expression fails to compile or evaluate at runtime, the tool call is\
        \ reported to the agent as an error so the agent can react.\n\nExamples:\n\
        \  - `.results | map({title, url})` \u2014 keep only title/url for each result\n\
        \  - `.items[0:5]` \u2014 first 5 items\n  - `del(.debug)` \u2014 drop a noisy\
        \ field\n"
      type: string
      maxLength: 4096
      example: .results | map({title, url})
    InputTransform:
      description: "An optional jq expression applied to the tool's input after argument\
        \ overrides have been merged with the agent's arguments and before the tool\
        \ is invoked.\nUse this to inject server-side context (session metadata, agent\
        \ secrets) into the tool input, or to reshape the agent's arguments.\n\nThe\
        \ expression receives the standard runtime context \u2014 the same `agent`,\
        \ `session`, `tools`, and `currentDate` values exposed to `argument_override`\
        \ `$ref`s (see `ArgumentOverrideDescription`), plus an `args` field containing\
        \ the merged tool input.\nThe output of the expression replaces `args` as\
        \ the tool input.\nThe pre-transform `args` is what appears in audit events\
        \ (with secrets masked); the post-transform value goes only to the tool.\n\
        If the expression fails to compile or evaluate, the tool call is reported\
        \ to the agent as an error.\n\nExamples:\n  - `.args + { auth: (\"Bearer \"\
        \ + .agent.secrets.token) }` \u2014 inject a bearer header\n  - `.args | .corpus_key\
        \ = .session.metadata.corpus_key` \u2014 pull a corpus key from session metadata\n\
        \  - `.args | .query = (.args.query + \" \" + .session.metadata.query_suffix)`\
        \ \u2014 augment the agent's query\n"
      type: string
      maxLength: 4096
      example: '.args + { auth: ("Bearer " + .agent.secrets.token) }'
    ToolBase:
      description: Base properties shared by all tool types.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ToolId'
        name:
          description: Unique identifier for the tool.
          type: string
        title:
          description: Human-readable title of the tool.
          type: string
        description:
          description: 'The description provided to the agent to guide tool selection.

            This is what the agent sees when deciding which tool to use.

            '
          type: string
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        documentation:
          description: 'User-facing documentation describing the tool and how to configure
            it for an agent.

            Intended for developers and administrators browsing the tool catalog.

            Defaults to the agent-facing description if not explicitly set.

            '
          type: string
        enabled:
          description: Whether the tool is currently enabled and available for use.
          type: boolean
          default: true
        experimental:
          description: Whether this tool is experimental and may change or be removed
            without notice.
          type: boolean
          default: false
        created_at:
          description: Timestamp when the tool was created.
          type: string
          format: date-time
        updated_at:
          description: Timestamp when the tool was last updated.
          type: string
          format: date-time
        input_schema:
          description: The schema that defines the expected input structure for the
            tool.
          type: object
          additionalProperties: true
        output_schema:
          description: 'The JSON schema that describes the structure of the tool''s
            output. May be used by clients to

            understand the shape of tool responses and to author `default_output_transform`
            jq expressions.

            '
          type: object
          additionalProperties: true
        default_output_transform:
          description: 'Default jq expression applied to this tool''s output when
            a tool configuration does not

            specify its own `output_transform`. Tool configurations may override this
            value. See

            `OutputTransform` for the expression semantics and error behavior.

            '
          $ref: '#/components/schemas/OutputTransform'
        default_input_transform:
          description: 'Default jq expression applied to this tool''s input when a
            tool configuration does not

            specify its own `input_transform`. Tool configurations may override this
            value. See

            `InputTransform` for the expression semantics and error behavior.

            '
          $ref: '#/components/schemas/InputTransform'
        default_argument_override:
          description: "Optional hardcoded arguments for tool calls. The key specifies\
            \ the location in the tool arguments to overide, and the value specifies\
            \ what to override with. The agent will not be able to change the parameters,\
            \ nor know those values exist within the tool.\n\nThe values can also\
            \ be dynamic references to context values using $ref with dot notation\
            \ path syntax:\n- Static value: \"fixed_value\" or 123\n- Dynamic reference:\
            \ `{\"$ref\": \"session.metadata.field_name\"}`\n\nReferences are resolved\
            \ at runtime from context:\n- session.metadata.* - Access session metadata\
            \ fields\n- agent.metadata.* - Access agent metadata fields\n- agent.secrets.*\
            \ - Access agent secrets (masked in audit events)\n- tools.* - Access\
            \ prior tool outputs (resolved after the dependent tool runs)\n- currentDate\
            \ - The current date/time in ISO 8601 format\n\nA bracket index may reference\
            \ another context value, whose resolved value is used as the lookup key.\
            \ The inner path may optionally carry a leading $ root marker:\n- Indirect\
            \ reference: `{\"$ref\": \"agent.secrets[session.metadata.user_id]\"}`\
            \ looks up the per-user secret named by `session.metadata.user_id`\n-\
            \ Equivalent forms: `agent.secrets[$session.metadata.user_id]` and `agent.secrets[$.session.metadata.user_id]`\n\
            \nExample:\n  `{\"query\": {\"$ref\": \".session.metadata.query\"}}`\n\
            \nIf you want to have a real value `\"$ref\"` use `\"$$ref\"`, that is\
            \ you can escape the first $ by using $$."
          type: object
          additionalProperties: true
          example:
            max_results: 10
        category:
          description: Functional category of the tool (e.g., retrieval, artifacts,
            indexing, utilities, orchestration).
          type: string
        lineage:
          description: The base tool name without version suffix. Groups versioned
            variants of the same tool together.
          type: string
          example: corpora_search
        version:
          description: Date-based version identifier in YYYY-MM-DD format. Null for
            unversioned tools.
          type: string
          example: '2026-02-23'
        tool_groups:
          description: Groups this tool belongs to. Tools in the same group form a
            functional set and should be added or removed together by default.
          type: array
          items:
            type: string
          example:
          - document_ingestion
      required:
      - id
      - name
      - description
      - enabled
      - input_schema
    DynamicVectaraTool:
      description: 'A tool type for built-in Vectara tools that have implementations
        within the platform but do not have a dedicated tool type schema. Examples
        include tools like `sub_agent`, `corpora_search`, `web_search`, and similar
        platform-provided capabilities. Use the List Tools endpoint to discover available
        tools and obtain the `tool_id` required for configuration.

        '
      allOf:
      - $ref: '#/components/schemas/ToolBase'
      - type: object
        properties:
          type:
            description: This should always be `dynamic_vectara`.
            type: string
            default: dynamic_vectara
            example: dynamic_vectara
        required:
        - type
      x-vectaraParents:
      - Tool
    McpToolAnnotations:
      description: Optional hints about tool behaviour/metadata.
      type: object
      properties:
        read_only_hint:
          description: If true, the tool does not modify its environment.
          type: boolean
        destructive_hint:
          description: If true, the tool may perform destructive updates.
          type: boolean
        idempotent_hint:
          description: If true, repeated calls with same args have no additional effect.
          type: boolean
        open_world_hint:
          description: If true, tool interacts with external entities.
          type: boolean
      additionalProperties: true
    McpTool:
      description: An MCP (Model Context Protocol) tool that connects to external
        MCP servers for extended functionality.
      allOf:
      - $ref: '#/components/schemas/ToolBase'
      - type: object
        properties:
          type:
            description: This should always be `mcp`.
            type: string
            default: mcp
            example: mcp
          server_id:
            description: The unique identifier of the MCP server this tool is associated
              with.
            $ref: '#/components/schemas/ToolServerId'
          annotations:
            $ref: '#/components/schemas/McpToolAnnotations'
        required:
        - type
      x-vectaraParents:
      - Tool
    CorporaSearchTool:
      description: A corpora search tool that searches through Vectara corpora to
        find relevant information.
      allOf:
      - $ref: '#/components/schemas/ToolBase'
      - type: object
        properties:
          type:
            description: This should always be `corpora_search`.
            type: string
            default: corpora_search
            example: corpora_search
        required:
        - type
      x-vectaraParents:
      - Tool
    WebSearchTool:
      description: A web search tool that searches the internet for relevant information.
      allOf:
      - $ref: '#/components/schemas/ToolBase'
      - type: object
        properties:
          type:
            description: This should always be `web_search`.
            type: string
            default: web_search
            example: web_search
        required:
        - type
      x-vectaraParents:
      - Tool
    WebGetTool:
      description: A web get tool that fetches content from URLs using HTTP requests.
      allOf:
      - $ref: '#/components/schemas/ToolBase'
      - type: object
        properties:
          type:
            description: This should always be `web_get`.
            type: string
            default: web_get
            example: web_get
        required:
        - type
      x-vectaraParents:
      - Tool
    ExecutionConfiguration:
      description: Execution configuration for the function.
      type: object
      properties:
        max_execution_time_seconds:
          description: Maximum execution time in seconds.
          type: integer
          minimum: 1
          maximum: 300
          default: 30
          example: 30
        max_memory_mb:
          description: Maximum memory usage in megabytes.
          type: integer
          minimum: 10
          maximum: 1024
          default: 100
          example: 100
    FunctionDefinition:
      description: 'Definition of a function to be executed as a tool in a sandboxed
        environment.


        **Python Environment:**

        - Python version: 3.12

        - Execution: Sandboxed using gVisor for security isolation

        - **Allowed modules**: `json`, `math`, `datetime`, `collections`, `itertools`,
        `functools`, `re`, `time`, `typing`

        - Memory limit: 100MB (configurable up to 1GB)

        - Execution timeout: 30 seconds (configurable up to 300 seconds)

        - Network access: Disabled for security

        - File system access: Read-only temporary workspace

        - No custom package installation supported (security constraint)


        **Type Annotations:**

        - Use type annotations for automatic input/output schema discovery

        - Supported typing constructs: `List`, `Dict`, `Optional`, `Union`, `Literal`

        - Import from `typing` module when using complex types


        **Docstring Parameter Descriptions:**

        - Use docstrings to provide descriptions for parameters (Google, NumPy, ReST,
        and Epydoc styles are supported)

        - Parameter descriptions are extracted and included in the input schema

        - This gives agents better context about how to use each parameter

        '
      type: object
      properties:
        language:
          description: The programming language of the function. Currently only Python
            3.12 is supported.
          type: string
          enum:
          - python
          example: python
        code:
          description: 'The function code.


            **Required**: Must define a `process()` entry point function. Use type
            annotations on parameters for automatic schema discovery.


            Parameters are passed as keyword arguments matched to the function signature.

            '
          type: string
          example: "def process(data: list, threshold: float = 0):\n    filtered =\
            \ [x for x in data if x > threshold]\n    return {\n        'count': len(filtered),\n\
            \        'average': sum(filtered) / len(filtered) if filtered else 0,\n\
            \        'filtered_data': filtered\n    }\n"
        validation_status:
          description: The validation status of the code.
          type: string
          enum:
          - pending
          - valid
          - invalid
          example: valid
        validation_errors:
          description: List of validation errors if the code is invalid.
          type: array
          items:
            type: string
        execution_configuration:
          $ref: '#/components/schemas/ExecutionConfiguration'
      required:
      - language
      - code
    ToolConfigurationKey:
      description: 'A unique key that identifies a reusable tool configuration within
        a customer account.

        Customer-provided; if omitted when creating a configuration, one is generated
        from the name.

        '
      type: string
      pattern: ^[0-9a-zA-Z_-]+$
      minLength: 1
      maxLength: 50
      example: customer_support_search
    ToolConfigurationName:
      description: The human-readable name of a tool configuration.
      type: string
      minLength: 1
      maxLength: 50
      example: Customer Support Search Config
    ToolConfigurationBase:
      description: 'Base properties shared by all tool configuration types.

        The identity properties (`key`, `name`, `description`, `enabled`, `metadata`)
        apply to reusable configurations managed via the `/v2/tool_configurations`
        endpoints; they are ignored when the configuration is defined inline in an
        agent''s `tool_configurations` map, where the map key is the tool''s name.

        '
      type: object
      properties:
        key:
          $ref: '#/components/schemas/ToolConfigurationKey'
        name:
          $ref: '#/components/schemas/ToolConfigurationName'
        description:
          description: 'A detailed description of what this tool configuration is
            for and how it should be used.

            Ignored for configurations defined inline on an agent.

            '
          type: string
          example: Configuration for searching customer support documentation with
            optimized parameters
        description_template:
          $ref: '#/components/schemas/ToolDescriptionTemplate'
        enabled:
          description: 'Whether the tool configuration is currently enabled and available
            for use.

            Ignored for configurations defined inline on an agent, which are always
            enabled.

            '
          type: boolean
          default: true
        metadata:
          description: Optional metadata associated with this tool configuration.
            Ignored for configurations defined inline on an agent.
          type: object
          additionalProperties: true
          example:
            tags:
            - production
            - v2
            owner: team-platform
        created_at:
          description: Timestamp when the tool configuration was created.
          type: string
          format: date-time
          readOnly: true
        updated_at:
          description: Timestamp when the tool configuration was last updated.
          type: string
          format: date-time
          readOnly: true
        output_transform:
          $ref: '#/components/schemas/OutputTransform'
        input_transform:
          $ref: '#/components/schemas/InputTransform'
    ToolConfigurationReference:
      title: ToolConfigurationReference
      description: 'References a reusable tool configuration by its key. The configuration
        is managed independently via

        the Tool Configurations API and can be shared across agents. The agent-facing
        tool name is the key

        of this entry in the agent''s `tool_configurations` map, which may differ
        from the configuration''s own name.

        '
      allOf:
      - $ref: '#/components/schemas/ToolConfigurationBase'
      - type: object
        properties:
          type:
            description: The type of tool configuration, which is always 'reference'
              for referenced configurations.
            type: string
            default: reference
          tool_configuration_key:
            $ref: '#/components/schemas/ToolConfigurationKey'
            description: The key of the reusable tool configuration to reference.
        required:
        - type
        - tool_configuration_key
      x-vectaraParents:
      - AgentToolConfiguration
    DynamicVectaraToolConfiguration:
      description: 'A configuration for built-in Vectara tools that have implementations
        within the platform but do not have a dedicated configuration type schema.
        Use the List Tools endpoint to discover available tools and obtain the `tool_id`
        required when creating this configuration.

        '
      allOf:
      - $ref: '#/components/schemas/ToolConfigurationBase'
      - type: object
        properties:
          type:
            description: This should always be `dynamic_vectara`.
            type: string
            default: dynamic_vectara
            example: dynamic_vectara
          tool_id:
            $ref: '#/components/schemas/ToolId'
            readOnly: true
          argument_override:
            description: "Optional hardcoded arguments for tool calls. The key specifies\
              \ the location in the tool arguments to overide, and the value specifies\
              \ what to override with. The agent will not be able to change the parameters,\
              \ nor know those values exist within the tool.\n\nThe values can also\
              \ be dynamic references to context values using $ref with dot notation\
              \ path syntax:\n- Static value: \"fixed_value\" or 123\n- Dynamic reference:\
              \ `{\"$ref\": \"session.metadata.field_name\"}`\n\nReferences are resolved\
              \ at runtime from context:\n- session.metadata.* - Access session metadata\
              \ fields\n- agent.metadata.* - Access agent metadata fields\n- agent.secrets.*\
              \ - Access agent secrets (masked in audit events)\n- tools.* - Access\
              \ prior tool outputs (resolved after the dependent tool runs)\n- currentDate\
              \ - The current date/time in ISO 8601 format\n\nA bracket index may\
              \ reference another context value, whose resolved value is used as the\
              \ lookup key. The inner path may optionally carry a leading $ root marker:\n\
              - Indirect reference: `{\"$ref\": \"agent.secrets[session.metadata.user_id]\"\
              }` looks up the per-user secret named by `session.metadata.user_id`\n\
              - Equivalent forms: `agent.secrets[$session.metadata.user_id]` and `agent.secrets[$.session.metadata.user_id]`\n\
              \nExample:\n  `{\"query\": {\"$ref\": \".session.metadata.query\"}}`\n\
              \nIf you want to have a real value `\"$ref\"` use `\"$$ref\"`, that\
              \ is you can escape the first $ by using $$."
            type: object
            additionalProperties: true
            example:
              custom_param: value
              max_results: 10
        required:
        - type
      x-vectaraParents:
      - ToolConfiguration
      - AgentToolConfiguration
      - ConcreteToolConfiguration
    McpToolConfiguration:
      description: A reusable configuration for an MCP tool that stores predefined
        argument overrides and settings.
      allOf:
      - $ref: '#/components/schemas/ToolConfigurationBase'
      - type: object
        properties:
          type:
            description: This should always be `mcp`.
            type: string
            default: mcp
            example: mcp
          tool_id:
            $ref: '#/components/schemas/ToolId'
            readOnly: true
          argument_override:
            description: "Optional hardcoded arguments for tool calls. The key specifies\
              \ the location in the tool arguments to overide, and the value specifies\
              \ what to override with. The agent will not be able to change the parameters,\
              \ nor know those values exist within the tool.\n\nThe values can also\
              \ be dynamic references to context values using $ref with dot notation\
              \ path syntax:\n- Static value: \"fixed_value\" or 123\n- Dynamic reference:\
              \ `{\"$ref\": \"session.metadata.field_name\"}`\n\nReferences are resolved\
              \ at runtime from context:\n- session.metadata.* - Access session metadata\
              \ fields\n- agent.metadata.* - Access agent metadata fields\n- agent.secrets.*\
              \ - Access agent secrets (masked in audit events)\n- tools.* - Access\
              \ prior tool outputs (resolved after the dependent tool runs)\n- currentDate\
              \ - The current date/time in ISO 8601 format\n\nA bracket index may\
              \ reference another context value, whose resolved value is used as the\
              \ lookup key. The inner path may optionally carry a leading $ root marker:\n\
              - Indirect reference: `{\"$ref\": \"agent.secrets[session.metadata.user_id]\"\
              }` looks up the per-user secret named by `session.metadata.user_id`\n\
              - Equivalent forms: `agent.secrets[$session.metadata.user_id]` and `agent.secrets[$.session.metadata.user_id]`\n\
              \nExample:\n  `{\"query\": {\"$ref\": \".session.metadata.query\"}}`\n\
              \nIf you want to have a real value `\"$ref\"` use `\"$$ref\"`, that\
              \ is you can escape the first $ by using $$."
            type: object
            additionalProperties: true
            example:
              custom_param: value
              max_results: 10
        required:
        - type
      x-vectaraParents:
      - ToolConfiguration
      - AgentToolConfiguration
      - ConcreteToolConfiguration
    CorporaSearchToolParameters:
      description: Agent-exposed parameters for the corpora search tool that can be
        filled in during execution.
      type: object
      properties:
        query:
          description: The search query string, which is the question the user is
            asking. If not provided, will be filled in by the agent.
          type: string
          maxLength: 5000
          example: Am I allowed to bring pets to work?
      additionalProperties: false
    EagerReference:
      title: EagerReference
      description: A reference to a value resolved from the session context at the
        start of each turn. Resolution occurs when a new message is submitted to the
        agent session, before any LLM processing begins. The resolved value remains
        constant throughout the turn and is not re-evaluated during the agent's response
        or subsequent tool calls within the same turn.
      type: object
      x-vectaraParents:
      - AgentKeyedSearchCorpusCorpusKey
      - AgentKeyedSearchCorpusMetadataFilter
      properties:
        $ref:
          type: string
          description: A dot-notation path to the value in the session context.
          example: session.metadata.filters.user_access
      required:
      - $ref
      additionalProperties: false
    AgentKeyedSearchCorpus:
      title: AgentKeyedSearchCorpus
      description: Agent-specific keyed search corpus that supports eager references
        for corpus_key and metadata_filter.
      type: object
      properties:
        corpus_key:
          description: 'The corpus to search. Can be either a static string (e.g.
            "my-corpus") or an EagerReference object (e.g. {"$ref": "session.metadata.corpus"}).
            When an EagerReference is provided, the $ref path is resolved from the
            session context at the start of each turn, before LLM processing begins.'
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
        custom_dimensions:
          allOf:
          - $ref: '#/components/schemas/CustomDimensions'
          nullable: true
          default: null
        metadata_filter:
          description: 'The filter to narrow search results. Can be either a static
            string (e.g. "doc.department = ''engineering''") or an EagerReference
            object (e.g. {"$ref": "session.metadata.filters.user"}). When an EagerReference
            is provided, the $ref path is resolved from the session context at the
            start of each turn, before LLM processing begins.'
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
        lexical_interpolation:
          description: How much to weigh lexical scores compared to the embedding
            score. 0 means lexical search is not used at all, and 1 means only lexical
            search is used.
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 0.025
        semantics:
          allOf:
          - $ref: '#/components/schemas/SearchSemantics'
          default: default
        query:
          description: Query override for this specific corpus.
          type: string
          maxLength: 5000
      required:
      - corpus_key
    AgentSearchCorporaParameters:
      title: AgentSearchCorporaParameters
      description: Agent-specific search parameters that support eager references.
      type: object
      properties:
        corpora:
          description: The corpora to search, with support for eager references.
          type: array
          items:
            $ref: '#/components/schemas/AgentKeyedSearchCorpus'
          minItems: 1
        offset:
          description: Number of results to skip for pagination.
          type: integer
          format: int32
          minimum: 0
          default: 0
        limit:
          description: Maximum number of results to return.
          type: integer
          format: int32
          minimum: 1
          default: 10
        context_configuration:
          allOf:
          - $ref: '#/components/schemas/ContextConfiguration'
          nullable: true
          default: null
        reranker:
          $ref: '#/components/schemas/SearchReranker'
    AgentCorporaSearchQueryConfiguration:
      title: AgentCorporaSearchQueryConfiguration
      description: Agent-specific query configuration that supports eager references.
        Use this in agent tool configurations when turn-start resolution is needed.
      type: object
      properties:
        search:
          $ref: '#/components/schemas/AgentSearchCorporaParameters'
        generation:
          allOf:
          - $ref: '#/components/schemas/GenerationParameters'
          default:
            enabled: false
        save_history:
          description: Whether to save the query to history.
          type: boolean
          default: false
    CorporaSearchToolConfiguration:
      description: A reusable configuration for a corpora search tool that stores
        predefined search parameters and overrides.
      allOf:
      - $ref: '#/components/schemas/ToolConfigurationBase'
      - type: object
        properties:
          type:
            description: This should always be `corpora_search`.
            type: string
            default: corpora_search
            example: corpora_search
          argument_override:
            description: Optional hardcoded arguments for tool calls. When specified,
              these values will be used instead of allowing the agent to fill in those
              parameters.
            $ref: '#/components/schemas/CorporaSearchToolParameters'
          query_configuration:
            description: User-configurable settings for the search that are not exposed
              to the agent. Supports dynamic references using $ref syntax.
            $ref: '#/components/schemas/AgentCorporaSearchQueryConfiguration'
        required:
        - type
        - query_configuration
      x-vectaraParents:
      - ToolConfiguration
      - AgentToolConfiguration
      - ConcreteToolConfiguration
    WebSearchToolParameters:
      description: Configurable parameters for the web search tool. If not provided,
        will be filled in by the agent.
      type: object
      properties:
        query:
          description: The search query to execute.
          type: string
          example: latest AI developments 2024
        limit:
          description: Maximum number of results to return.
          type: integer
          minimum: 1
          maximum: 20
          example: 10
        provider:
          description: Search provider to use.
          type: string
          enum:
          - tavily
          example: tavily
        include_domains:
          description: List of domains to specifically include in search results.
            When specified, results will ONLY come from these domains. Supports exact
            domains (e.g., "github.com"), subdomains (e.g., "docs.github.com"), and
            wildcard patterns (e.g., "*.github.com"). Subpaths are not supported.
          type: array
          items:
            type: string
          maxItems: 50
          example:
          - github.com
          - docs.github.com
          - '*.stackoverflow.com'
        exclude_domains:
          description: List of domains to specifically exclude from search results.
            Supports exact domains (e.g., "spam.com"), subdomains (e.g., "bad.spam.com"),
            and wildcard patterns (e.g., "*.spam.com"). Subpaths are not supported.
          type: array
          items:
            type: string
          maxItems: 50
          example:
          - spam.com
          - unreliable-source.com
      additionalProperties: false
    WebSearchToolConfiguration:
      description: A reusable configuration for a web search tool that stores predefined
        search parameters and settings.
      allOf:
      - $ref: '#/components/schemas/ToolConfigurationBase'
      - type: object
        properties:
          type:
            description: This should always be `web_search`.
            type: string
            default: web_search
            example: web_search
          argument_override:
            description: Optional hardcoded arguments for tool calls. When specified,
              these values will be used instead of allowing the agent to fill in those
              parameters.
            $ref: '#/components/schemas/WebSearchToolParameters'
        required:
        - type
      x-vectaraParents:
      - ToolConfiguration
      - AgentToolConfiguration
      - ConcreteToolConfiguration
    WebGetHeaderValue:
      description: 'The value for a single HTTP header in the web_get tool.

        Either a literal string or an EagerReference ({"$ref": "agent.secrets.foo"})
        that resolves at session start so the secret value never appears in the tool
        configuration.

        '
      oneOf:
      - type: string
      - $ref: '#/components/schemas/EagerReference'
    WebGetHeadersMap:
      description: 'A map of HTTP header names to their values for the web_get tool.

        Each value may be a literal string or an EagerReference for per-header secret
        resolution.

        '
      type: object
      additionalProperties:
        $ref: '#/components/schemas/WebGetHeaderValue'
    WebGetNoAuth:
      description: 'Explicitly disables authentication.

        Useful in argument_override to force a tool config to clear any auth the agent
        would otherwise supply, since merge semantics ignore null patches.'
      type: object
      properties:
        type:
          type: string
          default: none
          example: none
      required:
      - type
      x-vectaraParents:
      - WebGetAuth
    WebGetBearerAuth:
      description: 'Static bearer token authentication. Adds `Authorization: Bearer
        <token>`.'
      type: object
      properties:
        type:
          type: string
          default: bearer
          example: bearer
        token:
          description: The bearer token. May be an EagerReference to an agent secret.
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
      required:
      - type
      - token
      x-vectaraParents:
      - WebGetAuth
    WebGetHeaderAuth:
      description: Static custom-header authentication, suitable for API keys.
      type: object
      properties:
        type:
          type: string
          default: header
          example: header
        header:
          description: The header name to set (e.g. `X-API-Key`).
          type: string
        value:
          description: The header value. May be an EagerReference to an agent secret.
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
      required:
      - type
      - header
      - value
      x-vectaraParents:
      - WebGetAuth
    WebGetOAuthClientCredentialsAuth:
      description: 'OAuth 2.0 client-credentials grant.

        The platform fetches an access token from the token endpoint and caches it
        until it expires.'
      type: object
      properties:
        type:
          type: string
          default: oauth_client_credentials
          example: oauth_client_credentials
        client_id:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
        client_secret:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
        token_endpoint:
          type: string
          format: uri
          example: https://auth.example.com/oauth2/token
        scopes:
          type: array
          items:
            type: string
          example:
          - read:items
      required:
      - type
      - client_id
      - client_secret
      - token_endpoint
      x-vectaraParents:
      - WebGetAuth
    WebGetOAuthRefreshTokenAuth:
      description: 'OAuth 2.0 refresh-token grant.

        The platform exchanges a long-lived refresh token for an access token and
        caches the result until it expires.

        Supports refresh-token rotation: if the IdP returns a new refresh_token, subsequent
        refreshes use it automatically.'
      type: object
      properties:
        type:
          type: string
          default: oauth_refresh_token
          example: oauth_refresh_token
        client_id:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
        client_secret:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
        refresh_token:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
        token_endpoint:
          type: string
          format: uri
          example: https://auth.example.com/oauth2/token
      required:
      - type
      - client_id
      - client_secret
      - refresh_token
      - token_endpoint
      x-vectaraParents:
      - WebGetAuth
    WebGetAuth:
      description: Authentication configuration for the outgoing HTTP request.
      type: object
      discriminator:
        propertyName: type
        mapping:
          none: '#/components/schemas/WebGetNoAuth'
          bearer: '#/components/schemas/WebGetBearerAuth'
          header: '#/components/schemas/WebGetHeaderAuth'
          oauth_client_credentials: '#/components/schemas/WebGetOAuthClientCredentialsAuth'
          oauth_refresh_token: '#/components/schemas/WebGetOAuthRefreshTokenAuth'
      oneOf:
      - $ref: '#/components/schemas/WebGetNoAuth'
      - $ref: '#/components/schemas/WebGetBearerAuth'
      - $ref: '#/components/schemas/WebGetHeaderAuth'
      - $ref: '#/components/schemas/WebGetOAuthClientCredentialsAuth'
      - $ref: '#/components/schemas/WebGetOAuthRefreshTokenAuth'
      required:
      - type
    WebGetToolParameters:
      description: Configurable parameters for the web get tool. If not provided,
        will be filled in by the agent.
      type: object
      properties:
        url:
          description: The URL to fetch content from.
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
        method:
          description: HTTP method to use.
          type: string
          enum:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - HEAD
        headers:
          description: 'HTTP headers to include in the request.

            Either a literal `{name: value}` map (where each value may itself be a
            string OR an EagerReference for per-header secret lookup), or an EagerReference
            ({"$ref": "agent.secrets"}) that resolves at session start to a `Map<String,
            String>` (handy for sourcing the whole header set from agent secrets).

            '
          x-vectara-default-subtype: WebGetHeadersMap
          oneOf:
          - $ref: '#/components/schemas/WebGetHeadersMap'
          - $ref: '#/components/schemas/EagerReference'
        body:
          description: Request body for POST/PUT/PATCH requests.
          oneOf:
          - type: string
          - $ref: '#/components/schemas/EagerReference'
        follow_redirects:
          description: Whether to follow HTTP redirects.
          oneOf:
          - type: boolean
          - $ref: '#/components/schemas/EagerReference'
        timeout_seconds:
          description: Request timeout in seconds.
          oneOf:
          - type: integer
          - $ref: '#/components/schemas/EagerReference'
        head_lines:
          description: Number of lines from start to include in response.
          oneOf:
          - type: integer
          - $ref: '#/components/schemas/EagerReference'
        tail_lines:
          description: Number of lines from end to include in response.
          oneOf:
          - type: integer
          - $ref: '#/components/schemas/EagerReference'
        ssl_verify:
          description: Whether to verify SSL certificates.
          oneOf:
          - type: boolean
          - $ref: '#/components/schemas/EagerReference'
        max_content_bytes:
          description: Maximum response size in bytes before truncation.
          oneOf:
          - type: integer
          - $ref: '#/components/schemas/EagerReference'
        auth:
          description: 'Optional authentication to apply to the request. The resulting
            credential header is

            merged with `headers`; on conflict on exact header name (case-sensitive,
            as given), `headers` wins. OAuth

            access tokens are cached in-process per credential set. Any credential
            field can be an

            EagerReference ({"$ref": "agent.secrets.foo"}) so secrets never appear
            in the

            configuration plaintext.'
          $ref: '#/components/schemas/WebGetAuth'
      additionalProperties: false
    WebGetToolConfiguration:
      description: A reusable configuration for a web get tool that stores predefined
        parameters for fetching content from URLs.
      allOf:
      - $ref: '#/components/schemas/ToolConfigurationBase'
      - type: object
        properties:
          type:
            description: This should always be `web_get`.
            type: string
            default: web_get
            example: web_get
          argument_override:
            description: Optional hardcoded arguments for tool calls. When specified,
              these values will be used instead of allowing the agent to fill in those
              parameters.
            $ref: '#/components/schemas/WebGetToolParameters'
        required:
        - type
      x-vectaraParents:
      - ToolConfiguration
      - AgentToolConfiguration
      - ConcreteToolConfiguration
    LambdaToolConfiguration:
      description: A reusable configuration for a Lambda tool that executes user-defined
        functions in a sandboxed environment.
      allOf:
      - $ref: '#/components/schemas/ToolConfigurationBase'
      - type: object
        properties:
          type:
            description: This should always be `lambda`.
            type: string
            default: lambda
            example: lambda
          tool_id:
            $ref: '#/components/schemas/ToolId'
            readOnly: true
          argument_override:
            description: "Optional hardcoded arguments for tool calls. The key specifies\
              \ the location in the tool arguments to overide, and the value specifies\
              \ what to override with. The agent will not be able to change the parameters,\
              \ nor know those values exist within the tool.\n\nThe values can also\
              \ be dynamic references to context values using $ref with dot notation\
              \ path syntax:\n- Static value: \"fixed_value\" or 123\n- Dynamic reference:\
              \ `{\"$ref\": \"session.metadata.field_name\"}`\n\nReferences are resolved\
              \ at runtime from context:\n- session.metadata.* - Access session metadata\
              \ fields\n- agent.metadata.* - Access agent metadata fields\n- agent.secrets.*\
              \ - Access agent secrets (masked in audit events)\n- tools.* - Access\
              \ prior tool outputs (resolved after the dependent tool runs)\n- currentDate\
              \ - The current date/time in ISO 8601 format\n\nA bracket index may\
              \ reference another context value, whose resolved value is used as the\
              \ lookup key. The inner path may optionally carry a leading $ root marker:\n\
              - Indirect reference: `{\"$ref\": \"agent.secrets[session.metadata.user_id]\"\
              }` looks up the per-user secret named by `session.metadata.user_id`\n\
              - Equivalent forms: `agent.secrets[$session.metadata.user_id]` and `agent.secrets[$.session.metadata.user_id]`\n\
              \nExample:\n  `{\"query\": {\"$ref\": \".session.metadata.query\"}}`\n\
              \nIf you want to have a real value `\"$ref\"` use `\"$$ref\"`, that\
              \ is you can escape the first $ by using $$."
            type: object
            additionalProperties: true
            example:
              connection_string: postgresql://prod-db:5432/analytics
              max_retries: 3
        required:
        - type
      x-vectaraParents:
      - ToolConfiguration
      - AgentToolConfiguration
      - ConcreteToolConfiguration
