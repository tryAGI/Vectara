        \ \\\n-H \"Authorization: Bearer YOUR_API_KEY\" \\c\n-H \"Content-Type: application/json\"\
        \ \\\n-d '{\n  \"key\": \"daily-report\",\n  \"name\": \"Daily Summary Report\"\
        ,\n  \"message\": [{\"type\": \"text\", \"content\": \"Generate a summary\
        \ of today's activities\"}],\n  \"schedule\": {\n    \"type\": \"interval\"\
        ,\n    \"interval\": \"PT24H\"\n  },\n  \"session_metadata\": {\n    \"report_type\"\
        : \"daily\"\n  }\n}'\n```\nA successful response includes the unique schedule\
        \ key, configuration, and creation timestamp.\n"
