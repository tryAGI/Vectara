          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of results to return in the list.
          schema:
            maximum: 100
            minimum: 1
            type: integer
            format: int32
            default: 10
        - name: page_key
          in: query
          description: Used to retrieve the next page of LLMs after the limit has been reached. This parameter is not needed for the first page of results.
          schema:
            type: string
      responses:
        '200':
          description: List of LLMs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListLLMsResponse'
        '403':
          description: Permissions do not allow listing summarizers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-supported-api-key-type:
        - QueryService
        - Personal
      x-fern-sdk-group-name: llms
      x-fern-sdk-method-name: list
      x-fern-pagination:
        cursor: $request.page_key
        next_cursor: $response.metadata.page_key
        results: $response.llms
  '/v2/llms/{llm_id}':
    get:
      tags:
        - Large Language Models
      summary: Get an LLM
      description: "The Get LLM API allows users to retrieve details about a specific Large Language Model (LLM) that has been configured within the Vectara platform. This API provides metadata about the LLM, including its name, description, model type, API endpoint, and authentication method.\n\nUse this API to verify model configurations, confirm connectivity details, and ensure that the correct LLM is being utilized within their workflows.\n\n## Authentication methods\nThe request requires authentication details, and you can provide them either as a Bearer token or custom header-based authentication.\n"
      operationId: getLLM
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: llm_id
          in: path
          description: The name of the LLM to retrieve.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The LLM details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLM'
        '403':
          description: Permissions do not allow retrieving this LLM.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: LLM not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
      x-supported-api-key-type:
        - QueryService
        - Personal
      x-fern-sdk-group-name: llms
      x-fern-sdk-method-name: get
    delete:
      tags:
        - Large Language Models
      summary: Delete an LLM
      description: "The Delete LLM API enables users to remove a previously configured custom Large Language Model (LLM) from their Vectara account. This functionality is essential for managing active LLM configurations and ensuring that only relevant models are available for use. Built-in LLMs cannot be deleted, ensuring that core system models remain accessible.\n\nBy providing an LLM identifier, users can permanently delete a model configuration, freeing up resources and maintaining an organized list of available LLMs.\n\nIf successful, the API responds with `HTTP 204 No Content` status, confirming the LLM deletion.\n"
      operationId: deleteLLM
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: llm_id
          in: path
          description: The name of the LLM to delete.
          required: true
          schema:
            type: string
      responses:
        '204':
          description: The LLM was successfully deleted.
        '403':
          description: Permissions do not allow deleting this LLM.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: LLM not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
      x-supported-api-key-type:
        - Personal
      x-fern-sdk-group-name: llms
      x-fern-sdk-method-name: delete
    patch:
      tags:
        - Large Language Models
      summary: Update an LLM
      description: "Update an existing LLM's configuration. This endpoint allows partial updates - only provide fields you want to change. Only the name field is immutable.\n\nThe updated LLM will be tested before saving to ensure credentials are valid.\n\n**Updatable fields:**\n- `description` - LLM description\n- `type` - LLM type (openai-compatible, vertex-ai, etc.)\n- `model` - Model identifier\n- `uri` - API endpoint\n- `auth` - Authentication credentials (including service account key_json)\n- `headers` - Additional HTTP headers (for openai-compatible and anthropic types)\n- `enabled` - Whether the LLM is enabled\n- `capabilities` - Model capabilities (image support, context limit, tool calling)\n\n**Immutable fields:**\n- `id` - System-generated identifier\n- `name` - LLM name\n\nBuilt-in LLMs (system-provided models) cannot be updated.\n"
      operationId: updateLLM
