  /v2/llms/chat/completions:
    post:
      tags:
      - LLM Chat Completions
      summary: Creates a model response for the given chat conversation
      x-required-roles:
      - type: ApiRole
        roles:
        - corpus_viewer
        - corpus_developer
        - corpus_administrator
        - viewer
        - administrator
        - owner
      description: "The Chat Completions API provides an OpenAI-compatible interface\
        \ for generating model responses in multi-turn chat conversations. This API\
        \ enables you to integrate our language models directly into applications\
        \ designed to work with the OpenAI Chat Completions format, making it easy\
        \ to leverage Vectara capabilities with minimal changes to existing tools\
        \ or code.\n\nUse this API to enable interactive chat experiences that support\
        \ context-aware responses, streaming output, and token usage tracking.\n\n\
        The request includes a series of chat messages and optional parameters that\
        \ control the behavior and structure of the model response. The request body\
        \ must include the `messages` parameter, an array of message objects (role,\
        \ content) representing the full conversation so far.\n\n### Streaming responses\n\
        \nIf the `stream` parameter is set to `true`, the response appears as a series\
        \ of text/event-stream parts (also known as chunks). Each chunk includes a\
        \ `delta` field showing the incremental message update.\n\n### Example request\n\
        \nThis example sends a simple chat conversation to the API, asking the assistant\
        \ for the capital of France. The request includes a system prompt, a user\
        \ message, and a temperature setting for response variability.\n```json\n\
        {\n  \"model\": \"chat-model-001\",\"messages\": [{ \"role\": \"system\",\
        \ \"content\": \"You are a helpful assistant.\" },\n  { \"role\": \"user\"\
        , \"content\": \"What is the capital of France?\" }\n],\n\"temperature\":\
        \ 0.7,\n\"stream\": false\n}\n```\n\n### Example response\nThe response includes\
        \ a generated reply from the assistant, along with token usage statistics.\
        \ In this example, the model returns a direct answer to a user question.\n\
        ```json\n{\n\"id\": \"chatcmpl-abc123\",}\n\"object\": \"chat.completion\"\
        ,\n\"created\": 1712454830,\n\"model\": \"chat-model-001\",\n\"choices\":\
        \ [\n  {\n    \"index\": 0,\n    \"message\": {\n      \"role\": \"assistant\"\
        ,\n      \"content\": \"The capital of France is Paris.\"\n  },\n    \"finish_reason\"\
        : \"stop\"\n  }\n],\n\"usage\": {\n  \"prompt_tokens\": 21,\n  \"completion_tokens\"\
        : 9,\n  \"total_tokens\": 30\n  } \n} \n```\nIf the input summary is accurate,\
        \ the `corrected_summary` matches the `original_summary`.\n"
      operationId: createChatCompletion
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
      x-stream-based-on-body: stream()
      responses:
        '200':
          description: A chat completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatCompletionResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/CreateChatCompletionStreamResponse'
        '400':
          description: Chat completion request was malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Permissions do not allow creating a chat completion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-fern-sdk-group-name: llm
      x-fern-sdk-method-name: chatCompletion
