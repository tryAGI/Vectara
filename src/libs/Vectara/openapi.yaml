        \\#foreach(\\$\\tool in $tools)\n  - \\$\\{tool.name}: \\$\\{tool.description}\n\
        #end\n```\n:::tip Tips for effective instruction design\nInstructions are\
        \ one of the most critical parts of an agent's design. Best practices vary\
        \ by model, but at a minimum you should provide clear guidance on what tools\
        \ are available, what output format is desired, and what steps to follow for\
        \ common queries. Instructions typically need to be iterated on and tested\
        \ over time.\n\nFor guidance on writing effective instructions, see:\n- [Claude\
        \ Prompt Engineering](https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview)\n\
        - [OpenAI Prompt Engineering](https://platform.openai.com/docs/guides/prompt-engineering)\n\
        :::\n\nMetadata can personalize behavior at runtime. For example:\n\n```velocity\n\
