      oneOf:
      - $ref: '#/components/schemas/CreateOpenAILLMRequest'
      - $ref: '#/components/schemas/CreateOpenAIResponsesLLMRequest'
      - $ref: '#/components/schemas/CreateVertexAILLMRequest'
      - $ref: '#/components/schemas/CreateAnthropicLLMRequest'
      required:
      - type
    OpenAILLMUpdateBase:
