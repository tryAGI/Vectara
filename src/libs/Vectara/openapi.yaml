            - - text_value: Customer Name
              - text_value: Balance
              - text_value: Account Created
            rows:
            - - text_value: Acme Corp
              - float_value: 10230.25
              - text_value: '2023-01-15'
            - - text_value: Beta Industries
              - float_value: 8750
              - text_value: '2022-11-03'
            - - text_value: Zeta Manufacturing
