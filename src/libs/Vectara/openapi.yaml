  '/v2/corpora/{corpus_key}/filter_attribute_stats':
    get:
      tags:
        - Corpora
      summary: Get filter attribute statistics for corpus metadata
      description: "Retrieve statistics and value distributions for filter attributes in a corpus. This endpoint provides insights into the metadata structure and content distribution, enabling users to understand available filter values and build effective metadata queries.\n\nThis endpoint analyzes document and part metadata fields defined as filter attributes and returns:\n- **Value distributions**: Top occurring values with their counts\n- **Statistics**: Min, max, average, and sum for numeric fields\n\nBy default, statistics are computed across all filter attributes at both document and part levels. You can optionally:\n- Request statistics for specific fields only\n- Apply metadata filters to analyze a subset of the corpus\n- Limit the number of distinct values returned per field\n\n**Performance and Caching**: Results may be cached for improved performance, with cache duration varying by corpus size. Cached results can take up to 1 hour to refresh for large corpora. Smaller corpora with faster query times have shorter cache durations (2-15 minutes) to ensure fresher data.\n\nThe `corpus_key` uniquely identifies the corpus. For more information, see [Create a corpus](https://docs.vectara.com/docs/rest-api/create-corpus).\n"
      operationId: getFilterAttributeStats
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: corpus_key
          in: path
          description: The unique key identifying the corpus to retrieve filter attribute statistics for.
          required: true
          schema:
            $ref: '#/components/schemas/CorpusKey'
        - name: fields
          in: query
          description: 'Comma-separated list of qualified field names to retrieve statistics for (e.g., ''doc.category,part.status''). If omitted, returns statistics for all filter attributes in the corpus. Field names must match the qualified format ''level.fieldname'' where level is either ''doc'' or ''part''.'
          schema:
            type: string
          example: 'doc.category,doc.year,part.status'
        - name: metadata_filter
          in: query
          description: 'Optional metadata filter expression to pre-filter documents or parts before computing statistics. Uses the same SQL-style filter syntax as query operations. When provided, statistics reflect only the filtered subset of the corpus.'
          schema:
            type: string
          example: doc.year >= 2020 AND doc.category = 'financial'
        - name: max_values
          in: query
          description: 'Maximum number of distinct values to return per field in the ''values'' array, ordered by occurrence count (descending).'
