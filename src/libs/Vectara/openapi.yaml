                        count: 128
                      - value: 2023
                        count: 95
                      - value: 2022
                        count: 72
                      - value: 2021
                        count: 48
                      - value: 2020
                        count: 21
                      stats:
                        min: 2020
                        max: 2024
                        avg: 2022.8
                        sum: 7391296
                Legal:
                  summary: Filter attribute statistics for a legal documents corpus
