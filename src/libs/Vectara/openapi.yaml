    CreateZoomConnectorConfiguration:
      description: 'Write view of a Zoom Contact Center connector''s configuration.
        Supply the

        Zoom-provided callback URL that agent replies are POSTed to. The inbound

        `connector_token` is generated by the server and returned in the read view.

        Configure it as the `x-zoom-connector-token` header on the Zoom Contact Center
        bot

        connector. Updating the configuration preserves the existing `connector_token`.

        '
      allOf:
      - $ref: '#/components/schemas/CreateConnectorConfigurationBase'
      - type: object
        properties:
