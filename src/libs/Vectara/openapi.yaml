  /v2/llms:
    post:
      tags:
        - Large Language Models
      summary: Create an LLM
      description: "Integrate external Large Language Models (LLMs) into Vectara for Retrieval Augmented Generation (RAG) and chat. Connect OpenAI API-compatible models from providers like Anthropic, Azure, Google, or custom-hosted endpoints. Once created, reference your custom LLM by name in query generation parameters.\n- Connect external LLMs using OpenAI-compatible API format\n- Configure multiple LLM providers for different use cases\n- Override Vectara's built-in LLMs with your own models\n- Use custom models for RAG, chat, and document summarization\n\n**Example providers:**\n\n### OpenAI\n\n**Type:** `openai-compatible`\n**Models:** GPT-4o, GPT-5\n**Auth:** Bearer token\n\n```json\n{\n  \"type\": \"openai-compatible\",\n  \"name\": \"my-gpt5\",\n  \"model\": \"gpt-5\",\n  \"uri\": \"https://api.openai.com/v1/chat/completions\",\n  \"auth\": {\n    \"type\": \"bearer\",\n    \"token\": \"sk-...\"\n  }\n}\n```\n\n### OpenAI Responses API\n\n**Type**: openai-responses\n**Models**: o1-preview, o1-mini, o3-mini (reasoning models)\n**Auth**: Bearer token\n**Note**: For reasoning models that don't support streaming\n\n```json\n{\n  \"type\": \"openai-responses\",\n  \"name\": \"my-o1\",\n  \"model\": \"o1-preview\",\n  \"uri\": \"https://api.openai.com/v1/chat/completions\",\n  \"auth\": {\n    \"type\": \"bearer\",\n    \"token\": \"sk-...\"\n  }\n}\n```\n\n### Anthropic Claude\n\n**Type:** `openai-compatible`\n**Models:** claude-4-opus, claude-4-5-haiku, claude-4-5-sonnet\n**Auth:** Bearer token with header\n\n```json\n{\n  \"type\": \"openai-compatible\",\n  \"name\": \"my-claude\",\n  \"model\": \"claude-sonnet-4-5-20250929\",\n  \"uri\": \"https://api.anthropic.com/v1/messages\",\n  \"auth\": {\n    \"type\": \"bearer\",\n    \"token\": \"sk-ant-...\"\n  },\n  \"headers\": {\n    \"anthropic-version\": \"2023-06-01\"\n  }\n}\n```\n\n### Azure OpenAI\n\n**Type:** `openai-compatible`\n**Models:** GPT-3.5, GPT-4 (Azure-deployed versions)\n**Auth:** Custom header (api-key)\n\n```json\n{\n  \"type\": \"openai-compatible\",\n  \"name\": \"my-azure-gpt4\",\n  \"model\": \"gpt-4\",\n  \"uri\": \"https://YOUR-RESOURCE.openai.azure.com/openai/deployments/YOUR-DEPLOYMENT/chat/completions?api-version=2024-02-15-preview\",\n  \"auth\": {\n    \"type\": \"header\",\n    \"header\": \"api-key\",\n    \"value\": \"your-azure-key\"\n  }\n}\n```\n\n### Google Vertex AI (Gemini) — Service Account\n\n**Type:** `vertex-ai`\n**Models:** gemini-2.5-pro, gemini-2.5-flash\n**Auth:** Service account\n\n```json\n{\n  \"type\": \"vertex-ai\",\n  \"name\": \"my-gemini\",\n  \"model\": \"gemini-2.5-flash\",\n  \"uri\": \"https://us-central1-aiplatform.googleapis.com/v1/projects/YOUR-PROJECT/locations/us-central1\",\n  \"auth\": {\n    \"type\": \"service_account\",\n    \"key_json\": \"{...service account JSON...}\"\n  }\n}\n```\n\n### Google AI Studio (Gemini) — API Key\n\n**Type:** `vertex-ai`\n**Models:** gemini-2.5-pro, gemini-2.5-flash\n**Auth:** API key\n\n```json\n{\n  \"type\": \"vertex-ai\",\n  \"name\": \"my-gemini\",\n  \"model\": \"gemini-2.5-flash\",\n  \"uri\": \"https://generativelanguage.googleapis.com/v1beta\",\n  \"auth\": {\n    \"type\": \"api_key\",\n    \"api_key\": \"your-google-api-key\"\n  }\n}\n```\n\nThe `uri` field is flexible — you can provide a base URI or a full URL copied from Google docs\n(including model path and `:generateContent` suffix). The system normalizes it automatically.\n\n### Custom OpenAI-Compatible\n\n**Type:** `openai-compatible`\n**Models:** Any self-hosted or custom LLM, such as OpenRouter.\n**Auth:** Bearer or custom header\n\n```json\n{\n  \"type\": \"openai-compatible\",\n  \"name\": \"my-custom-llm\",\n  \"model\": \"llama-3-70b\",\n  \"uri\": \"https://my-llm-endpoint.com/v1/chat/completions\",\n  \"auth\": {\n    \"type\": \"bearer\",\n    \"token\": \"custom-token\"\n  }\n}\n```\n"
      operationId: createLLM
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLLMRequest'
      responses:
        '201':
          description: The LLM has been created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLM'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
          description: Permissions do not allow creating an LLM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-supported-api-key-type:
        - IndexService
        - Personal
      x-fern-sdk-group-name: llms
      x-fern-sdk-method-name: create
    get:
      tags:
