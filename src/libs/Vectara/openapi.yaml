        created_at:
          type: string
          description: Timestamp when the event was created.
          format: date-time
          example: '2024-01-15T10:35:00.0000000+00:00'
      description: 'A streaming chunk of agent output (SSE only, not stored).'
      x-vectaraParents:
        - AgentStreamedResponse
    StreamingAgentOutputEnd:
      title: StreamingAgentOutputEnd
      required:
        - type
        - created_at
      type: object
      properties:
        type:
          type: string
          description: The type of streaming event.
          default: streaming_agent_output_end
          example: streaming_agent_output_end
        event_id:
          type: string
          description: The ID of the persisted AgentOutputEvent.
          example: aev_user_001
        created_at:
          type: string
          description: Timestamp when the event was created.
          format: date-time
          example: '2024-01-15T10:35:00.0000000+00:00'
      description: 'Signals the end of streaming agent output (SSE only, not stored).'
      x-vectaraParents:
        - AgentStreamedResponse
    StreamingThinking:
      title: StreamingThinking
      required:
        - type
        - content
        - created_at
      type: object
      properties:
        type:
          type: string
          description: The type of streaming event.
          default: streaming_thinking
          example: streaming_thinking
        content:
          type: string
          description: The thinking chunk content.
          example: Let me think about this step
        created_at:
          type: string
          description: Timestamp when the event was created.
          format: date-time
          example: '2024-01-15T10:35:00.0000000+00:00'
      description: 'A streaming chunk of agent thinking (SSE only, not stored).'
      x-vectaraParents:
        - AgentStreamedResponse
    StreamingThinkingEnd:
      title: StreamingThinkingEnd
      required:
        - type
        - created_at
      type: object
      properties:
        type:
          type: string
          description: The type of streaming event.
          default: streaming_thinking_end
          example: streaming_thinking_end
        created_at:
          type: string
          description: Timestamp when the event was created.
          format: date-time
          example: '2024-01-15T10:35:00.0000000+00:00'
      description: 'Signals the end of streaming thinking (SSE only, not stored).'
      x-vectaraParents:
        - AgentStreamedResponse
    ContextConsumedEvent:
      title: ContextConsumedEvent
      required:
        - type
        - session_context_usage
        - created_at
      type: object
      properties:
        type:
          type: string
          description: The event type.
          default: context_consumed
          example: context_consumed
        session_context_usage:
          $ref: '#/components/schemas/SessionContextUsage'
        created_at:
          type: string
          description: Timestamp when the event was created.
          format: date-time
          example: '2024-01-15T10:35:00.0000000+00:00'
      description: Token usage event reporting context window consumption.
      x-vectaraParents:
        - AgentStreamedResponse
    CompactionStartedEvent:
      title: CompactionStartedEvent
      allOf:
        - $ref: '#/components/schemas/AgentEventBase'
        - required:
            - type
          type: object
          properties:
            type:
              type: string
              description: The type of event.
              default: compaction_started
              example: compaction_started
      description: An event indicating that context compaction has started.
      x-vectaraParents:
        - AgentStreamedResponse
    AgentStreamedResponse:
      required:
        - type
      type: object
      oneOf:
        - $ref: '#/components/schemas/InputMessageEvent'
        - $ref: '#/components/schemas/StreamingAgentOutput'
        - $ref: '#/components/schemas/StreamingAgentOutputEnd'
        - $ref: '#/components/schemas/StreamingThinking'
        - $ref: '#/components/schemas/StreamingThinkingEnd'
        - $ref: '#/components/schemas/ToolInputEvent'
        - $ref: '#/components/schemas/ToolOutputEvent'
        - $ref: '#/components/schemas/StructuredOutputEvent'
        - $ref: '#/components/schemas/ContextLimitExceededEvent'
        - $ref: '#/components/schemas/StepTransitionLimitExceededEvent'
        - $ref: '#/components/schemas/SessionInterruptedEvent'
        - $ref: '#/components/schemas/ImageReadEvent'
        - $ref: '#/components/schemas/StepTransitionEvent'
        - $ref: '#/components/schemas/ContextConsumedEvent'
        - $ref: '#/components/schemas/CompactionStartedEvent'
        - $ref: '#/components/schemas/CompactionEvent'
        - $ref: '#/components/schemas/StreamError'
        - $ref: '#/components/schemas/StreamResponseEnd'
      description: An individual event sent with Server-sent Events (SSE) when the agent response is streamed.
      discriminator:
        propertyName: type
        mapping:
          input_message: '#/components/schemas/InputMessageEvent'
          streaming_agent_output: '#/components/schemas/StreamingAgentOutput'
          streaming_agent_output_end: '#/components/schemas/StreamingAgentOutputEnd'
          streaming_thinking: '#/components/schemas/StreamingThinking'
          streaming_thinking_end: '#/components/schemas/StreamingThinkingEnd'
          tool_input: '#/components/schemas/ToolInputEvent'
          tool_output: '#/components/schemas/ToolOutputEvent'
          structured_output: '#/components/schemas/StructuredOutputEvent'
          context_limit_exceeded: '#/components/schemas/ContextLimitExceededEvent'
          step_transition_limit_exceeded: '#/components/schemas/StepTransitionLimitExceededEvent'
          session_interrupted: '#/components/schemas/SessionInterruptedEvent'
          image_read: '#/components/schemas/ImageReadEvent'
          step_transition: '#/components/schemas/StepTransitionEvent'
          context_consumed: '#/components/schemas/ContextConsumedEvent'
          compaction_started: '#/components/schemas/CompactionStartedEvent'
          compaction: '#/components/schemas/CompactionEvent'
          error: '#/components/schemas/StreamError'
          end: '#/components/schemas/StreamResponseEnd'
    SessionArtifact:
      title: SessionArtifact
      required:
        - artifact_id
        - filename
        - mime_type
        - size_bytes
        - checksum_sha256
        - metadata
        - created_at
        - updated_at
      type: object
      properties:
        artifact_id:
          pattern: '^art_[a-z0-9_-]+$'
          type: string
          description: Unique identifier for the artifact
          example: art_report_pdf_a3f2
        filename:
          type: string
          description: Original filename of the artifact
          example: report.pdf
        mime_type:
          type: string
          description: MIME type of the file
          example: application/pdf
        size_bytes:
          type: integer
          description: File size in bytes
          format: int64
          example: 2048576
        checksum_sha256:
          type: string
          description: SHA-256 checksum of the file content
          example: a3f2b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2
        metadata:
          type: object
          description: Custom metadata associated with the artifact
          example:
            original_filename: report.pdf
            source: user_upload
        description:
          type: string
          description: Optional description of the artifact
          example: Q4 financial report
        ttl_days:
          type: integer
          description: Time-to-live in days before the artifact is automatically deleted
          example: 30
        created_at:
          type: string
          description: Timestamp when the artifact was created
          format: date-time
          example: '2024-01-15T10:35:00.0000000+00:00'
        updated_at:
          type: string
          description: Timestamp when the artifact was last updated
          format: date-time
          example: '2024-01-15T10:35:00.0000000+00:00'
        data:
          type: string
          description: 'Base64-encoded file content (only included in single artifact fetch, not in list responses)'
          format: byte
          example: JVBERi0xLjQKJeLjz9MKMy4uLg==
      description: "Complete artifact information including metadata and optional base64-encoded content.\n\nRepresents a file stored in an agent session workspace with all associated metadata.\nThe `data` field contains the base64-encoded file content and is only included when\nfetching a single artifact, not in list responses.\n"
    ListSessionArtifactsResponse:
      title: ListSessionArtifactsResponse
      required:
        - artifacts
        - metadata
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/SessionArtifact'
          description: List of artifacts in the session
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      description: Response containing a paginated list of artifacts in a session
    AgentScheduleKey:
      maxLength: 50
      minLength: 1
      pattern: '[0-9a-zA-Z_-]+$'
      type: string
      description: "A unique key that identifies an agent schedule. Uses \"key\" terminology (instead of \"id\")\nfor consistency with other Vectara API resources (AgentKey, SessionKey, CorpusKey, etc.).\n"
      example: daily-report
    AgentScheduleName:
      maxLength: 255
      minLength: 1
      type: string
      description: The human-readable name of an agent schedule.
      example: Daily Summary Report
    IntervalScheduleConfiguration:
      required:
        - type
        - interval
      type: object
      properties:
        type:
          enum:
            - interval
          type: string
          description: The type of schedule.
          example: interval
        interval:
          pattern: ^P(?:\d+Y)?(?:\d+M)?(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+(?:\.\d+)?S)?)?$
          type: string
          description: "ISO-8601 duration string specifying the interval between executions.\nMinimum interval is 1 minute (PT1M).\n\nFormat: P[n]Y[n]M[n]DT[n]H[n]M[n]S\n- P: Period designator (required)\n- T: Time designator (separates date and time components)\n\nCommon examples:\n- PT1M: Every 1 minute\n- PT1H: Every 1 hour\n- PT6H: Every 6 hours\n- PT24H or P1D: Every 24 hours (daily)\n- P7D: Every 7 days (weekly)\n- P1M: Every 1 month\n\nReference: https://en.wikipedia.org/wiki/ISO_8601#Durations\n"
          example: PT24H
          x-vectara-duration:
            min_interval: PT1H
      description: Configuration for interval-based schedule execution.
    CronScheduleConfiguration:
      required:
        - type
        - cron_expression
      type: object
      properties:
        type:
          enum:
            - cron
          type: string
          description: The type of schedule.
          example: cron
        cron_expression:
          type: string
          description: "Cron expression specifying when the schedule should execute.\n\nUses standard 5-field cron format:\n┌───────────── minute (0-59)\n│ ┌───────────── hour (0-23)\n│ │ ┌───────────── day of month (1-31)\n│ │ │ ┌───────────── month (1-12)\n│ │ │ │ ┌───────────── day of week (0-6, Sunday=0)\n│ │ │ │ │\n* * * * *\n\nSpecial characters:\n- * : Any value\n- , : List (e.g., \"1,15\" for 1st and 15th)\n- - : Range (e.g., \"1-5\" for Monday-Friday)\n- / : Step (e.g., \"*/15\" for every 15 units)\n\nCommon examples:\n- \"0 9 * * *\": Every day at 9:00 AM\n- \"0 9 * * 1-5\": Weekdays at 9:00 AM\n- \"*/15 * * * *\": Every 15 minutes\n- \"0 */6 * * *\": Every 6 hours\n- \"0 0 1 * *\": First day of every month at midnight\n- \"0 0 * * 0\": Every Sunday at midnight\n\nTool for testing: https://crontab.guru/\n"
          example: 0 9 * * *
          x-vectara-cron:
            min_interval: PT1H
      description: Configuration for cron-based schedule execution.
    ScheduleConfiguration:
      oneOf:
        - $ref: '#/components/schemas/IntervalScheduleConfiguration'
        - $ref: '#/components/schemas/CronScheduleConfiguration'
      description: Configuration for when and how often the schedule should execute.
    AgentSchedule:
      required:
        - key
        - agent_key
        - name
        - message
        - schedule
        - enabled
        - created_at
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentScheduleKey'
        agent_key:
          $ref: '#/components/schemas/AgentKey'
        name:
          $ref: '#/components/schemas/AgentScheduleName'
        description:
          type: string
          description: A detailed description of the schedule's purpose.
          example: Generates a daily summary report of customer support activities
        message:
          type: array
          items:
            $ref: '#/components/schemas/AgentInput'
          description: The input message to send to the agent on each scheduled execution.
          example:
            - type: text
              content: Generate a summary of today's activities
        schedule:
          $ref: '#/components/schemas/ScheduleConfiguration'
        enabled:
          type: boolean
          description: Whether the schedule is currently active and executing.
          default: true
          example: true
        session_metadata:
          type: object
          description: Arbitrary metadata to include in each session created by this schedule.
          example:
            report_type: daily
            format: markdown
        max_executions_to_keep:
          maximum: 50
          minimum: 1
          type: integer
          description: Maximum number of past execution records to keep. Older records are deleted automatically when a new execution is recorded.
          format: int32
          default: 10
          example: 10
        last_execution_at:
          type: string
          description: "Timestamp of the most recent execution. Tracked by Temporal and updated automatically\nafter each execution. Null if the schedule has never executed.\n"
          format: date-time
          nullable: true
          example: '2024-01-15T10:30:00.0000000+00:00'
        created_at:
          type: string
          description: "Timestamp when the schedule was created. Note: This is a placeholder value as Temporal\ndoes not store creation timestamps. Use for API compatibility only.\n"
          format: date-time
          example: '1970-01-01T00:00:00.0000000+00:00'
      description: An agent schedule that automates agent execution at specified intervals.
    ListAgentSchedulesResponse:
      required:
        - schedules
        - metadata
      type: object
      properties:
        schedules:
          type: array
          items:
            $ref: '#/components/schemas/AgentSchedule'
          description: Array of agent schedules.
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      description: Response containing a list of agent schedules with pagination metadata.
    CreateAgentScheduleRequest:
      required:
        - name
        - message
        - schedule
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AgentScheduleKey'
        name:
          $ref: '#/components/schemas/AgentScheduleName'
        description:
          type: string
          description: Optional detailed description of the schedule's purpose.
        message:
          type: array
          items:
            $ref: '#/components/schemas/AgentInput'
          description: The input message to send to the agent on each scheduled execution.
        schedule:
          $ref: '#/components/schemas/ScheduleConfiguration'
        enabled:
          type: boolean
          description: Whether the schedule should be active upon creation.
          default: true
        session_metadata:
          type: object
          description: Arbitrary metadata to include in each session created by this schedule.
        max_executions_to_keep:
          maximum: 50
          minimum: 1
          type: integer
          description: Maximum number of past execution records to keep. Defaults to 10.
          format: int32
          default: 10
      description: Request object for creating a new agent schedule.
    UpdateAgentScheduleRequest:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/AgentScheduleName'
        description:
          type: string
          description: Updated description of the schedule's purpose.
        message:
          type: array
          items:
            $ref: '#/components/schemas/AgentInput'
          description: Updated input message to send to the agent on each scheduled execution.
        schedule:
          $ref: '#/components/schemas/ScheduleConfiguration'
        enabled:
          type: boolean
          description: Updated enabled status for the schedule.
        session_metadata:
          type: object
          description: Updated metadata to include in each session created by this schedule.
        max_executions_to_keep:
          maximum: 50
          minimum: 1
          type: integer
          description: Updated maximum number of past execution records to keep.
          format: int32
      description: Request object for updating an existing agent schedule. All fields are optional for PATCH semantics.
    AgentScheduleExecution:
      required:
        - schedule_key
        - workflow_run_id
        - attempt
        - status
        - executed_at
      type: object
      properties:
        schedule_key:
          $ref: '#/components/schemas/AgentScheduleKey'
        workflow_run_id:
          type: string
          description: Temporal run ID grouping all retry attempts of the same trigger.
        session_key:
          type: string
          description: Session created by this attempt. Null if the attempt failed before session creation.
          nullable: true
        attempt:
          type: integer
          description: 1-based attempt number within the workflow run.
          format: int32
        status:
          enum:
            - success
            - error
          type: string
          description: Outcome of this attempt.
        error_message:
          type: string
          description: Error message if the attempt failed.
          nullable: true
        executed_at:
          type: string
          description: Timestamp when this attempt ran.
          format: date-time
      description: A single execution attempt of an agent schedule.
    ListAgentScheduleExecutionsResponse:
      required:
        - executions
        - metadata
      type: object
      properties:
        executions:
          type: array
          items:
            $ref: '#/components/schemas/AgentScheduleExecution'
        metadata:
          $ref: '#/components/schemas/ListMetadata'
      description: Response containing a paginated list of schedule execution attempts.
  parameters:
    RequestTimeout:
      name: Request-Timeout
      in: header
      description: The API will make a best effort to complete the request in the specified seconds or time out.
      schema:
        minimum: 1
        type: integer
    RequestTimeoutMillis:
      name: Request-Timeout-Millis
      in: header
      description: The API will make a best effort to complete the request in the specified milliseconds or time out.
      schema:
        minimum: 1
        type: integer
  securitySchemes:
    OAuth2:
      type: oauth2
      description: OAuth2 access to Vectara
      flows:
        clientCredentials:
          tokenUrl: https://auth.vectara.io/oauth2/token
          scopes: { }
    ApiKeyAuth:
      type: apiKey
      name: x-api-key
      in: header
security:
  - ApiKeyAuth: [ ]
  - OAuth2: [ ]
tags:
  - name: Agents
    description: Create and interact with AI agents that can use tools and corpora to perform complex queries.
  - name: Agent Sessions
    description: Manage agent sessions and interact with agents through conversational events.
  - name: Agent Schedules
    description: Create and manage scheduled automated execution of agents at specified intervals.
  - name: Guardrails
    description: 'List predefined guardrails for validating tool calls, agent outputs, and agent actions.'
  - name: Instructions
    description: Create and manage instructions that guide agent behavior.
  - name: Tools
    description: Manage and discover tools available for AI agents to use in their workflows.
  - name: Tool Servers
    description: Manage tool servers that provide access to external tools for AI agents.
  - name: Agent Connectors
    description: Create and manage connectors that allow agents to receive events from external platforms like Slack.
  - name: Pipelines
    description: 'Create and manage automated data pipelines. A pipeline is a one-directional flow that sends all data from a source system to an agent, creating a new session per source record for the agent to act on. This is distinct from agent schedules (recurring single executions) and connectors (bidirectional chat integrations like Slack).'
  - name: Pipeline Runs
    description: Monitor pipeline execution runs and their processing outcomes.
  - name: Queries
    description: 'The Query APIs are the primary interface for searching your data and generating AI-powered summaries. After indexing documents into corpora, you use these endpoints to retrieve relevant information and optionally generate grounded summaries using Retrieval Augmented Generation (RAG).'
  - name: Metadata Query
    description: Query across arbitrary metadata fields in a corpus.
  - name: Upload
    description: 'Upload files to a corpus for automatic parsing, text extraction, chunking, and indexing.'
  - name: Index
    description: Index and manage both core and structured documents to enable efficient search and retrieval.
  - name: Corpora
    description: 'Create, manage, and update corpora and their associated settings.'
  - name: Documents
    description: Retrieve and manage documents stored in a corpus for administrative tasks.
  - name: Generation Presets
    description: Manage generation presets for controlling the behavior of generative AI responses.
  - name: Query History
    description: Retrieve and manage the history of previous queries for analytics and auditing.
  - name: Authentication
    description: Authenticate with the API using OAuth 2.0 or API keys.
  - name: API Keys
    description: 'Create, manage, and revoke API keys for secure access to the platform.'
  - name: Application Clients
    description: Configure and manage application clients for OAuth authentication.
  - name: Large Language Models
    description: 'List LLMs for text summarization, chat, and other generation tasks.'
  - name: Encoders
    description: List available encoders (such as Boomerang) that turn text into vectors.
  - name: Rerankers
    description: List rerankers for reranking search results.
  - name: Jobs
    description: Monitor background jobs such as rebuilding indexes or updating corpus settings.
  - name: Users
    description: 'Create, manage, and authenticate users within the platform for user administration.'
  - name: Table Extractors
    description: List available extractors for tabular data from documents.
  - name: Hallucination Correctors
    description: 'API for managing hallucination correction, including listing available models and correcting hallucinated content in generated text.'
  - name: LLM Chat Completions
    description: Create model responses for chat conversations using OpenAI-compatible endpoints.
  - name: Factual Consistency Evaluation
    description: Evaluate text quality metrics like factual consistency and hallucination detection.
  - name: Customer Configuration
    description: Retrieve customer configuration and authentication details.
  - name: Chats
    description: 'Deprecated: use Agents instead. Chat endpoints are no longer supported.'