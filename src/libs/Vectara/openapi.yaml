        for [query](/docs/rest-api/queries) requests. Generation presets group several
        properties that configure generation for a request. These presets provide
        more flexibility in how generation parameters are configured, enabling more
        fine-tuned control over query responses.


        This includes the `prompt_template`, the Large Language Model (LLM), and other
        generation settings like `max_tokens` and `temperature`. Users specify a generation
        preset in their query or chat requests using the `generation_preset_name`
        field.


        ## Generation presets object


        The `generation_presets` object contains the `name`, `description`, `llm_name`,
        `prompt_template`, and other fields make up the preset.


        If your account has access to a preset, then `enabled` is set to `true`. A
        preset can also be set as a `default`.\n\n### Example generation presets response\n\n```json\n{\n  \"generation_presets\":
        [\n    {\n      \"name\": \"vectara-summary-ext-24-05-med-omni\",\n      \"description\":
        \"Generate summary with controllable citations, Uses GPT-4o with 2,048 max
        tokens\",\n      \"llm_name\": \"gpt-4o\",\n      \"prompt_template\": \"[\\n    {\\\"role\\\":
        \\\"system\\\", \\\"content\\\": \\\"Follow these detailed step-by-step\",\n      \"max_used_search_results\":
        25,\n      \"max_tokens\": 2048,\n      \"temperature\": 0,\n      \"frequency_penalty\":
        0,\n      \"presence_penalty\": 0,\n      \"enabled\": true,\n      \"default\":
