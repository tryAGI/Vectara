    ExecutionConfiguration:
      type: object
      properties:
        max_execution_time_seconds:
          maximum: 300
          minimum: 1
          type: integer
          description: Maximum execution time in seconds.
          default: 30
          example: 30
        max_memory_mb:
          maximum: 1024
          minimum: 10
          type: integer
          description: Maximum memory usage in megabytes.
          default: 100
          example: 100
      description: Execution configuration for the function.
    FunctionDefinition:
      required:
        - language
        - code
      type: object
      properties:
        language:
          enum:
            - python
          type: string
          description: The programming language of the function. Currently only Python 3.12 is supported.
          example: python
        code:
          type: string
          description: "The function code.\n\n**Required**: Must define a `process()` entry point function. Use type annotations on parameters for automatic schema discovery.\n\nParameters are passed as keyword arguments matched to the function signature.\n"
          example: "def process(data: list, threshold: float = 0):\n    filtered = [x for x in data if x > threshold]\n    return {\n        'count': len(filtered),\n        'average': sum(filtered) / len(filtered) if filtered else 0,\n        'filtered_data': filtered\n    }\n"
        validation_status:
          enum:
            - pending
            - valid
            - invalid
          type: string
          description: The validation status of the code.
          example: valid
        validation_errors:
          type: array
          items:
            type: string
          description: List of validation errors if the code is invalid.
        execution_configuration:
          $ref: '#/components/schemas/ExecutionConfiguration'
      description: "Definition of a function to be executed as a tool in a sandboxed environment.\n\n**Python Environment:**\n- Python version: 3.12\n- Execution: Sandboxed using gVisor for security isolation\n- **Allowed modules**: `json`, `math`, `datetime`, `collections`, `itertools`, `functools`, `re`, `time`, `typing`\n- Memory limit: 100MB (configurable up to 1GB)\n- Execution timeout: 30 seconds (configurable up to 300 seconds)\n- Network access: Disabled for security\n- File system access: Read-only temporary workspace\n- No custom package installation supported (security constraint)\n\n**Type Annotations:**\n- Use type annotations for automatic input/output schema discovery\n- Supported typing constructs: `List`, `Dict`, `Optional`, `Union`\n- Import from `typing` module when using complex types\n\n**Docstring Parameter Descriptions:**\n- Use docstrings to provide descriptions for parameters (Google, NumPy, ReST, and Epydoc styles are supported)\n- Parameter descriptions are extracted and included in the input schema\n- This gives agents better context about how to use each parameter\n"
    LambdaTool:
      allOf:
