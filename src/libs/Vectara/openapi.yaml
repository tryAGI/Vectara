  '/v2/corpora/{corpus_key}/query':
    get:
      tags:
        - Queries
      summary: Simple Single Corpus Query
      description: "The [**Query APIs**](/docs/rest-api/queries) enable Retrieval Augmented Generation (RAG), allowing you to search your data and generate AI-powered summaries. Vectara provides three query types to match different search needs:\n\n* [**Single corpus query**](/docs/rest-api/search-corpus): For a simple search within a single data source.\n* [**Advanced single corpus query**](/docs/rest-api/query-corpus): For full-featured search and RAG within one corpus, supporting advanced features like table summarization, metadata filtering, and reranking.\n* [**Multiple corpora query**](/docs/rest-api/query): For searching across one or more corpora with full RAG capabilities.\n\nSearch a single corpus with a straightforward query request, specifying the corpus key and query parameters.\n\n* Specify the unique `corpus_key` identifying the corpus to query. The `corpus_key` is created in the Vectara Console or the [Create Corpus API](https://docs.vectara.com/docs/rest-api/create-corpus), and the corpus key is part of that process. When creating a new corpus, you have the option to assign a custom `corpus_key` following your preferred naming convention. This key serves as a unique identifier for the corpus, allowing it to be referenced in search requests.\n* Enter the search `query` string for the corpus, which is the question you want to ask.\n* Set the maximum number of results (`limit`) to return. **Default**: 10, **minimum**: 1\n"
      operationId: searchCorpus
      parameters:
        - $ref: '#/components/parameters/RequestTimeout'
        - $ref: '#/components/parameters/RequestTimeoutMillis'
        - name: corpus_key
          in: path
          description: The unique key identifying the corpus to query.
          required: true
          schema:
            $ref: '#/components/schemas/CorpusKey'
          examples:
            Finance_risk_analysis:
              summary: Risk metrics query in finance
              value: Explain changes in VaR metrics over Q1
            Legal_terms_summary:
              summary: Indemnification clause interpretation
              value: Explain the indemnification clause
            Support_kb:
              summary: Internal support KB lookup
              value: Steps to reset 2FA for legacy login system
        - name: query
          in: query
          description: 'The search query string for the corpus, which is the question the user is asking.'
          required: true
          schema:
            maxLength: 5000
            type: string
          examples:
            Finance_risk_analysis:
              summary: Risk model analysis
              value: Explain changes in VaR metrics over last quarter
            Legal_terms_summary:
              summary: Legal terminology explanation
              value: Summarize indemnification clause in vendor agreement
            Support_kb:
              summary: Support query from customer
              value: How to reset password for legacy login system?
        - name: limit
          in: query
          description: The maximum number of top retrieval results to rerank and return.
          schema:
            minimum: 1
            type: integer
            default: 10
          examples:
            default:
              summary: The default result count.
              value: 10
            expanded_view:
              summary: Get the 25 top results.
              value: 25
            restricted_view:
              summary: Narrow to 15 results.
              value: 15
        - name: offset
          in: query
          description: The position from which to start in the result set.
          schema:
            minimum: 0
            type: integer
            default: 0
          examples:
            start_from_beginning:
              summary: No offset (start from top)
              value: 0
            paged_results:
              summary: Skip first 10 results
              value: 10
            next_batch:
              summary: Offset for third page
              value: 20
        - name: save_history
          in: query
          description: Indicates whether to save the query in the query history.
          schema:
            type: boolean
        - name: intelligent_query_rewriting
          in: query
          description: '[Tech Preview] Indicates whether to enable intelligent query rewriting. When enabled, the platform will attempt to extract metadata filter and rewrite the query to improve search results. Read [here](https://docs.vectara.com/docs/search-and-retrieval/intelligent-query-rewriting) for more details.'
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: A response to a query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryFullResponse'
              examples:
                Finance:
                  summary: Financial VaR metrics query
                  value:
                    summary: The Q1 VaR increased due to market volatility in the energy sector.
                    response_language: eng
                    search_results:
                      - text: The VaR at 95% confidence level rose from $1.2M to $1.6M...
                        score: 0.91
                        document_id: risk_report_q1
                        document_metadata:
                          department: risk_analysis
                          quarter: Q1
                    factual_consistency_score: 0.97
                Legal:
                  summary: Legal contract clause interpretation
                  value:
                    summary: The indemnification clause transfers liability to the vendor in case of third-party claims.
                    response_language: eng
                    search_results:
                      - text: 'Under this agreement, the vendor agrees to indemnify the client...'
                        score: 0.89
                        document_id: vendor_contract_2024
                        document_metadata:
                          type: contract
                          version: v2
                    factual_consistency_score: 0.95
                Support:
                  summary: Internal IT support query
                  value:
                    summary: Resetting 2FA requires administrator approval followed by user identity verification.
                    response_language: eng
                    search_results:
                      - text: 'To reset 2FA, submit a ticket with user ID and last login IP...'
                        score: 0.87
                        document_id: it_kb_2fa_reset
                        document_metadata:
                          category: authentication
                          author: helpdesk_team
                    factual_consistency_score: 0.92
        '400':
          description: Query request was malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '403':
