          description: Maximum execution time in seconds for this test. Overrides execution_configuration if specified.
          example: 10
      description: "Request to test a Lambda tool before creating it. This allows users to validate their code, schemas, and execution before committing to tool creation.\n\nUse this endpoint to:\n- Validate Python code syntax and security constraints\n- Discover input/output schemas from type annotations\n- Test execution with sample input\n- Verify schema compatibility\n"
    TestLambdaToolResponse:
      required:
        - validation
      type: object
      properties:
        validation:
          required:
            - status
          type: object
          properties:
            status:
              enum:
                - valid
