        - agent_developer
        - agent_administrator
        - viewer
        - administrator
        - owner
      description: List all tools available to the authenticated user, with optional
        filtering and pagination. Tools represent capabilities that agents can invoke
        during conversation, including built-in system tools and user-defined Lambda
        tools. Use filters to locate tools by name, type, status, or tool server.
      operationId: listTools
      parameters:
      - $ref: '#/components/parameters/RequestTimeout'
      - $ref: '#/components/parameters/RequestTimeoutMillis'
      - in: query
        name: filter
        description: A regular expression against tool names and descriptions to filter
          the results.
        required: false
        schema:
          type: string
          example: rag.*
      - in: query
        name: type
        description: Filter tools by type.
        required: false
        schema:
          type: string
          enum:
          - mcp
          - lambda
          - client
          example: mcp
      - in: query
        name: enabled
        description: Filter tools by enabled status.
        required: false
        schema:
          type: boolean
          example: true
      - in: query
        name: category
        description: Filter tools by category. Pass one or more category values to
